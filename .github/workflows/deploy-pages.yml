name: Deploy dashboard to GitHub Pages

# Replaces the auto-generated "pages build and deployment" workflow so we can
# control concurrency. The Planner sync automation pushes to `main` in quick
# bursts (a queue-sync commit followed ~60-90s later by a snapshot commit).
# With the default branch-based Pages deploy, the second push starts a new
# deployment while the first is still in flight, so GitHub rejects it with
# "Deployment failed, try again later" and emails a failure notice.
#
# The `concurrency` block below serializes deployments: a new run waits for the
# in-flight one instead of colliding, and any intermediate queued run is
# superseded by the newest. That removes the collision and the error emails.
#
# NOTE: this workflow only takes effect once the repository's Pages source is
# set to "GitHub Actions" (Settings -> Pages -> Build and deployment -> Source).

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time. Do not cancel an in-flight deployment;
# let it finish and run the newest queued one next.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Static site served from the repository root.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
