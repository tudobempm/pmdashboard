name: Deploy dashboard to GitHub Pages

# Replaces the auto-generated "pages build and deployment" workflow.
#
# The Planner sync automation pushes to `main` in quick bursts (a queue-sync
# commit followed ~60-90s later by a snapshot commit), ~every 15 minutes. When
# the site deployed on every push, the second deployment of a burst was created
# while the first was still finalizing on the GitHub Pages backend, so Pages
# rejected it with "Deployment failed, try again later" and emailed a failure
# notice. A workflow-level concurrency group cannot prevent this because the
# collision happens on the Pages backend after the deploy step has returned.
#
# Fix: deploy on a fixed schedule instead of on every push. The site rebuilds
# every 2 hours during business hours (8am-6pm, Mon-Fri, America/Santo_Domingo,
# which is UTC-4 year-round), so deployments never overlap and the error emails
# stop. Data commits from the Planner sync keep flowing every ~15 min; the live
# site simply refreshes at the scheduled times (and on demand via "Run
# workflow"). Trade-off: the published site can lag the repo by up to ~2h during
# the day and is frozen outside business hours until the next scheduled run.
#
# GitHub Actions cron is always UTC, so the local 08:00-18:00 window is
# expressed as 12:00-22:00 UTC below.
#
# NOTE: this workflow only takes effect while the repository's Pages source is
# set to "GitHub Actions" (Settings -> Pages -> Build and deployment -> Source).

on:
  schedule:
    # Every 2h, 08:00-18:00 America/Santo_Domingo (UTC-4) = 12,14,16,18,20,22 UTC, Mon-Fri.
    - cron: '0 12,14,16,18,20,22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time. Do not cancel an in-flight deployment;
# let it finish and run the newest queued one next.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry1.outputs.page_url || steps.deployment_retry2.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Static site served from the repository root.
          path: '.'

      # GitHub Pages' backend intermittently returns "Deployment failed, try
      # again later" — a transient error unrelated to our content. Retry a
      # couple of times so a flaky backend doesn't fail the run and email a
      # failure notice. The job only fails if every attempt fails.
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry 1
        if: steps.deployment.outcome == 'failure'
        run: sleep 45
      - name: Deploy to GitHub Pages (retry 1)
        id: deployment_retry1
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry 2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry1.outcome == 'failure'
        run: sleep 90
      - name: Deploy to GitHub Pages (retry 2)
        id: deployment_retry2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry1.outcome == 'failure'
        uses: actions/deploy-pages@v4
