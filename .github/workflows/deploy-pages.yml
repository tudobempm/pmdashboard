name: Deploy dashboard to GitHub Pages

# Replaces the auto-generated "pages build and deployment" workflow.
#
# History: the Planner / Supabase sync automation pushes to `main` in quick
# bursts (~every 15 min), only touching data files (briefing_state.json,
# digests.json, pending-digests/**). When the site deployed on EVERY push, two
# data deployments in a burst overlapped on the GitHub Pages backend, which
# rejected the second with "Deployment failed, try again later" and emailed a
# failure notice. To stop that, deploys were moved to a fixed schedule — but
# then code changes (index.html) didn't go live until the next scheduled run.
#
# Current setup — deploy on push again, but only for real code/content changes:
#   * push to main, EXCLUDING the churny data files below (paths-ignore). A
#     pure data-sync commit touches only those files, so it no longer triggers
#     a deploy — no bursts, no collision. An index.html (HTML/CSS/JS) change
#     deploys immediately, which is what we want.
#   * the every-2h schedule stays as a safety net so data-file changes still
#     reach the published site during business hours.
#   * workflow_dispatch for on-demand runs.
#   * the retry steps below absorb the occasional transient Pages backend error
#     if a push- and schedule-triggered run happen to overlap.
#
# GitHub Actions cron is always UTC, so the local 08:00-18:00 window is
# expressed as 12:00-22:00 UTC below.
#
# NOTE: this workflow only takes effect while the repository's Pages source is
# set to "GitHub Actions" (Settings -> Pages -> Build and deployment -> Source).

on:
  push:
    branches: [main]
    # Deploy on code/content changes; skip commits that only touch data files
    # the sync automation rewrites every ~15 min (those would cause deploy bursts).
    paths-ignore:
      - 'briefing_state.json'
      - 'digests.json'
      - 'pending-digests/**'
  schedule:
    # Every 2h, 08:00-18:00 America/Santo_Domingo (UTC-4) = 12,14,16,18,20,22 UTC, Mon-Fri.
    - cron: '0 12,14,16,18,20,22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time. Do not cancel an in-flight deployment;
# let it finish and run the newest queued one next.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry1.outputs.page_url || steps.deployment_retry2.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Static site served from the repository root.
          path: '.'

      # GitHub Pages' backend intermittently returns "Deployment failed, try
      # again later" — a transient error unrelated to our content. Retry a
      # couple of times so a flaky backend doesn't fail the run and email a
      # failure notice. The job only fails if every attempt fails.
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry 1
        if: steps.deployment.outcome == 'failure'
        run: sleep 45
      - name: Deploy to GitHub Pages (retry 1)
        id: deployment_retry1
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry 2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry1.outcome == 'failure'
        run: sleep 90
      - name: Deploy to GitHub Pages (retry 2)
        id: deployment_retry2
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry1.outcome == 'failure'
        uses: actions/deploy-pages@v4
