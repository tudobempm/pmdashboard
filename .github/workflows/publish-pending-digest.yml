name: Publish pending digest

on:
  push:
    paths:
      - 'pending-digests/*.json'
  workflow_dispatch:

permissions:
  contents: write
  # Needed to dispatch deploy-pages.yml after publishing (see last step).
  actions: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Publish pending digest files
        run: |
          python - <<'PY'
          import json
          import pathlib
          import re
          import subprocess
          import sys

          root = pathlib.Path('.')
          pending_dir = root / 'pending-digests'
          pending_files = sorted(pending_dir.glob('*.json')) if pending_dir.exists() else []
          if not pending_files:
              print('No pending digest files found.')
              sys.exit(0)

          digests_path = root / 'digests.json'
          state_path = root / 'briefing_state.json'

          digests = json.loads(digests_path.read_text(encoding='utf-8'))
          if not isinstance(digests, list):
              raise SystemExit('digests.json must contain a JSON array')

          existing_ids = {item.get('id') for item in digests if isinstance(item, dict)}
          new_digests = []
          state_update = None

          for pending_file in pending_files:
              payload = json.loads(pending_file.read_text(encoding='utf-8'))
              digest = payload.get('digest', payload)
              if not isinstance(digest, dict):
                  raise SystemExit(f'{pending_file} does not contain a digest object')
              digest_id = digest.get('id')
              if not digest_id:
                  raise SystemExit(f'{pending_file} digest is missing id')
              # Contract: every action item (non-info section) must carry a stable
              # taskId so carry-over completion survives across days. The display
              # `id` is per-day and disposable; taskId is the canonical key.
              seen_task_ids = set()
              for section in digest.get('sections', []):
                  if not isinstance(section, dict) or section.get('info'):
                      continue
                  for item in section.get('items', []):
                      if not isinstance(item, dict):
                          continue
                      task_id = item.get('taskId')
                      if not task_id or not isinstance(task_id, str) or not task_id.strip():
                          raise SystemExit(
                              f"{pending_file} item {item.get('id')!r} in section "
                              f"{section.get('title')!r} is missing a taskId"
                          )
                      if not re.match(r'^task-\d{8}-', task_id):
                          print(f'WARNING: taskId {task_id!r} does not match expected '
                                f'format task-YYYYMMDD-<slug> ({pending_file})')
                      if task_id in seen_task_ids:
                          print(f'WARNING: duplicate taskId {task_id!r} within {digest_id}')
                      seen_task_ids.add(task_id)
              if digest_id in existing_ids:
                  print(f'Skipping duplicate digest {digest_id}')
              else:
                  new_digests.append(digest)
                  existing_ids.add(digest_id)
              if isinstance(payload, dict) and isinstance(payload.get('state'), dict):
                  state_update = payload['state']

          if new_digests:
              digests = new_digests + digests
              digests_path.write_text(json.dumps(digests, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
              print(f'Prepended {len(new_digests)} digest(s).')
          else:
              print('No new digests to prepend.')

          if state_update is not None:
              required = {'completed', 'hidden', 'reactions', 'edits', 'reminders', 'reminderHistory'}
              missing = required - set(state_update)
              if missing:
                  raise SystemExit(f'Pending state update is missing required keys: {sorted(missing)}')
              state_path.write_text(json.dumps(state_update, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
              print('Updated briefing_state.json from pending payload.')

          for pending_file in pending_files:
              pending_file.unlink()
              print(f'Removed {pending_file}')

          subprocess.run(['git', 'status', '--short'], check=True)
          PY

      - name: Commit published digest
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo 'Nothing to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add digests.json briefing_state.json pending-digests || true
          git commit -m 'Publish pending daily digest'
          git push

      # Keep Supabase (app_state id=1) in lockstep with briefing_state.json.
      # The dashboard writes user actions to Supabase; if Supabase were left
      # holding pre-publish state, its newer lastModified would resurrect
      # reminders this digest just consumed. The key is Supabase's PUBLIC anon
      # key (already shipped in index.html), so it adds no exposure here.
      - name: Sync published state to Supabase
        if: success()
        env:
          SUPABASE_URL: https://niqzkombzncxxihhulqq.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pcXprb21iem5jeHhpaGh1bHFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTI5NTgsImV4cCI6MjA4OTI2ODk1OH0.9DMbwxPi4yBkXG034sakwh6tnxt-AUcKkt_MER71qcg
        run: |
          python - <<'PY'
          import json, os, pathlib, urllib.request

          state = json.loads(pathlib.Path('briefing_state.json').read_text(encoding='utf-8'))
          key = os.environ['SUPABASE_ANON_KEY']
          req = urllib.request.Request(
              os.environ['SUPABASE_URL'] + '/rest/v1/app_state?id=eq.1',
              data=json.dumps({'data': state}).encode(),
              method='PATCH',
              headers={
                  'apikey': key,
                  'Authorization': f'Bearer {key}',
                  'Content-Type': 'application/json',
                  'Prefer': 'return=minimal',
              },
          )
          try:
              urllib.request.urlopen(req, timeout=30)
              print('Supabase updated to match published briefing_state.json.')
          except Exception as e:
              # Non-fatal: the scheduled sync workflow converges the stores.
              print(f'Supabase write-back failed (sync workflow will converge): {e}')
          PY

      # Deploy the site now. deploy-pages.yml deliberately ignores pushes that
      # only touch the data files (to avoid deploy bursts from the ~15-min sync
      # automation), so without this dispatch a freshly published digest would
      # wait for the next 2h scheduled deploy — which GitHub cron often delays
      # by another 1-2h. Digests publish ~2x/day, so this adds no burst risk;
      # the `pages` concurrency group serializes it against any scheduled run.
      - name: Deploy dashboard to Pages
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main --repo "$GITHUB_REPOSITORY"
