# trigger: 2026-07-06T13:15:00Z
name: One-time republish July 6 morning digest

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/republish-2026-07-06-morning.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  republish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Patch digest, sync state, and dispatch deploy
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_DIGEST_ID: daily-2026-07-06-morning
          STATE_REF: e0bb0cd
          WORKFLOW_FILE: .github/workflows/republish-2026-07-06-morning.yml
        run: |
          node <<'NODE'
          const fs = require('fs');
          const cp = require('child_process');

          const targetDigestId = process.env.TARGET_DIGEST_ID;
          const nowIso = new Date().toISOString();
          const nowMs = Date.now();

          const readJson = (path) => JSON.parse(fs.readFileSync(path, 'utf8'));
          const writeJson = (path, value) => fs.writeFileSync(path, JSON.stringify(value, null, 2) + '\n');
          const safeState = (value) => value && typeof value === 'object' ? value : {};
          const lastModified = (state) => {
            const raw = state?.lastModified;
            if (typeof raw === 'number') return raw;
            if (typeof raw === 'string') {
              const parsed = Date.parse(raw);
              return Number.isFinite(parsed) ? parsed : 0;
            }
            return 0;
          };

          const githubMainState = safeState(readJson('briefing_state.json'));
          let githubRefState = githubMainState;
          try {
            const refContent = cp.execFileSync('git', ['show', `${process.env.STATE_REF}:briefing_state.json`], { encoding: 'utf8' });
            githubRefState = safeState(JSON.parse(refContent));
          } catch (error) {
            console.warn(`Could not read state ref ${process.env.STATE_REF}; using main state.`, error.message);
          }
          const githubState = lastModified(githubRefState) > lastModified(githubMainState) ? githubRefState : githubMainState;

          const indexHtml = fs.readFileSync('index.html', 'utf8');
          const urlMatch = indexHtml.match(/const\s+SUPABASE_URL\s*=\s*"([^"]+)"/);
          const keyMatch = indexHtml.match(/const\s+SUPABASE_ANON_KEY\s*=\s*"([^"]+)"/);
          if (!urlMatch || !keyMatch) throw new Error('Supabase constants not found in index.html');
          const supabaseUrl = urlMatch[1];
          const supabaseKey = keyMatch[1];

          async function readSupabaseState() {
            const endpoint = `${supabaseUrl}/rest/v1/app_state?id=eq.1&select=data`;
            const res = await fetch(endpoint, {
              headers: { apikey: supabaseKey, Authorization: `Bearer ${supabaseKey}` },
            });
            if (!res.ok) {
              console.warn(`Supabase read failed: ${res.status} ${await res.text()}`);
              return {};
            }
            const rows = await res.json();
            return safeState(rows?.[0]?.data);
          }

          function mergeEffectiveState(githubState, supabaseState) {
            const newerForOps = lastModified(supabaseState) > lastModified(githubState) ? supabaseState : githubState;
            const newerForReminders = lastModified(supabaseState) > lastModified(githubState) ? supabaseState : githubState;
            const reminderHistory = Array.isArray(githubState.reminderHistory) ? githubState.reminderHistory : [];
            const consumedIds = new Set(reminderHistory.map((r) => r && r.id).filter(Boolean));
            return {
              completed: { ...(githubState.completed || {}), ...(supabaseState.completed || {}) },
              hidden: Array.isArray(newerForOps.hidden) ? newerForOps.hidden : [],
              reactions: newerForOps.reactions || {},
              edits: newerForOps.edits || {},
              reminders: (Array.isArray(newerForReminders.reminders) ? newerForReminders.reminders : [])
                .filter((r) => r && r.id && !consumedIds.has(r.id)),
              reminderHistory,
              lastModified: Math.max(lastModified(githubState), lastModified(supabaseState)),
              assigneeOverrides: newerForOps.assigneeOverrides || {},
            };
          }

          const reminderDefinitions = [
            {
              match: /chelsea|ownership del portafolio|portfolio ownership/i,
              label: 'Write to Chelsea in Legal to validate portfolio ownership',
              detail: 'One-shot reminder from Friday. Confirm with Chelsea whether Legal portfolio ownership is validated so the portfolio-owner follow-up can move cleanly.',
              taskId: 'task-20260706-validate-legal-portfolio-ownership',
            },
            {
              match: /incident response|incident guides/i,
              label: 'Write to Incident Response stakeholders about the incident guides',
              detail: 'One-shot reminder from Friday. Ask the Incident Response stakeholders to finish the incident guides and confirm any remaining owner gaps.',
              taskId: 'task-20260706-incident-guides-stakeholders',
            },
            {
              match: /pm team index|index de pm team|loop/i,
              label: 'Keep working on the PM team index in Loop',
              detail: 'One-shot reminder from Friday. Continue the PM team index work in Loop so the team reference stays current and usable.',
              taskId: 'task-20260706-pm-team-index-loop',
            },
            {
              match: /paige|lucia|lucía|amy|marketing/i,
              label: 'Schedule a meeting with Paige, Lucia, and Amy from Marketing',
              detail: 'One-shot reminder from Friday. Put the Marketing portfolio meeting with Paige, Lucia, and Amy on the calendar before the week fills up.',
              taskId: 'task-20260706-schedule-marketing-portfolio-meeting',
            },
          ];

          function pickReminder(activeReminders, definition) {
            return activeReminders.find((reminder) => definition.match.test(`${reminder.text || ''} ${reminder.label || ''}`));
          }

          function validateTaskIds(digest) {
            const bad = [];
            for (const section of digest.sections || []) {
              if (section.info) continue;
              for (const item of section.items || []) {
                if (!/^task-\d{8}-[a-z0-9]+(?:-[a-z0-9]+)*$/.test(item.taskId || '')) {
                  bad.push(`${section.title}:${item.id}`);
                }
              }
            }
            if (bad.length) throw new Error(`Missing or invalid taskId: ${bad.join(', ')}`);
          }

          (async () => {
            const supabaseState = await readSupabaseState();
            const effective = mergeEffectiveState(githubState, supabaseState);

            const selectedReminders = reminderDefinitions.map((definition) => {
              const source = pickReminder(effective.reminders, definition);
              if (!source) throw new Error(`Required reminder not found: ${definition.label}`);
              return { ...definition, source };
            });

            const digests = readJson('digests.json');
            const existing = digests.find((digest) => digest.id === targetDigestId);
            if (!existing) throw new Error(`Digest not found: ${targetDigestId}`);

            const digest = JSON.parse(JSON.stringify(existing));
            digest.greeting = 'Monday, July 6, Jean. Today has 6 visible calendar blocks, anchored by CoE Newsletter Development, BD Portfolio Review, and the Maria 1:1. The corrected state leaves 2 carried-over items and 4 one-shot reminders: portfolio-owner meetings, the executive project deck, Legal portfolio ownership, Incident Response guides, the PM team index, and the Marketing portfolio meeting. Amazon Connect, dashboard publish path, the SMS marketing-number call, and Tomas Aparicio SOP access are already completed and have been removed from carry-over.';

            for (const section of digest.sections || []) {
              if (section.title === 'Carried Over') {
                const keepIds = new Set([
                  'task-20260703-schedule-portfolio-owner-meetings',
                  'task-20260703-update-executive-project-status-deck',
                ]);
                section.items = (section.items || [])
                  .filter((item) => keepIds.has(item.taskId))
                  .map((item, index) => ({
                    ...item,
                    id: `mon-0706-co-${index + 1}`,
                    flag: 'carried',
                  }));
              }
              if (section.title === 'Reminders') {
                section.items = selectedReminders.map(({ label, detail, taskId }, index) => ({
                  id: `mon-0706-rem-${index + 1}`,
                  taskId,
                  label,
                  detail,
                }));
              }
            }

            validateTaskIds(digest);

            const reminderIds = new Set(selectedReminders.map(({ source }) => source.id));
            const priorHistoryIds = new Set((effective.reminderHistory || []).map((r) => r.id));
            const consumedHistory = selectedReminders
              .filter(({ source }) => !priorHistoryIds.has(source.id))
              .map(({ source }) => ({
                ...source,
                shownInDigestId: targetDigestId,
                lastModified: nowIso,
              }));

            const finalState = {
              ...effective,
              reminders: (effective.reminders || []).filter((reminder) => !reminderIds.has(reminder.id)),
              reminderHistory: [...(effective.reminderHistory || []), ...consumedHistory],
              lastModified: nowMs,
            };

            const updatedDigests = [digest, ...digests.filter((item) => item.id !== targetDigestId)];
            writeJson('digests.json', updatedDigests);
            writeJson('briefing_state.json', finalState);

            fs.rmSync(process.env.WORKFLOW_FILE, { force: true });

            const supabaseWrite = await fetch(`${supabaseUrl}/rest/v1/app_state`, {
              method: 'POST',
              headers: {
                apikey: supabaseKey,
                Authorization: `Bearer ${supabaseKey}`,
                'Content-Type': 'application/json',
                Prefer: 'resolution=merge-duplicates',
              },
              body: JSON.stringify({ id: 1, data: finalState }),
            });
            if (!supabaseWrite.ok) throw new Error(`Supabase write failed: ${supabaseWrite.status} ${await supabaseWrite.text()}`);

            const verifyRead = await readSupabaseState();
            if (JSON.stringify(verifyRead) !== JSON.stringify(finalState)) {
              throw new Error('Supabase verification mismatch after write');
            }

            cp.execFileSync('git', ['config', 'user.name', 'Daily Briefing Automation']);
            cp.execFileSync('git', ['config', 'user.email', 'daily-briefing-automation@users.noreply.github.com']);
            cp.execFileSync('git', ['add', 'digests.json', 'briefing_state.json', process.env.WORKFLOW_FILE]);
            cp.execFileSync('git', ['commit', '-m', 'fix: republish July 6 morning digest']);
            cp.execFileSync('git', ['push']);

            const dispatch = await fetch(`https://api.github.com/repos/${process.env.REPO}/actions/workflows/deploy-pages.yml/dispatches`, {
              method: 'POST',
              headers: {
                Authorization: `Bearer ${process.env.GH_TOKEN}`,
                Accept: 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ ref: 'main' }),
            });
            if (dispatch.status !== 204) throw new Error(`deploy-pages dispatch failed: ${dispatch.status} ${await dispatch.text()}`);

            console.log(JSON.stringify({
              correctedCarryOverCount: digest.sections.find((s) => s.title === 'Carried Over')?.items?.length || 0,
              remindersIncluded: selectedReminders.map((r) => r.label),
              githubSupabaseMatched: true,
              deployPagesTriggered: true,
              consumedReminderIds: [...reminderIds],
            }, null, 2));
          })();
          NODE
