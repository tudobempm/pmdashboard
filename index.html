<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>LLF Briefing</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%233b82f6'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='18' font-weight='bold' font-family='system-ui'>M</text></svg>">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: ["Satoshi", "system-ui", "-apple-system", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    html { font-size: 17px; }
    body {
      font-family: "Satoshi", system-ui, -apple-system, sans-serif;
      background: #fafafa;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .dark body { background: #09090b; }
  </style>
</head>
<body class="selection:bg-blue-500/20">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;
    const SUPABASE_URL = "https://niqzkombzncxxihhulqq.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_EcBnQzimcg_xjY_L0fX_yw_EE1vjgXp";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const TYPE_LABELS = {
      all: "All",
      daily: "Daily",
      eod: "EOD",
      weekly: "Weekly",
      reminders: "Reminders",
    };

    function cx(...parts) {
      return parts.filter(Boolean).join(" ");
    }

    function formatDay(isoDate) {
      if (!isoDate) return "";
      return new Date(`${isoDate}T12:00:00`).toLocaleDateString("en-US", {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric",
      });
    }

    function normalizeDigest(row) {
      const payload = row.payload && typeof row.payload === "object" ? row.payload : {};
      return {
        id: payload.id || row.id,
        type: payload.type || row.type || "daily",
        date: payload.date || formatDay(payload.isoDate || row.iso_date),
        isoDate: payload.isoDate || row.iso_date,
        greeting: payload.greeting || "",
        sections: Array.isArray(payload.sections) ? payload.sections : [],
      };
    }

    function monthKeyForDigest(digest) {
      const source = digest.isoDate || "";
      return source.slice(0, 7) || "unknown";
    }

    function monthLabel(monthKey) {
      if (!monthKey || monthKey === "unknown") return "Unknown";
      return new Date(`${monthKey}-01T12:00:00`).toLocaleDateString("en-US", {
        month: "long",
        year: "numeric",
      });
    }

    function App() {
      const [theme, setTheme] = useState(() => {
        const saved = window.localStorage.getItem("llf-theme");
        return saved || "light";
      });
      const [digests, setDigests] = useState([]);
      const [stateRow, setStateRow] = useState(null);
      const [loading, setLoading] = useState(true);
      const [syncing, setSyncing] = useState(false);
      const [error, setError] = useState("");
      const [search, setSearch] = useState("");
      const [typeFilter, setTypeFilter] = useState("all");
      const [selectedDate, setSelectedDate] = useState("");
      const [openCards, setOpenCards] = useState({});

      useEffect(() => {
        document.documentElement.classList.toggle("dark", theme === "dark");
        window.localStorage.setItem("llf-theme", theme);
      }, [theme]);

      async function loadDashboardData(showSpinner = false) {
        if (showSpinner) setSyncing(true);
        setError("");
        try {
          const [{ data: digestRows, error: digestsError }, { data: appState, error: stateError }] =
            await Promise.all([
              supabase
                .from("digests")
                .select("id, iso_date, type, payload")
                .order("iso_date", { ascending: false }),
              supabase
                .from("app_state")
                .select("id, data")
                .eq("id", 1)
                .single(),
            ]);

          if (digestsError) throw digestsError;
          if (stateError) throw stateError;

          const nextDigests = (digestRows || []).map(normalizeDigest);
          setDigests(nextDigests);
          setStateRow(appState?.data || { completed: {}, hidden: [], edits: {}, reminders: [], reminderHistory: [] });
          setOpenCards((prev) => {
            if (Object.keys(prev).length > 0) return prev;
            if (!nextDigests[0]?.id) return prev;
            return { [nextDigests[0].id]: true };
          });
        } catch (err) {
          setError(err.message || "Unable to load dashboard data.");
        } finally {
          setLoading(false);
          setSyncing(false);
        }
      }

      useEffect(() => {
        loadDashboardData();
      }, []);

      const completed = stateRow?.completed || {};
      const hidden = stateRow?.hidden || [];
      const edits = stateRow?.edits || {};
      const reminders = stateRow?.reminders || [];
      const reminderHistory = stateRow?.reminderHistory || [];

      const activeDigests = useMemo(
        () => digests.filter((digest) => !hidden.includes(digest.id)),
        [digests, hidden]
      );

      const visibleDigests = useMemo(() => {
        return activeDigests.filter((digest) => {
          if (typeFilter !== "all" && typeFilter !== "reminders" && digest.type !== typeFilter) return false;
          if (selectedDate && digest.isoDate !== selectedDate) return false;
          if (!search.trim()) return true;

          const needle = search.trim().toLowerCase();
          const haystack = [
            digest.date,
            digest.greeting,
            ...digest.sections.map((section) => section.title || ""),
            ...digest.sections.flatMap((section) =>
              (section.items || []).flatMap((item) => [
                edits[item.id]?.label || item.label || "",
                edits[item.id]?.detail || item.detail || "",
                item.time || "",
                item.note || "",
              ])
            ),
          ]
            .join(" ")
            .toLowerCase();

          return haystack.includes(needle);
        });
      }, [activeDigests, edits, search, selectedDate, typeFilter]);

      const groupedDigests = useMemo(() => {
        const groups = new Map();
        for (const digest of visibleDigests) {
          const key = monthKeyForDigest(digest);
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(digest);
        }
        return Array.from(groups.entries());
      }, [visibleDigests]);

      const todayIso = useMemo(() => {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
      }, []);

      const todayDigest = useMemo(
        () => activeDigests.find((digest) => digest.isoDate === todayIso) || activeDigests[0] || null,
        [activeDigests, todayIso]
      );

      const todayActionItems = useMemo(() => {
        if (!todayDigest) return [];
        return todayDigest.sections.filter((section) => !section.info).flatMap((section) => section.items || []);
      }, [todayDigest]);

      const todayStats = useMemo(() => {
        const total = todayActionItems.length;
        const done = todayActionItems.filter((item) => completed[item.id]).length;
        return {
          total,
          done,
          pct: total ? Math.round((done / total) * 100) : 0,
        };
      }, [completed, todayActionItems]);

      async function persistState(nextState) {
        setStateRow(nextState);
        const { error: saveError } = await supabase
          .from("app_state")
          .update({ data: nextState })
          .eq("id", 1);

        if (saveError) {
          setError(saveError.message || "Unable to save dashboard state.");
          setStateRow(stateRow);
        }
      }

      async function toggleCompleted(itemId) {
        if (!stateRow) return;
        const nextState = {
          ...stateRow,
          completed: {
            ...(stateRow.completed || {}),
            [itemId]: !stateRow.completed?.[itemId],
          },
        };
        await persistState(nextState);
      }

      function toggleCard(digestId) {
        setOpenCards((prev) => ({ ...prev, [digestId]: !prev[digestId] }));
      }

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center px-6">
            <div className="text-center">
              <div className="w-10 h-10 border-2 border-zinc-200 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
              <p className="text-sm font-medium text-zinc-500">Loading dashboard from Supabase…</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen text-zinc-900 dark:text-zinc-100">
          <main className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-10">
            <header className="mb-8">
              <div className="flex flex-col gap-5 sm:flex-row sm:items-start sm:justify-between">
                <div>
                  <div className="flex items-center gap-2 text-sm font-medium text-zinc-500 dark:text-zinc-400 mb-3">
                    <span className="px-3 py-1 rounded-full bg-zinc-200/60 dark:bg-zinc-800/80">
                      {new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })}
                    </span>
                    <span>Lisinski Law Firm</span>
                  </div>
                  <h1 className="text-3xl sm:text-4xl font-extrabold tracking-tight">
                    {todayDigest?.greeting ? `${todayDigest.greeting.split(".")[0]}.` : "LLF Briefing"}
                  </h1>
                  <p className="mt-3 text-base text-zinc-600 dark:text-zinc-300 max-w-3xl">
                    Briefings and dashboard state now load directly from Supabase.
                  </p>
                </div>

                <div className="flex items-center gap-3">
                  <div className="px-4 py-3 rounded-2xl bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 shadow-sm min-w-[150px]">
                    <p className="text-xs uppercase tracking-[0.18em] text-zinc-400 mb-2">Today</p>
                    <p className="text-lg font-bold">{todayStats.done}<span className="text-zinc-400">/{todayStats.total}</span></p>
                    <div className="mt-2 h-1.5 rounded-full bg-zinc-200 dark:bg-zinc-800 overflow-hidden">
                      <div className="h-full bg-blue-500 rounded-full transition-all" style={{ width: `${todayStats.pct}%` }} />
                    </div>
                  </div>

                  <button
                    onClick={() => setTheme(theme === "dark" ? "light" : "dark")}
                    className="px-4 py-3 rounded-2xl bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 shadow-sm text-sm font-semibold hover:border-zinc-300 dark:hover:border-zinc-700 transition-colors"
                  >
                    {theme === "dark" ? "Light" : "Dark"}
                  </button>

                  <button
                    onClick={() => loadDashboardData(true)}
                    className="px-4 py-3 rounded-2xl bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 text-sm font-semibold shadow-sm hover:opacity-90 transition-opacity disabled:opacity-60"
                    disabled={syncing}
                  >
                    {syncing ? "Syncing…" : "Sync"}
                  </button>
                </div>
              </div>
            </header>

            {error && (
              <div className="mb-6 px-4 py-3 rounded-2xl border border-red-200 bg-red-50 text-red-700 text-sm dark:border-red-900/60 dark:bg-red-950/30 dark:text-red-300">
                {error}
              </div>
            )}

            <section className="mb-6 grid gap-3 md:grid-cols-[minmax(0,1fr)_220px]">
              <div className="flex gap-2 flex-wrap">
                {["all", "daily", "eod", "weekly", "reminders"].map((type) => (
                  <button
                    key={type}
                    onClick={() => setTypeFilter(type)}
                    className={cx(
                      "px-4 py-2 rounded-full text-sm font-semibold border transition-colors",
                      typeFilter === type
                        ? "bg-zinc-900 text-white border-zinc-900 dark:bg-white dark:text-zinc-900 dark:border-white"
                        : "bg-white text-zinc-600 border-zinc-200 hover:text-zinc-900 dark:bg-zinc-900 dark:text-zinc-300 dark:border-zinc-800 dark:hover:text-white"
                    )}
                  >
                    {TYPE_LABELS[type]}
                  </button>
                ))}
              </div>

              <div className="flex gap-2">
                <input
                  type="search"
                  value={search}
                  onChange={(event) => setSearch(event.target.value)}
                  placeholder="Search briefings"
                  className="w-full px-4 py-2.5 rounded-2xl border border-zinc-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 dark:bg-zinc-900 dark:border-zinc-800"
                />
                <input
                  type="date"
                  value={selectedDate}
                  onChange={(event) => setSelectedDate(event.target.value)}
                  className="px-3 py-2.5 rounded-2xl border border-zinc-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 dark:bg-zinc-900 dark:border-zinc-800"
                />
              </div>
            </section>

            {typeFilter === "reminders" ? (
              <section className="grid gap-6 lg:grid-cols-2">
                <ReminderColumn title="Queued Reminders" items={reminders} emptyText="No queued reminders." />
                <ReminderColumn title="Reminder History" items={[...reminderHistory].reverse()} emptyText="No reminder history yet." history />
              </section>
            ) : visibleDigests.length === 0 ? (
              <div className="px-6 py-16 rounded-[28px] bg-white dark:bg-zinc-900 border border-dashed border-zinc-300 dark:border-zinc-800 text-center">
                <p className="text-lg font-semibold">No briefings found</p>
                <p className="mt-2 text-sm text-zinc-500 dark:text-zinc-400">Try another filter, date, or search term.</p>
              </div>
            ) : (
              <div className="space-y-8">
                {groupedDigests.map(([monthKey, monthDigests]) => (
                  <section key={monthKey}>
                    <div className="mb-3 flex items-center gap-3">
                      <h2 className="text-xs uppercase tracking-[0.22em] text-zinc-400 dark:text-zinc-500">
                        {monthLabel(monthKey)}
                      </h2>
                      <div className="h-px flex-1 bg-zinc-200 dark:bg-zinc-800" />
                    </div>

                    <div className="space-y-4">
                      {monthDigests.map((digest, index) => {
                        const isOpen = openCards[digest.id] ?? index === 0;
                        return (
                          <article
                            key={digest.id}
                            className="rounded-[28px] border border-zinc-200 dark:border-zinc-800 bg-white/90 dark:bg-zinc-900/90 shadow-sm overflow-hidden"
                          >
                            <button
                              onClick={() => toggleCard(digest.id)}
                              className="w-full text-left px-5 sm:px-6 py-5 flex items-start justify-between gap-4"
                            >
                              <div>
                                <div className="flex items-center gap-2 flex-wrap">
                                  <span className="text-xs uppercase tracking-[0.18em] text-zinc-400 dark:text-zinc-500">
                                    {digest.type}
                                  </span>
                                  <span className="text-zinc-300 dark:text-zinc-700">•</span>
                                  <span className="text-sm text-zinc-500 dark:text-zinc-400">{digest.date}</span>
                                </div>
                                <p className="mt-2 text-lg sm:text-xl font-bold">{digest.greeting || digest.date}</p>
                              </div>
                              <span className="text-zinc-400 text-sm font-semibold">{isOpen ? "Hide" : "Show"}</span>
                            </button>

                            {isOpen && (
                              <div className="px-5 sm:px-6 pb-6 space-y-5">
                                {digest.sections.map((section) => (
                                  <SectionCard
                                    key={`${digest.id}-${section.title}`}
                                    section={section}
                                    completed={completed}
                                    edits={edits}
                                    onToggle={toggleCompleted}
                                  />
                                ))}
                              </div>
                            )}
                          </article>
                        );
                      })}
                    </div>
                  </section>
                ))}
              </div>
            )}
          </main>
        </div>
      );
    }

    function ReminderColumn({ title, items, emptyText, history = false }) {
      return (
        <section className="rounded-[28px] border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 shadow-sm p-5 sm:p-6">
          <h2 className="text-sm font-bold mb-4">{title}</h2>
          {items.length === 0 ? (
            <p className="text-sm text-zinc-500 dark:text-zinc-400">{emptyText}</p>
          ) : (
            <div className="space-y-3">
              {items.map((item) => (
                <div key={`${item.id}-${item.addedAt || item.consumedAt || ""}`} className="rounded-2xl border border-zinc-200 dark:border-zinc-800 px-4 py-3">
                  <p className="text-sm font-semibold">{item.text || item.label || item.id}</p>
                  <p className="mt-1 text-xs text-zinc-500 dark:text-zinc-400">
                    {history
                      ? `Shown in ${item.digestId || "dashboard"} on ${item.digestDate || "unknown date"}`
                      : item.scheduledFor
                        ? `Scheduled for ${item.scheduledFor}`
                        : item.expiresAt
                          ? `Recurring until ${item.expiresAt}`
                          : "Ready for the next digest"}
                  </p>
                </div>
              ))}
            </div>
          )}
        </section>
      );
    }

    function SectionCard({ section, completed, edits, onToggle }) {
      return (
        <section className="rounded-2xl border border-zinc-200 dark:border-zinc-800 overflow-hidden">
          <div className="px-4 py-3 bg-zinc-50 dark:bg-zinc-950/60 border-b border-zinc-200 dark:border-zinc-800">
            <h3 className="text-sm font-bold">{section.title}</h3>
          </div>

          <div className="divide-y divide-zinc-200 dark:divide-zinc-800">
            {(section.items || []).map((item) => {
              const label = edits[item.id]?.label || item.label || item.id;
              const detail = edits[item.id]?.detail || item.detail || "";
              const isDone = !!completed[item.id];
              const isChecklist = !section.info;

              return (
                <div key={item.id} className="px-4 py-4">
                  <div className="flex items-start gap-3">
                    {isChecklist ? (
                      <button
                        onClick={() => onToggle(item.id)}
                        className={cx(
                          "mt-0.5 w-5 h-5 rounded-full border flex-shrink-0 transition-colors",
                          isDone
                            ? "bg-emerald-500 border-emerald-500"
                            : "border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900"
                        )}
                        aria-label={isDone ? "Mark incomplete" : "Mark complete"}
                      >
                        {isDone && <span className="block w-full text-white text-[11px] leading-5 text-center">✓</span>}
                      </button>
                    ) : (
                      <div className="mt-1 w-2.5 h-2.5 rounded-full bg-zinc-300 dark:bg-zinc-700 flex-shrink-0" />
                    )}

                    <div className="min-w-0 flex-1">
                      <div className="flex items-center gap-2 flex-wrap">
                        {item.time && (
                          <span className="text-xs font-bold uppercase tracking-[0.16em] text-zinc-400 dark:text-zinc-500">
                            {item.time}
                          </span>
                        )}
                        {item.flag && (
                          <span className="px-2 py-0.5 rounded-full text-[11px] font-semibold bg-zinc-100 text-zinc-600 dark:bg-zinc-800 dark:text-zinc-300">
                            {item.flag}
                          </span>
                        )}
                      </div>
                      <p className={cx("mt-1 text-sm sm:text-[15px] font-semibold", isDone && "line-through text-zinc-400 dark:text-zinc-500")}>
                        {label}
                      </p>
                      {detail && (
                        <p className="mt-1.5 text-sm text-zinc-600 dark:text-zinc-300 leading-relaxed">
                          {detail}
                        </p>
                      )}
                      {item.note && (
                        <p className="mt-2 text-xs text-zinc-500 dark:text-zinc-400">{item.note}</p>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
