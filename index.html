/* ═══ Toggl Review Component (redesigned) ═══ */
function TogglReviewTab({ onBack }) {
  const [entries, setEntries] = useState([]);
  const [reviewDate, setReviewDate] = useState("");
  const [loading, setLoading] = useState(true);
  const [expandedId, setExpandedId] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [error, setError] = useState(null);

  // Load from Supabase (id=2)
  useEffect(() => {
    (async () => {
      try {
        const { data: item, error: err } = await supabase.from('app_state').select('data').eq('id', 2).single();
        if (err || !item?.data?.entries || item.data.entries.length === 0 || item.data.submitted) { setLoading(false); return; }
        setEntries(item.data.entries);
        setReviewDate(item.data.date || "");
      } catch { }
      setLoading(false);
    })();
  }, []);

  const toAST = (utc) => new Date(utc).toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit", timeZone:"America/Santo_Domingo" });
  const durMin = (start, end) => Math.round((new Date(end) - new Date(start)) / 60000);
  const totalMin = entries.reduce((sum, e) => sum + durMin(e.start, e.end), 0);
  const totalH = (totalMin / 60).toFixed(1);
  const pctOf8 = Math.min(100, Math.round((totalMin / 480) * 100));

  const utilizedMin = entries.filter(e => {
    const proj = TOGGL_PROJECTS.find(p => p.id === e.project_id);
    return proj && (proj.client.startsWith("Utilized"));
  }).reduce((sum, e) => sum + durMin(e.start, e.end), 0);
  const utilPct = totalMin > 0 ? Math.round((utilizedMin / totalMin) * 100) : 0;

  const updateEntry = (id, field, value) => {
    setEntries(prev => prev.map(e => {
      if (e.id !== id) return e;
      const updated = { ...e, [field]: value };
      if (field === "project_id") {
        const proj = TOGGL_PROJECTS.find(p => p.id === value);
        if (proj) {
          updated.project_name = proj.name;
          updated.client_name = proj.client;
          updated.subcategory = proj.subs[0] || "";
        }
      }
      return updated;
    }));
  };

  const removeEntry = (id) => setEntries(prev => prev.filter(e => e.id !== id));

  // Only proposed entries get submitted — existing Toggl entries are read-only
  const proposedEntries = useMemo(() => entries.filter(e => e.source !== "toggl"), [entries]);
  const existingEntries = useMemo(() => entries.filter(e => e.source === "toggl"), [entries]);

  const submitToToggl = async () => {
    setSubmitting(true);
    const proxyUrl = SUPABASE_URL + "/functions/v1/toggl-proxy";
    let ok = 0, fail = 0;
    for (const e of proposedEntries) {
      // Resolve task_id + billable from project + subcategory
      const proj = TOGGL_PROJECTS.find(p => p.id === e.project_id);
      const taskId = e.task_id || proj?.tasks?.[e.subcategory] || (proj?.tasks ? Object.values(proj.tasks)[0] : null);
      const togglBody = {
        description: e.description,
        start: e.start,
        stop: e.end,
        duration: durMin(e.start, e.end) * 60,
        project_id: e.project_id,
        task_id: taskId,
        billable: proj?.billable ?? false,
        workspace_id: TOGGL_WS,
        tag_ids: e.tag_ids || [],
        created_with: "madison-dashboard"
      };
      const method = e.existing_entry_id ? "PUT" : "POST";
      const togglUrl = e.existing_entry_id
        ? "https://api.track.toggl.com/api/v9/workspaces/" + TOGGL_WS + "/time_entries/" + e.existing_entry_id
        : "https://api.track.toggl.com/api/v9/workspaces/" + TOGGL_WS + "/time_entries";
      try {
        const r = await fetch(proxyUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ method, url: togglUrl, body: togglBody, toggl_api_key: TOGGL_KEY })
        });
        if (r.ok) ok++; else fail++;
      } catch { fail++; }
    }
    setSubmitting(false);
    if (fail === 0) {
      setSubmitted(true);
      // Clear review data — mark as submitted so refresh doesn't reload them
      const { error: clearErr } = await supabase.from('app_state').update({ data: { submitted: true, date: reviewDate, entries: [] } }).eq('id', 2);
      if (clearErr) console.error("Failed to clear Supabase:", clearErr);
    } else {
      setError(ok + " submitted, " + fail + " failed.");
    }
  };

  const sourceIcon = (s) => s === "toggl" ? "✅" : s === "calendar" ? "📅" : s === "pattern" ? "🔄" : "✋";
  const sourceLabel = (s) => s === "toggl" ? "Already in Toggl" : s === "calendar" ? "From calendar" : s === "pattern" ? "Proposed" : "Manual";

  // Sort entries by start time
  const sorted = useMemo(() => [...entries].sort((a, b) => new Date(a.start) - new Date(b.start)), [entries]);

  if (loading) {
    return (
      <div className="fade-in">
        <div className="flex items-center gap-3 mb-6">
          <div className="h-8 w-48 bg-zinc-200 dark:bg-zinc-800 rounded-lg animate-pulse" />
        </div>
        {[1,2,3,4].map(i => (
          <div key={i} className="h-16 bg-zinc-100 dark:bg-zinc-800/50 rounded-2xl mb-3 animate-pulse" />
        ))}
      </div>
    );
  }

  if (submitted) {
    return (
      <div className="fade-in text-center py-20 px-6 rounded-[2rem] bg-emerald-50/50 dark:bg-emerald-900/10 border border-emerald-200/50 dark:border-emerald-800/30">
        <div className="w-14 h-14 bg-emerald-100 dark:bg-emerald-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
          <Icon.Check size={24} className="text-emerald-500" />
        </div>
        <p className="text-base font-bold text-emerald-700 dark:text-emerald-300 mb-1">All {entries.length} entries submitted to Toggl</p>
        <p className="text-sm text-zinc-500 dark:text-zinc-400">You're all set for {reviewDate}.</p>
        <button onClick={onBack} className="mt-6 px-5 py-2.5 text-sm font-bold rounded-xl bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 hover:bg-zinc-800 dark:hover:bg-white transition-all">
          Back to briefings
        </button>
      </div>
    );
  }

  if (entries.length === 0) {
    return (
      <div className="fade-in text-center py-20 px-6 rounded-[2rem] border border-dashed border-zinc-300 dark:border-zinc-700 bg-white/50 dark:bg-zinc-800/30">
        <div className="w-14 h-14 bg-violet-100 dark:bg-violet-900/20 rounded-full flex items-center justify-center mx-auto mb-4">

      {/* Actions */}
      <div className="flex items-center justify-between mt-8 pt-6 border-t border-zinc-100 dark:border-zinc-800">
        <span className="text-xs font-medium text-zinc-400 dark:text-zinc-500">{existingEntries.length} in Toggl · {proposedEntries.length} proposed · {totalH}h total</span>

          {submitting ? "Submitting..." : proposedEntries.length > 0 ? "Submit " + proposedEntries.length + " new entries to Toggl" : "Nothing to submit"}

      </div>
    </div>
  );
}

/* ═══ CoE Portfolio Dashboard — Minimalist Card Design ═══ */

/* Mini ring chart component — pure SVG, no Chart.js */
function MiniRing({ value, total, color, size = 48, stroke = 5 }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const pct = total > 0 ? value / total : 0;
  const dk = document.documentElement.classList.contains("dark");
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={dk ? "rgba(255,255,255,0.10)" : "#e5e7eb"} strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.25s ease-out"}}/>
    </svg>
  );
}

/* Mini horizontal bar — pure div */
function MiniBar({ value, max, color = "#818cf8" }) {
  const pct = max > 0 ? Math.min((value / max) * 100, 100) : 0;
  const dk = document.documentElement.classList.contains("dark");
  return (
    <div className="h-1.5 rounded-full w-full" style={{background: dk ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.05)"}}>
      <div className="h-1.5 rounded-full" style={{width:`${pct}%`, background:color, transition:"width 0.5s ease"}}/>
    </div>
  );
}

/* ═══ Avatar Hub — status ring + stats popover + settings + email badge ═══ */
function AvatarHub({ digests, completed, reminders, theme, onThemeToggle }) {
  const [open, setOpen] = useState(false);
  const [emailPanel, setEmailPanel] = useState(false);
  const [unrepliedEmails, setUnrepliedEmails] = useState([]);
  const [emailsUpdatedAt, setEmailsUpdatedAt] = useState(null);
  const wrapperRef = useRef(null);

  // Fetch unreplied emails once on mount (data comes from scheduled task)
  useEffect(() => {
    let mounted = true;
    readUnrepliedEmails().then(data => {
      if (mounted) {
        setUnrepliedEmails(data.emails || []);
        setEmailsUpdatedAt(data.updatedAt || null);
      }
    });
    return () => { mounted = false; };
  }, []);

  const emailCount = unrepliedEmails.length;
  const _now = new Date();
  const _isWeekend = _now.getDay() === 0 || _now.getDay() === 6;
  const avatarSrc = _isWeekend ? "weekend-avatar.png" : (_now.getHours() >= 18 ? "avatar-evening.png" : "avatar.png");

  // Dismiss a single email — remove locally + update Supabase
  const dismissEmail = useCallback(async (emailId) => {
    setUnrepliedEmails(prev => {
      const next = prev.filter(e => e.id !== emailId);
      // Fire-and-forget Supabase update
      supabase.from('app_state').upsert({ id: 3, data: { emails: next, updatedAt: new Date().toISOString() } }).then(() => {
        console.log("[emails] dismissed", emailId);
      });
      return next;
    });
  }, []);

  useEffect(() => {
    if (!open && !emailPanel) return;
    const handler = (e) => {
      if (wrapperRef.current && !wrapperRef.current.contains(e.target)) { setOpen(false); setEmailPanel(false); }
    };
    const esc = (e) => { if (e.key === "Escape") { setOpen(false); setEmailPanel(false); } };
    document.addEventListener("mousedown", handler);
    document.addEventListener("keydown", esc);
    return () => {
      document.removeEventListener("mousedown", handler);
      document.removeEventListener("keydown", esc);
    };
  }, [open, emailPanel]);

  // Today detection
  const now = new Date();
  const dayOfWeek = now.getDay(); // 0 = Sun, 6 = Sat
  const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
  const pad = (n) => String(n).padStart(2, "0");
  const todayIso = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
  const dayName = now.toLocaleDateString("en-US", { weekday: "long" });

  // Today's digest (most relevant one — exact match, then latest)
  const todayDigest = useMemo(() => {
    return digests.find(d => d.isoDate === todayIso) || digests[0] || null;
  }, [digests, todayIso]);

  const stats = useMemo(() => {
    if (!todayDigest) return { total: 0, done: 0, pct: 0, urgent: 0 };
    const actionItems = todayDigest.sections.filter(s => !s.info).flatMap(s => s.items);
    const total = actionItems.length;
    const done = actionItems.filter(i => completed[i.id]).length;
    const urgent = actionItems.filter(i => i.flag === "urgent" && !completed[i.id]).length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    return { total, done, pct, urgent };
  }, [todayDigest, completed]);

  const perfectDays = useMemo(() => {
    let count = 0;
    for (const d of digests) {
      const items = d.sections.filter(s => !s.info).flatMap(s => s.items);
      if (items.length === 0) continue;
      if (items.every(i => completed[i.id])) count++;
    }
    return count;
  }, [digests, completed]);

  // Ring state (weekday only)
  // - no items or no urgent pending → calm green wave
  // - urgent pending → solid red
  const isCalm = !isWeekend && stats.urgent === 0;
  const ringColor = stats.urgent > 0 ? "#ef4444" : "#10b981";

  return (
    <div ref={wrapperRef} className="relative">
      <button
        onClick={() => { if (emailCount > 0 && !emailPanel) { setEmailPanel(true); setOpen(false); } else { setOpen(!open); setEmailPanel(false); } }}
        className={`relative rounded-full transition-transform hover:scale-105 active:scale-95 ${isWeekend ? "weekend-breathe" : ""}`}
        title={emailCount > 0 ? `${emailCount} correo${emailCount === 1 ? "" : "s"} sin contestar` : "Your day at a glance"}
        aria-label={emailCount > 0 ? "View unreplied emails" : "Open profile menu"}
      >
        {/* Status ring */}
        <div
          className={`absolute inset-0 rounded-full ${isWeekend ? "weekend-ring" : isCalm && emailCount === 0 ? "calm-ring" : ""}`}
          style={!isWeekend && (!isCalm || emailCount > 0) ? { background: emailCount > 0 ? "#ef4444" : ringColor } : undefined}
        />
        {/* Avatar image (with inset padding so ring shows) */}
        <div className="relative m-[3px] w-14 h-14 sm:w-16 sm:h-16 md:w-24 md:h-24 rounded-full overflow-hidden border-2 border-white dark:border-zinc-900 shadow-lg shadow-zinc-300/40 dark:shadow-zinc-950/60">
          <img src={avatarSrc} alt="Jean" className="w-full h-full object-cover" onError={(e) => { e.target.style.display = 'none'; }} />
        </div>
        {/* Email badge — red circle with count */}
        {emailCount > 0 && (
          <div className="absolute -top-0.5 -right-0.5 md:top-0 md:right-0 z-10 flex items-center justify-center min-w-[20px] h-[20px] md:min-w-[26px] md:h-[26px] px-1 rounded-full bg-red-500 border-2 border-white dark:border-zinc-900 email-badge-pulse">
            <span className="text-[10px] md:text-xs font-extrabold text-white tabular-nums leading-none">{emailCount}</span>
          </div>
        )}
      </button>

      {open && (
        <div className="absolute top-full right-0 mt-3 w-[300px] bg-white dark:bg-zinc-900 rounded-2xl shadow-xl border border-zinc-200 dark:border-zinc-800 p-5 z-50 fade-in">
          {/* Header */}
          <div className="flex items-center gap-3 mb-5">
            <img src={avatarSrc} alt="" className="w-11 h-11 rounded-full object-cover border-2 border-white dark:border-zinc-800 shadow-sm" onError={(e) => { e.target.style.display = 'none'; }} />
            <div>
              <p className="text-sm font-extrabold text-zinc-900 dark:text-zinc-50">Jean</p>
              <p className="text-xs font-medium text-zinc-400 dark:text-zinc-500">{dayName}{isWeekend ? " · Weekend mode" : ""}</p>
            </div>
          </div>

          {/* Today progress */}
          {stats.total > 0 ? (
            <div className="mb-5">
              <div className="flex items-center justify-between mb-2">
                <span className="text-[10px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500">Today</span>
                <span className={`text-xs font-bold tabular-nums ${stats.pct === 100 ? "text-emerald-500" : "text-zinc-700 dark:text-zinc-300"}`}>{stats.done}/{stats.total} &middot; {stats.pct}%</span>
              </div>
              <div className="h-1.5 bg-zinc-100 dark:bg-zinc-800 rounded-full overflow-hidden">
                <div
                  className="h-full rounded-full transition-all duration-500 relative overflow-hidden"
                  style={{
                    width: `${stats.pct}%`,
                    background: stats.pct === 100 ? "#10b981" : stats.urgent > 0 ? "#ef4444" : "#3b82f6"
                  }}
                >
                  {stats.pct > 0 && stats.pct < 100 && (
                    <div className="absolute inset-y-0 progress-shimmer" style={{ background: "linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%)", width: "70%" }} />
                  )}
                </div>
              </div>
            </div>
          ) : (
            <div className="mb-5 py-3 text-center text-xs text-zinc-400 dark:text-zinc-500 italic">No briefing for today yet.</div>
          )}

          {/* Stat chips */}
          <div className="grid grid-cols-2 gap-2 mb-5">
            <div className={`rounded-xl px-3 py-2.5 ${stats.urgent > 0 ? "bg-red-50 dark:bg-red-500/10" : "bg-zinc-50 dark:bg-zinc-800/50"}`}>
              <div className={`text-lg font-extrabold tabular-nums ${stats.urgent > 0 ? "text-red-500" : "text-zinc-300 dark:text-zinc-600"}`}>{stats.urgent}</div>
              <div className="text-[10px] font-bold uppercase tracking-wider text-zinc-500 dark:text-zinc-400">Urgent left</div>
            </div>
            <div className={`rounded-xl px-3 py-2.5 ${reminders.length > 0 ? "bg-blue-50 dark:bg-blue-500/10" : "bg-zinc-50 dark:bg-zinc-800/50"}`}>
              <div className={`text-lg font-extrabold tabular-nums ${reminders.length > 0 ? "text-blue-500" : "text-zinc-300 dark:text-zinc-600"}`}>{reminders.length}</div>
              <div className="text-[10px] font-bold uppercase tracking-wider text-zinc-500 dark:text-zinc-400">Reminders</div>
            </div>
          </div>

          {/* Actions */}
          <div className="pt-4 border-t border-zinc-100 dark:border-zinc-800 space-y-1">
            <button
              onClick={() => { onThemeToggle(); }}
              className="w-full flex items-center justify-between py-2.5 px-3 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors group"
            >

/* ═══ Calendar Button — date picker for jumping to briefings ═══ */
function CalendarButton({ digests, selectedDate, onSelect }) {
  const [open, setOpen] = useState(false);
  const [monthCursor, setMonthCursor] = useState(() => {
    const seed = selectedDate ? new Date(selectedDate + "T00:00:00") : new Date();
    return new Date(seed.getFullYear(), seed.getMonth(), 1);
  });
  const wrapperRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setOpen(false);
    };
    const esc = (e) => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", handler);
    document.addEventListener("keydown", esc);
    return () => {
      document.removeEventListener("mousedown", handler);
      document.removeEventListener("keydown", esc);
    };
  }, [open]);

  const datesWithDigests = useMemo(() => {
    const map = new Map();
    for (const d of digests) {
      if (!d.isoDate) continue;
      map.set(d.isoDate, (map.get(d.isoDate) || 0) + 1);
    }
    return map;
  }, [digests]);

  const year = monthCursor.getFullYear();
  const month = monthCursor.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  const todayIso = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${today.getDate().toString().padStart(2, "0")}`;

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const monthLabel = monthCursor.toLocaleDateString("en-US", { month: "long", year: "numeric" });
  const hasAny = datesWithDigests.size > 0;

  return (
    <div ref={wrapperRef} className="relative flex-shrink-0">
      <button
        onClick={() => setOpen(!open)}
        className={`flex items-center justify-center w-[46px] h-[46px] rounded-2xl border shadow-sm transition-all ${
          open || selectedDate
            ? "bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 border-zinc-900 dark:border-white"
            : "bg-white/80 dark:bg-zinc-800/80 backdrop-blur-md text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white border-zinc-200 dark:border-zinc-700 hover:border-zinc-300 dark:hover:border-zinc-600"
        }`}
        title="Browse by date"
        aria-label="Open calendar"
      >
        <Icon.Calendar size={18} />
      </button>

      {open && (
        <div className="absolute top-full right-0 mt-2 w-[300px] bg-white dark:bg-zinc-900 rounded-2xl shadow-xl border border-zinc-200 dark:border-zinc-800 p-4 z-50 fade-in">
          {/* Month nav */}
          <div className="flex items-center justify-between mb-4">
            <button
              onClick={() => setMonthCursor(new Date(year, month - 1, 1))}
              className="p-2 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 dark:text-zinc-400 transition-colors"
              aria-label="Previous month"
            >
              <Icon.ChevronRight size={14} className="rotate-180" />
            </button>
            <h3 className="text-sm font-bold text-zinc-900 dark:text-zinc-100 tabular-nums">{monthLabel}</h3>
            <button
              onClick={() => setMonthCursor(new Date(year, month + 1, 1))}
              className="p-2 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 dark:text-zinc-400 transition-colors"
              aria-label="Next month"
            >
              <Icon.ChevronRight size={14} />
            </button>
          </div>

          {/* Weekday headers */}
          <div className="grid grid-cols-7 gap-1 mb-1">
            {["S","M","T","W","T","F","S"].map((d, i) => (
              <div key={i} className="text-center text-[10px] font-bold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider py-1">{d}</div>
            ))}
          </div>

          {/* Day grid */}
          <div className="grid grid-cols-7 gap-1">
            {cells.map((day, i) => {
              if (day === null) return <div key={i} className="h-9" />;
              const iso = `${year}-${pad(month + 1)}-${pad(day)}`;
              const hasD = datesWithDigests.has(iso);
              const isToday = iso === todayIso;
              const isSelected = iso === selectedDate;
              return (
                <button
                  key={i}
                  onClick={() => { if (hasD) { onSelect(iso); setOpen(false); } }}
                  disabled={!hasD}
                  className={`relative h-9 rounded-lg text-xs font-semibold transition-all flex items-center justify-center tabular-nums ${
                    isSelected
                      ? "bg-blue-500 text-white shadow-md shadow-blue-500/30"
                      : hasD
                        ? "text-zinc-900 dark:text-zinc-100 hover:bg-zinc-100 dark:hover:bg-zinc-800 cursor-pointer"
                        : "text-zinc-300 dark:text-zinc-700 cursor-not-allowed"
                  } ${isToday && !isSelected ? "ring-1 ring-blue-400 ring-inset" : ""}`}
                  title={hasD ? `${datesWithDigests.get(iso)} briefing${datesWithDigests.get(iso) > 1 ? "s" : ""}` : undefined}
                >
                  {day}
                  {hasD && !isSelected && (
                    <span className="absolute bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-blue-500" />
                  )}
                </button>
              );
            })}
          </div>

          {/* Footer actions */}
          <div className="mt-3 pt-3 border-t border-zinc-100 dark:border-zinc-800 flex gap-2">
            <button
              onClick={() => {
                setMonthCursor(new Date(today.getFullYear(), today.getMonth(), 1));
                if (datesWithDigests.has(todayIso)) { onSelect(todayIso); setOpen(false); }
              }}
              className="flex-1 py-2 text-xs font-bold text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-white bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-lg transition-colors"
            >
              Today
            </button>
            {selectedDate && (
              <button
                onClick={() => { onSelect(null); setOpen(false); }}
                className="flex-1 py-2 text-xs font-bold text-zinc-600 dark:text-zinc-300 hover:text-red-500 dark:hover:text-red-400 bg-zinc-100 dark:bg-zinc-800 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-lg transition-colors"
              >
                Clear filter
              </button>
            )}
          </div>

          {!hasAny && (
            <p className="text-[10px] text-zinc-400 dark:text-zinc-500 text-center mt-3 italic">No briefings available yet.</p>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══ Reactions ═══ */
const REACTION_EMOJIS = ["🧠", "❗", "⭐", "📌"];

function ReactionPicker({ currentEmoji, anchor, onPick, onRemove, onClose }) {
  const ref = useRef(null);

  useEffect(() => {
    const onDown = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("mousedown", onDown);
    document.addEventListener("keydown", onKey);
    return () => {
      document.removeEventListener("mousedown", onDown);
      document.removeEventListener("keydown", onKey);
    };
  }, [onClose]);

  // Clamp position to viewport so picker never overflows. Width estimate covers the
  // 4 emoji buttons plus the optional Remove pill so reactions-with-Remove still fit.
  const PAD = 8;
  const W = currentEmoji ? 280 : 200;
  const H = 44;
  const x = Math.max(PAD, Math.min((anchor?.x ?? PAD), window.innerWidth - W - PAD));
  const y = Math.max(PAD, Math.min((anchor?.y ?? PAD), window.innerHeight - H - PAD));

  // Portal to <body> so backdrop-blur / overflow-hidden ancestors don't trap or clip us.
  return ReactDOM.createPortal(
    <div
      ref={ref}
      style={{ position: "fixed", left: x, top: y }}
      onClick={e => e.stopPropagation()}
      onContextMenu={e => e.preventDefault()}
      className="z-50 flex items-center gap-1 px-2 py-1.5 rounded-xl bg-white dark:bg-zinc-800 shadow-lg border border-zinc-200 dark:border-zinc-700"
    >
      {REACTION_EMOJIS.map(em => (
        <button
          key={em}
          onClick={() => { if (em !== currentEmoji) onPick(em); onClose(); }}
          className={`text-lg leading-none w-9 h-9 rounded-lg transition-all hover:scale-110 active:scale-95 ${currentEmoji === em ? "bg-zinc-100 dark:bg-zinc-700 ring-1 ring-blue-400" : "hover:bg-zinc-100 dark:hover:bg-zinc-700"}`}
          title={`React with ${em}`}
          aria-label={`React with ${em}`}
        >
          {em}
        </button>
      ))}
      {currentEmoji && (
        <button
          onClick={() => { onRemove(); onClose(); }}
          className="ml-1 text-[10px] font-bold uppercase tracking-wider text-zinc-500 hover:text-red-500 px-2 h-9 rounded-lg hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors"
          title="Remove reaction"
        >
          Remove
        </button>
      )}
    </div>,
    document.body
  );
}

/* ═══ Text highlight helper ═══ */
function highlight(text, query) {
  if (!query || !text) return text;
  const q = query.trim().toLowerCase();
  if (!q) return text;
  const lower = text.toLowerCase();
  const out = [];
  let i = 0, key = 0;
  while (i < text.length) {
    const idx = lower.indexOf(q, i);
    if (idx === -1) { out.push(text.slice(i)); break; }
    if (idx > i) out.push(text.slice(i, idx));
    out.push(
      <mark key={key++} className="bg-amber-200/80 dark:bg-amber-400/30 text-zinc-900 dark:text-amber-100 px-0.5 rounded-sm font-semibold">
        {text.slice(idx, idx + q.length)}
      </mark>
    );
    i = idx + q.length;
  }
  return out;
}

function itemMatches(item, q) {
  if (!q) return false;
  return item.label.toLowerCase().includes(q) || (item.detail || "").toLowerCase().includes(q);
}

function sectionMatches(section, q) {
  if (!q) return false;
  return section.title.toLowerCase().includes(q) || section.items.some(i => itemMatches(i, q));
}

/* ═══ CheckItem (interactive + inline edit) ═══ */
function CheckItem({ item, done, onToggle, searchQuery, editOverride, onEdit, reaction, onSetReaction }) {
  const [editing, setEditing] = useState(false);
  const [editLabel, setEditLabel] = useState("");
  const [editDetail, setEditDetail] = useState("");
  const labelRef = useRef(null);
  const [picker, setPicker] = useState(null); // null | {x, y}
  const longPressTimer = useRef(null);
  const longPressFired = useRef(false);
  const touchStart = useRef(null);

  const displayLabel = editOverride?.label || item.label;
  const displayDetail = editOverride?.detail !== undefined ? editOverride.detail : (item.detail || "");

  const startEdit = (e) => {
    e.stopPropagation();
    setEditLabel(displayLabel);
    setEditDetail(displayDetail);
    setEditing(true);
  };

  const saveEdit = (e) => {
    e.stopPropagation();
    if (editLabel.trim() && onEdit) {
      onEdit(item.id, { label: editLabel.trim(), detail: editDetail.trim() });
    }
    setEditing(false);
  };

  const cancelEdit = (e) => {
    e.stopPropagation();
    setEditing(false);
  };

  const openPicker = (e, x, y) => {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    setPicker({ x, y });
  };
  const closePicker = useCallback(() => setPicker(null), []);

  const onContextMenu = (e) => {
    if (done) return;
    openPicker(e, e.clientX, e.clientY);
  };

  const onTouchStart = (e) => {
    if (done) return;
    longPressFired.current = false;
    const t = e.touches[0];
    touchStart.current = { x: t.clientX, y: t.clientY };
    // Capture currentTarget synchronously — React pools the event, so it may be null after the timeout.
    const el = e.currentTarget;
    longPressTimer.current = setTimeout(() => {
      longPressFired.current = true;
      const rect = el.getBoundingClientRect();
      openPicker(null, rect.left + 16, rect.top + rect.height + 4);
    }, 500);
  };
  const onTouchMove = (e) => {
    if (!touchStart.current) return;
    const t = e.touches[0];
    if (Math.abs(t.clientX - touchStart.current.x) > 10 || Math.abs(t.clientY - touchStart.current.y) > 10) {
      clearTimeout(longPressTimer.current);
      touchStart.current = null;
    }
  };
  const onTouchEnd = () => {
    clearTimeout(longPressTimer.current);
    touchStart.current = null;
  };

  const onRowClick = (e) => {
    if (longPressFired.current) { longPressFired.current = false; return; }
    onToggle();
  };

  const openPickerFromButton = (e) => {
    e.stopPropagation();
    const rect = e.currentTarget.getBoundingClientRect();
    openPicker(e, rect.left, rect.bottom + 4);
  };

  useEffect(() => {
    if (editing && labelRef.current) {
      labelRef.current.focus();
      labelRef.current.select();
    }
  }, [editing]);

  useEffect(() => () => clearTimeout(longPressTimer.current), []);

  if (editing) {
    return (
      <div
        onClick={e => e.stopPropagation()}
        className="py-3 px-3 rounded-xl bg-blue-50/60 dark:bg-blue-500/5 border border-blue-200 dark:border-blue-500/20 transition-all duration-200"
      >
        <div className="flex items-start gap-3 mb-3">
          <div className="mt-1.5 w-5 h-5 rounded-full flex-shrink-0 border border-zinc-300 dark:border-zinc-600 bg-white dark:bg-zinc-900" />
          <div className="flex-1 space-y-2">
            <textarea
              ref={labelRef}
              value={editLabel}
              onChange={e => setEditLabel(e.target.value)}
              rows={2}
              onKeyDown={e => { if (e.key === "Escape") cancelEdit(e); if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) saveEdit(e); }}
              className="w-full text-sm font-medium text-zinc-800 dark:text-zinc-200 bg-white dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-600 focus:border-blue-400 dark:focus:border-blue-500 rounded-lg px-2.5 py-1.5 resize-none outline-none transition-colors"
              placeholder="Label..."
            />
            <textarea
              value={editDetail}
              onChange={e => setEditDetail(e.target.value)}
              rows={3}
              onKeyDown={e => { if (e.key === "Escape") cancelEdit(e); if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) saveEdit(e); }}
              className="w-full text-xs text-zinc-500 dark:text-zinc-400 bg-white dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-600 focus:border-blue-400 dark:focus:border-blue-500 rounded-lg px-2.5 py-1.5 resize-none outline-none transition-colors"
              placeholder="Detail (optional)..."
            />
            <p className="text-[10px] text-zinc-400 dark:text-zinc-500">⌘↵ to save · Esc to cancel</p>
          </div>
        </div>
        <div className="flex justify-end gap-2 pl-8">
          <button onClick={cancelEdit} className="text-xs font-medium text-zinc-500 hover:text-zinc-700 dark:text-zinc-400 dark:hover:text-zinc-200 px-3 py-1.5 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-700 transition-colors">Cancel</button>
          <button onClick={saveEdit} className="text-xs font-bold text-blue-600 dark:text-blue-400 px-3 py-1.5 rounded-lg bg-blue-100 dark:bg-blue-500/15 hover:bg-blue-200 dark:hover:bg-blue-500/25 transition-colors">Save edit</button>
        </div>
      </div>
    );
  }

  return (
    <div
      onClick={onRowClick}
      onContextMenu={onContextMenu}
      onTouchStart={onTouchStart}
      onTouchMove={onTouchMove}
      onTouchEnd={onTouchEnd}
      onTouchCancel={onTouchEnd}
      className={`group relative flex items-start gap-3 py-3 px-3 rounded-xl cursor-pointer select-none transition-all duration-200 hover:bg-zinc-100/50 dark:hover:bg-zinc-800/50 ${done ? "opacity-40" : ""}`}
    >
      <div className={`mt-0.5 w-5 h-5 rounded-full flex-shrink-0 flex items-center justify-center transition-all duration-300 ${done ? "bg-emerald-500 shadow-sm shadow-emerald-500/20 scale-105" : "border border-zinc-300 dark:border-zinc-600 bg-white dark:bg-zinc-900 group-hover:border-zinc-400 dark:group-hover:border-zinc-500"}`}>
        {done && <Icon.Check size={11} color="white" />}
      </div>
      <div className="flex-1 min-w-0 transition-transform duration-200 group-hover:translate-x-1">
        <div className="flex items-center gap-2 flex-wrap">
          <span className={`text-sm leading-snug transition-colors duration-200 ${done ? "line-through text-zinc-400 dark:text-zinc-500" : "text-zinc-800 dark:text-zinc-200 font-medium"}`}>{highlight(displayLabel, searchQuery)}</span>
          {item.flag === "urgent" && !done && <span className="w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)] flex-shrink-0" />}
          {item.flag === "due" && !done && <span className="w-1.5 h-1.5 rounded-full bg-amber-500 shadow-[0_0_8px_rgba(245,158,11,0.5)] flex-shrink-0" />}
          {editOverride && !done && <span className="text-[9px] uppercase tracking-wider font-bold text-blue-400 dark:text-blue-500 px-1 py-0.5 bg-blue-50 dark:bg-blue-500/10 rounded flex-shrink-0">edited</span>}
          {reaction && <span className="text-base leading-none flex-shrink-0" title="Your reaction">{reaction.emoji}</span>}
        </div>
        {displayDetail && !done && <p className="text-xs text-zinc-500 dark:text-zinc-400 leading-relaxed mt-1">{highlight(displayDetail, searchQuery)}</p>}
      </div>
      {!done && onSetReaction && (
        <button
          onClick={openPickerFromButton}

/* ═══ Section ═══ */
function Section({ section, completed, onToggle, defaultCollapsed, searchQuery, edits, onEditItem, reactions, onSetReaction }) {
  const [collapsed, setCollapsed] = useState(defaultCollapsed);
  const isInfo = !!section.info;
  const doneCount = isInfo ? 0 : section.items.filter(i => completed[i.id]).length;
  const total = section.items.length;
  const tint = TINT[section.title] || TINT.default;
  const q = (searchQuery || "").trim().toLowerCase();
  const hasMatch = q ? sectionMatches(section, q) : false;
  const effectiveCollapsed = q ? !hasMatch : collapsed;

  return (
    <div className="mb-6 last:mb-0">
      <button onClick={() => setCollapsed(!collapsed)} disabled={!!q} className="flex items-center gap-2 mb-1.5 w-full text-left group disabled:cursor-default">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
          className={`text-zinc-400 dark:text-zinc-500 transition-transform duration-200 group-hover:text-zinc-600 dark:group-hover:text-zinc-300 ${effectiveCollapsed ? "" : "rotate-90"}`}>
          <polyline points="9 18 15 12 9 6"/>
        </svg>
        <span className="w-1.5 h-1.5 rounded-full flex-shrink-0 shadow-sm" style={{ background: tint, opacity: 0.8 }} />
        <h3 className="text-xs font-bold uppercase tracking-wider text-zinc-500 dark:text-zinc-400 transition-colors group-hover:text-zinc-700 dark:group-hover:text-zinc-200">{highlight(section.title, searchQuery)}</h3>
        {!isInfo && doneCount === total && total > 0 && <Icon.Check size={12} className="text-emerald-500 drop-shadow-sm" />}
        {!isInfo && doneCount > 0 && doneCount < total && <span className="text-[10px] font-bold text-zinc-400 bg-zinc-100 dark:bg-zinc-800 px-1.5 py-0.5 rounded-md">{doneCount}/{total}</span>}
      </button>

      <div className={`grid transition-all duration-300 ease-in-out ${effectiveCollapsed ? "grid-rows-[0fr] opacity-0" : "grid-rows-[1fr] opacity-100"}`}>
        <div className="overflow-hidden">
          <div className="pl-1 pt-1 pb-1">
            {isInfo
              ? section.items.map(item => <InfoItem key={item.id} item={item} searchQuery={searchQuery} />)
              : section.items.map(item => (
                  <CheckItem
                    key={item.id}
                    item={item}
                    done={!!completed[item.id]}
                    onToggle={() => onToggle(item.id)}
                    searchQuery={searchQuery}
                    editOverride={edits ? edits[item.id] : null}
                    onEdit={onEditItem || null}
                    reaction={reactions ? reactions[item.id] : null}
                    onSetReaction={onSetReaction || null}
                  />
                ))
            }
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ DigestCard ═══ */
function DigestCard({ digest, completed, onToggle, onDelete, onRestore, defaultOpen, searchQuery, edits, onEditItem, reactions, onSetReaction }) {
  const [open, setOpen] = useState(defaultOpen);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const actionItems = digest.sections.filter(s => !s.info).flatMap(s => s.items);
  const total = actionItems.length;
  const doneCount = actionItems.filter(i => completed[i.id]).length;
  const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;
  const q = (searchQuery || "").trim().toLowerCase();
  const effectiveOpen = q ? true : open;

  const matchCount = useMemo(() => {
    if (!q) return 0;
    let n = 0;
    if (digest.date.toLowerCase().includes(q)) n++;
    if ((digest.greeting || "").toLowerCase().includes(q)) n++;
    for (const s of digest.sections) {
      if (s.title.toLowerCase().includes(q)) n++;
      for (const i of s.items) {
        if (i.label.toLowerCase().includes(q)) n++;
        if ((i.detail || "").toLowerCase().includes(q)) n++;
      }
    }
    return n;
  }, [q, digest]);

  return (
    <div className="mb-10 sm:mb-12 transition-all duration-300 w-full relative">
             
      <div className="flex items-center gap-2 mb-4 px-1 sm:px-4">
        <button onClick={() => setOpen(!open)} disabled={!!q} className="flex items-center gap-3 group flex-1 text-left disabled:cursor-default">
          <div className={`p-1.5 rounded-full bg-zinc-100 dark:bg-zinc-800 transition-transform duration-300 ${effectiveOpen ? "rotate-0" : "-rotate-90"}`}>
            <Icon.ChevronDown size={14} className="text-zinc-500 dark:text-zinc-400 group-hover:text-zinc-800 dark:group-hover:text-zinc-200 transition-colors" />
          </div>
          <div>
            <h2 className={`text-lg font-bold tracking-tight transition-colors ${onRestore ? "text-zinc-400 dark:text-zinc-500" : "text-zinc-900 dark:text-zinc-50"}`}>{highlight(digest.date, searchQuery)}</h2>
            <div className="flex items-center gap-2 mt-0.5">
               <span className="text-[10px] font-bold text-zinc-400 dark:text-zinc-500 uppercase tracking-widest">{digest.type}</span>
            </div>
          </div>
        </button>
        {q && matchCount > 0 && (
          <span className="text-[10px] font-bold text-amber-700 dark:text-amber-300 bg-amber-100 dark:bg-amber-500/20 px-2 py-0.5 rounded-full tabular-nums mr-2" title={`${matchCount} match${matchCount > 1 ? "es" : ""}`}>{matchCount} match{matchCount > 1 ? "es" : ""}</span>
        )}
        {total > 0 && !onRestore && !q && (
          <div className="flex flex-col items-end gap-1 mr-2">
             <span className="text-[10px] font-bold text-zinc-400 bg-zinc-100 dark:bg-zinc-800 px-2 py-0.5 rounded-full">{doneCount}/{total}</span>
          </div>
        )}
        
        {/* Actions */}
        <div className="flex items-center">
          {onRestore && (
            <button onClick={() => onRestore(digest.id)} className="text-zinc-400 hover:text-blue-500 transition-all p-2 rounded-xl hover:bg-blue-50 dark:hover:bg-zinc-700 flex items-center gap-1.5" title="Restore briefing">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
              <span className="text-xs font-semibold">Restore</span>
            </button>
          )}
          {onDelete && (
            confirmDelete ? (
              <div className="flex items-center gap-1.5">
                <button onClick={() => { onDelete(digest.id); setConfirmDelete(false); }} className="text-xs font-bold text-red-500 hover:text-white transition-colors px-3 py-1.5 rounded-xl bg-red-50 dark:bg-red-500/10 hover:bg-red-500">Archive</button>
                <button onClick={() => setConfirmDelete(false)} className="text-xs font-bold text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-colors px-3 py-1.5 rounded-xl bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700">Cancel</button>
              </div>
            ) : (
              <button onClick={() => setConfirmDelete(true)} className="text-zinc-400 hover:text-red-500 transition-all p-2 rounded-xl hover:bg-red-50 dark:hover:bg-red-500/10" title="Archive briefing">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            )
          )}
        </div>
      </div>

      {effectiveOpen && (
        <div className="fade-in mt-2 pt-6 border-t border-zinc-200/50 dark:border-zinc-700/50">
          {digest.greeting && (
            <div className="flex items-start gap-4 mb-8 py-4 px-3 sm:px-5 rounded-2xl bg-blue-50/50 dark:bg-blue-900/10 border border-blue-100/50 dark:border-blue-800/30">
              <div className="w-8 h-8 rounded-full bg-blue-600 shadow-md shadow-blue-500/20 flex items-center justify-center flex-shrink-0 mt-0.5">
                <span className="text-white text-sm font-bold">M</span>
              </div>
              <p className="text-sm text-zinc-700 dark:text-zinc-300 leading-relaxed font-medium">{highlight(digest.greeting, searchQuery)}</p>
            </div>
          )}

          {total > 0 && (
            <div className="flex items-center gap-4 mb-8 bg-zinc-50 dark:bg-zinc-900/50 p-3 rounded-2xl border border-zinc-100 dark:border-zinc-800">
              <div className="flex-1 h-1.5 bg-zinc-200 dark:bg-zinc-800 rounded-full overflow-hidden">
                <div className="h-full rounded-full transition-all duration-700 ease-out relative overflow-hidden"
                  style={{
                    width: `${pct}%`,
                    background: pct === 100 ? "#10b981" : pct > 0 ? "#3b82f6" : "transparent"
                  }}>
                  {pct === 100 && <div className="absolute inset-0 bg-white/20 animate-pulse" />}
                  {pct > 0 && pct < 100 && (
                    <div className="absolute inset-y-0 progress-shimmer" style={{ background: "linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%)", width: "70%" }} />
                  )}
                </div>
              </div>
              <span className={`text-xs font-bold tabular-nums w-10 text-right transition-colors ${pct === 100 ? "text-emerald-500 drop-shadow-[0_0_8px_rgba(16,185,129,0.4)]" : "text-zinc-400"}`}>{pct}%</span>
            </div>
          )}

          <div className="space-y-2">
            {digest.sections.map((section, si) => (
              <Section key={si} section={section} completed={completed} onToggle={onToggle} defaultCollapsed={false} searchQuery={searchQuery} edits={edits} onEditItem={onEditItem} reactions={reactions} onSetReaction={onSetReaction} />
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

let writeQueue = null;
let remoteOk = true;

async function remoteRead() {
  try {
    const { data: item, error } = await supabase.from('app_state').select('data').eq('id', 1).single();
    if (error && error.code !== 'PGRST116') throw error;
    const data = item && item.data ? item.data : null;
    remoteOk = true;
    console.log("[state] remote read OK:", JSON.stringify(data));
    return data;
  } catch (e) {
    remoteOk = false;
    console.warn("[state] remote read FAILED:", e);
    return null;
  }
}

async function remoteWrite(state) {
  try {
    const { error } = await supabase.from('app_state').upsert({ id: 1, data: state });
    if (error) throw error;
    remoteOk = true;
    console.log("[state] remote write OK:", JSON.stringify(state));
  } catch (e) {
    remoteOk = false;
    console.warn("[state] remote write FAILED:", e);
  }
}

function debouncedWrite(state) {
  try { localStorage.setItem("llf-state", JSON.stringify(state)); } catch {}
  clearTimeout(writeQueue);
  writeQueue = setTimeout(() => remoteWrite(state), 800);
}

/* ═══ Quick Adder — compact pill, single source of truth for adding ═══ */
function ReminderQuickAdd({ reminders, onAdd, onSeeAll, onBack, isOnRemindersTab }) {
  const [open, setOpen] = useState(false);
  const [text, setText] = useState("");
  const [showSchedule, setShowSchedule] = useState(false);
  const [scheduleMode, setScheduleMode] = useState("default"); // "default" | "duration" | "date"
  const [durationDays, setDurationDays] = useState(3);
  const [customDate, setCustomDate] = useState("");

  const resetForm = () => {
    setText("");
    setShowSchedule(false);
    setScheduleMode("default");
    setDurationDays(3);
    setCustomDate("");
    setOpen(false);
  };

  const computeSchedule = () => {
    if (scheduleMode === "default") return {}; // one-shot, no extra fields
    if (scheduleMode === "duration") {
      const d = new Date();
      d.setDate(d.getDate() + durationDays);
      return { expiresAt: d.toISOString().split("T")[0] };
    }
    if (scheduleMode === "date" && customDate) return { scheduledFor: customDate };
    return {};
  };

  const handleAdd = () => {
    const trimmed = text.trim();
    if (!trimmed) return;
    const schedule = computeSchedule();
    onAdd(trimmed, schedule);
    resetForm();
  };

  const handleKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleAdd(); }
    if (e.key === "Escape") { resetForm(); }
  };

  // Min date for datepicker = tomorrow
  const tomorrow = useMemo(() => {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    return d.toISOString().split("T")[0];
  }, []);

  const durationPresets = [
    { label: "3 days", days: 3 },
    { label: "1 week", days: 7 },
    { label: "2 weeks", days: 14 },
    { label: "1 month", days: 30 },
  ];

  if (open) {
    return (
      <div className="mb-8 space-y-2">
        <div className="flex flex-col sm:flex-row gap-2">
          <input
            autoFocus
            type="text"
            value={text}
            onChange={e => setText(e.target.value)}
            onKeyDown={handleKey}
            placeholder="e.g. Follow up with Hassan on escalation..."
            className="flex-1 min-w-0 px-4 py-3 text-sm bg-white dark:bg-zinc-800 border border-blue-400 dark:border-blue-500 ring-2 ring-blue-500/20 shadow-sm rounded-xl text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 focus:outline-none transition-all font-medium min-h-[44px]"
          />
          <div className="flex gap-2">
            <button
              onClick={handleAdd}
              disabled={!text.trim()}
              className="flex-1 sm:flex-none px-5 py-3 text-sm font-bold rounded-xl transition-all bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 hover:bg-zinc-800 dark:hover:bg-white disabled:bg-zinc-100 disabled:text-zinc-400 dark:disabled:bg-zinc-800 dark:disabled:text-zinc-600 shadow-sm min-h-[44px]"
            >
              Add
            </button>
            <button
              onClick={resetForm}
              className="px-4 py-3 text-sm font-bold rounded-xl transition-all bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-700 min-h-[44px]"
            >
              Cancel
            </button>
          </div>
        </div>

        {/* Collapsible schedule options */}
        <button
          onClick={() => setShowSchedule(prev => !prev)}
          className="flex items-center gap-1.5 text-xs font-semibold text-zinc-400 dark:text-zinc-500 hover:text-blue-500 dark:hover:text-blue-400 transition-colors py-1"
        >
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          {showSchedule ? "Hide schedule options" : (scheduleMode === "default" ? "Next briefing only (change)" : scheduleMode === "duration" ? `Repeating for ${durationDays} days` : `Only on ${customDate || "..."}`)}
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"
            className={`transition-transform duration-200 ${showSchedule ? "rotate-180" : ""}`}
          ><polyline points="6 9 12 15 18 9"/></svg>
        </button>

        {showSchedule && (
          <div className="rounded-xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-800/50 p-3 space-y-3 fade-in">
            <div className="flex flex-wrap gap-1.5">
              <button
                onClick={() => { setScheduleMode("default"); }}
                className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-all ${scheduleMode === "default" ? "bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 shadow-sm" : "bg-zinc-100 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-600"}`}
              >
                Next briefing only
              </button>
              {durationPresets.map(p => (
                <button
                  key={p.days}
                  onClick={() => { setScheduleMode("duration"); setDurationDays(p.days); }}
                  className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-all ${scheduleMode === "duration" && durationDays === p.days ? "bg-blue-500 text-white shadow-sm shadow-blue-500/20" : "bg-zinc-100 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-600"}`}
                >
                  {p.label}
                </button>
              ))}
              <button
                onClick={() => { setScheduleMode("date"); }}
                className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-all ${scheduleMode === "date" ? "bg-blue-500 text-white shadow-sm shadow-blue-500/20" : "bg-zinc-100 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-600"}`}
              >
                On a specific date
              </button>
            </div>

            {scheduleMode === "date" && (
              <input
                type="date"
                min={tomorrow}
                value={customDate}
                onChange={e => setCustomDate(e.target.value)}
                className="w-full sm:w-auto px-3 py-2 text-sm bg-white dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-600 rounded-lg text-zinc-900 dark:text-zinc-100 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 font-medium"
              />
            )}

            {scheduleMode === "duration" && (
              <p className="text-[11px] font-medium text-zinc-400 dark:text-zinc-500">
                This reminder will appear in every daily briefing until {(() => { const d = new Date(); d.setDate(d.getDate() + durationDays); return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" }); })()}.
              </p>
            )}
            {scheduleMode === "date" && (
              <p className="text-[11px] font-medium text-zinc-400 dark:text-zinc-500">
                This reminder will appear only in the briefing on {customDate ? new Date(customDate + "T12:00:00").toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" }) : "the selected date"}.
              </p>
            )}
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="mb-8 flex items-center gap-2 flex-wrap">
      {isOnRemindersTab && (
        <button
          onClick={onBack}
          className="flex items-center gap-1.5 pl-2 pr-3 py-2.5 rounded-xl bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 shadow-sm hover:border-zinc-300 dark:hover:border-zinc-600 transition-all text-xs font-bold text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-white min-h-[44px]"
          title="Back to briefings"
        >
          <Icon.ChevronRight size={14} className="rotate-180" />
          Back to briefings
        </button>
      )}
      <button

/* ═══ Full Reminders View — list + empty state + history ═══ */
function RemindersView({ reminders, onRemove, reminderHistory }) {
  const [historyOpen, setHistoryOpen] = useState(false);

  /* Group history by digestDate */
  const grouped = useMemo(() => {
    if (!reminderHistory || !reminderHistory.length) return [];
    const map = {};
    reminderHistory.forEach(r => {
      const key = r.digestDate || r.consumedAt?.split("T")[0] || "Unknown";
      if (!map[key]) map[key] = { digestDate: key, digestId: r.digestId, items: [] };
      map[key].items.push(r);
    });
    return Object.values(map).sort((a, b) => b.digestDate.localeCompare(a.digestDate));
  }, [reminderHistory]);

  return (
    <div className="fade-in">
      {/* Active reminders */}
      <div className="flex items-center gap-2.5 mb-5">
        <div className="p-1.5 rounded-full bg-blue-100 dark:bg-blue-900/30">
          <BellIcon className="text-blue-500" />
        </div>
        <h2 className="text-sm font-semibold text-zinc-700 dark:text-zinc-200">Reminders for next briefing</h2>
        {reminders.length > 0 && (
          <span className="bg-blue-500 text-white shadow-sm shadow-blue-500/20 text-[10px] font-bold px-2 py-0.5 rounded-full tabular-nums">{reminders.length}</span>
        )}
      </div>

      {reminders.length > 0 ? (
        <div className="space-y-2">
          {reminders.map(r => {
            const isPersistent = !!r.expiresAt;
            const isScheduled = !!r.scheduledFor;
            const hasSchedule = isPersistent || isScheduled;
            let badgeLabel = null;
            let badgeDetail = null;
            if (isPersistent) {
              const exp = new Date(r.expiresAt + "T23:59:59");
              const now = new Date();
              const daysLeft = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
              badgeLabel = daysLeft <= 0 ? "Expires today" : daysLeft === 1 ? "1 day left" : `${daysLeft} days left`;
              badgeDetail = "until " + new Date(r.expiresAt + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
            } else if (isScheduled) {
              const sched = new Date(r.scheduledFor + "T12:00:00");
              badgeLabel = "Scheduled";
              badgeDetail = sched.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
            }
            return (
            <div key={r.id} className={`flex items-start gap-3 py-3 px-4 rounded-xl transition-all hover:bg-blue-50 dark:hover:bg-blue-900/20 ${hasSchedule ? "bg-blue-50/70 dark:bg-blue-900/15 border border-blue-200/60 dark:border-blue-700/40" : "bg-blue-50/50 dark:bg-blue-900/10 border border-blue-100/50 dark:border-blue-800/30"}`}>
              <BellIcon className="text-blue-500 flex-shrink-0 mt-0.5" />
              <div className="flex-1 min-w-0">
                <span className="text-sm font-medium text-zinc-700 dark:text-zinc-300 break-words leading-relaxed">{r.text}</span>
                {hasSchedule && (
                  <div className="flex items-center gap-2 mt-1.5">
                    <span className={`inline-flex items-center gap-1 text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full ${isScheduled ? "text-amber-600 dark:text-amber-400 bg-amber-100 dark:bg-amber-900/30" : "text-blue-500 dark:text-blue-400 bg-blue-100 dark:bg-blue-900/30"}`}>
                      {isScheduled ? (
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                      ) : (
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/></svg>
                      )}
                      {badgeLabel}
                    </span>
                    <span className="text-[10px] font-medium text-zinc-400 dark:text-zinc-500">
                      {badgeDetail}
                    </span>
                  </div>
                )}
              </div>
              <button onClick={() => onRemove(r.id)} className="text-zinc-400 dark:text-zinc-500 hover:text-red-500 dark:hover:text-red-400 transition-colors p-2 -m-1 rounded-md hover:bg-red-50 dark:hover:bg-red-500/10 flex-shrink-0" title="Remove reminder" aria-label="Remove reminder">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            );
          })}
        </div>
      ) : (
        <div className="text-center py-16 px-6 rounded-[2rem] border border-dashed border-zinc-300 dark:border-zinc-700 bg-white/50 dark:bg-zinc-800/30 backdrop-blur-md">
          <div className="w-14 h-14 bg-blue-100 dark:bg-blue-900/20 rounded-full flex items-center justify-center mx-auto mb-4">
            <BellIcon size={22} className="text-blue-500" />
          </div>
          <p className="text-base font-bold text-zinc-700 dark:text-zinc-300 mb-1">No reminders queued</p>
          <p className="text-sm font-medium text-zinc-500 dark:text-zinc-500">Use the <span className="font-bold text-zinc-700 dark:text-zinc-300">+ Add reminder</span> button above — it&apos;ll show up in tomorrow&apos;s briefing. You can also schedule it for multiple days.</p>
        </div>
      )}

      {/* Reminder History */}
      {grouped.length > 0 && (
        <div className="mt-8">
          <button
            onClick={() => setHistoryOpen(prev => !prev)}
            className="flex items-center gap-2 text-sm font-semibold text-zinc-500 dark:text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-200 transition-colors mb-4 group"
          >
            <div className="p-1 rounded-full bg-zinc-100 dark:bg-zinc-800 group-hover:bg-zinc-200 dark:group-hover:bg-zinc-700 transition-colors">
              <ClockIcon size={13} className="text-zinc-400 dark:text-zinc-500" />
            </div>
            <span>Reminder History</span>
            <span className="text-[10px] font-bold text-zinc-400 dark:text-zinc-600 tabular-nums">{reminderHistory.length}</span>
            <svg
              width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
              className={`text-zinc-400 transition-transform duration-200 ${historyOpen ? "rotate-180" : ""}`}
            >
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>

          {historyOpen && (
            <div className="space-y-5 fade-in">
              {grouped.map(group => (
                <div key={group.digestDate}>
                  <div className="flex items-center gap-2 mb-2.5">
                    <span className="text-[11px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500">
                      {new Date(group.digestDate + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })}
                    </span>
                    <div className="flex-1 h-px bg-zinc-200 dark:bg-zinc-700/50"/>
                  </div>
                  <div className="space-y-1.5">
                    {group.items.map(r => (
                      <div key={r.id} className="flex items-start gap-3 py-2.5 px-3.5 rounded-lg bg-zinc-50/50 dark:bg-zinc-800/30 border border-zinc-100/50 dark:border-zinc-800/30">
                        <Icon.Check size={13} className="text-emerald-400 dark:text-emerald-500/70 flex-shrink-0 mt-0.5" />
                        <span className="text-[13px] text-zinc-500 dark:text-zinc-400 flex-1 min-w-0 break-words leading-relaxed">{r.text}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

        <span className="text-xs font-bold tracking-widest uppercase text-zinc-500 dark:text-zinc-400 group-hover:text-zinc-700 dark:group-hover:text-zinc-300 transition-colors duration-150">

              <DigestCard
                key={d.id}

/* ═══ PinnedSection — global view of items the user has reacted to ═══ */
function PinnedSection({ digests, hidden, reactions, completed, edits, onToggle, onSetReaction }) {
  const [activeFilter, setActiveFilter] = useState("all"); // "all" | emoji

  // Build a flat lookup of action items from non-hidden digests, then match against reactions.
  const pinned = useMemo(() => {
    const hiddenSet = new Set(hidden || []);
    const itemMap = new Map();
    for (const d of digests) {
      if (hiddenSet.has(d.id)) continue;
      for (const s of d.sections || []) {
        if (s.info) continue;
        for (const it of s.items || []) itemMap.set(it.id, it);
      }
    }
    const list = [];
    for (const [id, rec] of Object.entries(reactions || {})) {
      const it = itemMap.get(id);
      if (!it) continue;
      list.push({ item: it, emoji: rec.emoji, ts: rec.ts || 0 });
    }
    list.sort((a, b) => b.ts - a.ts);
    return list;
  }, [digests, hidden, reactions]);

  // Counts per emoji (for chips). Only counts undone items so the chip number matches
  // what the user actually sees when they click the chip.
  const counts = useMemo(() => {
    const c = {};
    for (const p of pinned) {
      if (completed[p.item.id]) continue;
      c[p.emoji] = (c[p.emoji] || 0) + 1;
    }
    return c;
  }, [pinned, completed]);

  // Drop "done" items from the rendered list, then apply the sub-filter.
  const visible = useMemo(() => {
    const undone = pinned.filter(p => !completed[p.item.id]);
    if (activeFilter === "all") return undone;
    return undone.filter(p => p.emoji === activeFilter);
  }, [pinned, completed, activeFilter]);

  // If the active emoji has no undone items left, reset to All.
  // Drives off `visible` (post-completion) so completing the last 🧠 item also resets,
  // not just removing the last 🧠 reaction.
  useEffect(() => {
    if (activeFilter !== "all" && visible.length === 0) setActiveFilter("all");
  }, [activeFilter, visible]);

  // Hide the entire section when nothing is pinned (counting completed items too).
  if (pinned.length === 0) return null;

  const totalUndone = pinned.filter(p => !completed[p.item.id]).length;

  return (
    <div className="mb-6 rounded-[2rem] border border-zinc-200 dark:border-zinc-700 bg-white/70 dark:bg-zinc-800/40 backdrop-blur-md p-4">
      <div className="flex items-center gap-2 mb-3">
        <span className="text-base">📌</span>
        <h2 className="text-sm font-bold text-zinc-700 dark:text-zinc-200">Pinned</h2>
        <span className="text-[10px] font-bold text-zinc-400 bg-zinc-100 dark:bg-zinc-700 px-1.5 py-0.5 rounded-md">{totalUndone}</span>
      </div>

      <div className="flex gap-2 flex-wrap mb-3">
        <button
          onClick={() => setActiveFilter("all")}
          className={`px-3 py-1 rounded-full text-[11px] font-bold transition-all ${activeFilter === "all" ? "bg-zinc-900 text-white dark:bg-white dark:text-zinc-900" : "bg-white dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 border border-zinc-200 dark:border-zinc-700"}`}
        >
          All
        </button>
        {REACTION_EMOJIS.filter(em => counts[em]).map(em => (
          <button
            key={em}
            onClick={() => setActiveFilter(em)}
            className={`px-3 py-1 rounded-full text-[11px] font-bold transition-all flex items-center gap-1 ${activeFilter === em ? "bg-zinc-900 text-white dark:bg-white dark:text-zinc-900" : "bg-white dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 border border-zinc-200 dark:border-zinc-700"}`}
          >
            <span>{em}</span>
            <span>{counts[em]}</span>
          </button>
        ))}
      </div>

      {visible.length === 0 ? (
        <p className="text-xs text-zinc-400 dark:text-zinc-500 italic px-1 py-2">
          {activeFilter === "all"
            ? "All caught up — everything pinned is done."
            : `All caught up — nothing pinned with ${activeFilter}.`}
        </p>
      ) : (
        <div className="space-y-1">
          {visible.map(({ item, emoji }) => {
            const editOverride = edits ? edits[item.id] : null;
            const label = editOverride?.label || item.label;
            return (
              <div key={item.id} className="group flex items-center gap-3 py-2 px-3 rounded-xl hover:bg-zinc-100/60 dark:hover:bg-zinc-800/60 transition-colors">
                <button
                  onClick={() => onToggle(item.id)}
                  className="w-5 h-5 rounded-full flex-shrink-0 border border-zinc-300 dark:border-zinc-600 bg-white dark:bg-zinc-900 hover:border-zinc-400 dark:hover:border-zinc-500 transition-colors"
                  title="Mark as done"
                  aria-label={`Mark "${label}" as done`}
                />
                <span className="flex-1 min-w-0 text-sm text-zinc-800 dark:text-zinc-200 font-medium truncate">{label}</span>
                <span className="text-base leading-none flex-shrink-0">{emoji}</span>
                <button
                  onClick={() => onSetReaction(item.id, null)}
                  className="opacity-0 group-hover:opacity-100 transition-all flex-shrink-0 p-1 rounded-md text-zinc-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10"
                  title="Remove reaction"
                  aria-label="Remove reaction"
                >
                  <Icon.X size={12} />
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ═══ Main App ═══ */
function App() {
  const [session, setSession] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [digests, setDigests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [error, setError] = useState(null);
  const [completed, setCompleted] = useState({});
  const [search, setSearch] = useState("");
  const [typeFilter, setTypeFilter] = useState("all");
  const [selectedDate, setSelectedDate] = useState(null);
  const [hidden, setHidden] = useState([]);
  const [reminders, setReminders] = useState([]);
  const [reminderHistory, setReminderHistory] = useState([]);
  const [edits, setEdits] = useState({});
  const [reactions, setReactions] = useState({});
  const [stateLoaded, setStateLoaded] = useState(false);
  const userActed = React.useRef(false); // only write after a real user action
  const [activeModule, setActiveModule] = useState("digests");
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
  const mobileMenuRef = useRef(null);
  const searchRef = useRef(null);

  // Auth state
  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      setAuthLoading(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setSession(session);
      setAuthLoading(false);
    });
    return () => subscription.unsubscribe();
  }, []);

  // Close mobile menu on outside click / Escape
  useEffect(() => {
    if (!mobileMenuOpen) return;
    const handler = (e) => { if (mobileMenuRef.current && !mobileMenuRef.current.contains(e.target)) setMobileMenuOpen(false); };
    const esc = (e) => { if (e.key === "Escape") setMobileMenuOpen(false); };
    document.addEventListener("mousedown", handler);
    document.addEventListener("keydown", esc);
    return () => { document.removeEventListener("mousedown", handler); document.removeEventListener("keydown", esc); };
  }, [mobileMenuOpen]);

  // ⌘K / Ctrl+K focus search
  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") {
        e.preventDefault();
        searchRef.current?.focus();
        searchRef.current?.select();
      }
    };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, []);

  // Theme Management
  const [theme, setTheme] = useState(() => {
    if (typeof localStorage !== 'undefined' && localStorage.getItem('theme')) {
      return localStorage.getItem('theme');
    }
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  });

  useEffect(() => {
    const root = document.documentElement;
    if (theme === 'dark') {
      root.classList.add('dark');
    } else {
      root.classList.remove('dark');
    }
    localStorage.setItem("theme", theme);
  }, [theme]);

  // Fetch digests — extracted so Sync button can call it too
  const loadDigests = useCallback((isManual = false) => {
    if (isManual) setSyncing(true);
    fetch("digests.json?" + Date.now(), { cache: "no-store" })
      .then(r => { if (!r.ok) throw new Error("Failed to load"); return r.json(); })
      .then(data => {
        const sorted = [...data].sort((a, b) => (b.isoDate || "").localeCompare(a.isoDate || ""));
        setDigests(sorted);
        setLoading(false);
        setSyncing(false);
      })
      .catch(e => { setError(e.message); setLoading(false); setSyncing(false); });
  }, []);

  // Load digests + state on mount
  useEffect(() => {
    // Fetch digests.json
    loadDigests();

    // Load state: localStorage first (instant), then remote (authoritative)
    try {
      const local = JSON.parse(localStorage.getItem("llf-state") || "{}");
      if (local.completed && Object.keys(local.completed).length) setCompleted(local.completed);
      if (local.hidden && local.hidden.length) setHidden(local.hidden);
      // NOTE: reminders are intentionally NOT loaded from localStorage.
      // They are automation-controlled. Loading stale localStorage reminders causes
      // consumed reminders to reappear after the automation clears them. We wait
      // for the authoritative remote read instead.
      if (local.edits && Object.keys(local.edits).length) setEdits(local.edits);
      if (local.reactions && Object.keys(local.reactions).length) setReactions(local.reactions);
    } catch {}

    remoteRead().then(state => {
      // completed, hidden, edits, reactions: local user actions win if they acted first.
      // These fields reflect user checkbox / reaction interactions — their changes should not be overwritten.
      if (!userActed.current) {
        if (state && state.completed) setCompleted(state.completed);
        if (state && state.hidden) setHidden(state.hidden);
        if (state && state.edits) setEdits(state.edits);
        if (state && state.reactions) setReactions(state.reactions);
      } else {
        // User already acted — keep their checkbox/edit/reaction changes, don't touch completed/hidden/edits/reactions
        if (state && state.edits) setEdits(prev => Object.keys(prev).length ? prev : (state.edits || {}));
        if (state && state.reactions) setReactions(prev => Object.keys(prev).length ? prev : (state.reactions || {}));
      }

      // reminders + reminderHistory: ALWAYS apply with smart merge, regardless of userActed.
      // Reminders are automation-controlled — the automation may have consumed/cleared them.
      // Smart merge: start from remote state (authoritative), then add any locally-added reminders
      // that haven't synced to remote yet (not in remote list and not in history = just added by user).
      const remoteReminders = (state && state.reminders) || [];
      const remoteHistory  = (state && state.reminderHistory) || [];
      const remoteIds  = new Set(remoteReminders.map(r => r.id));
      const historyIds = new Set(remoteHistory.map(r => r.id));
      setReminders(prev => {
        const merged = [...remoteReminders];
        for (const r of prev) {
          // Keep locally-added reminders that haven't made it to Supabase yet
          if (!remoteIds.has(r.id) && !historyIds.has(r.id)) merged.push(r);
        }
        return merged;
      });
      setReminderHistory(remoteHistory);

      setStateLoaded(true);
    });
  }, []);

  // Persist state to remote — ONLY after a real user action (not on initial load)
  useEffect(() => {
    if (!stateLoaded || !userActed.current) return;
    debouncedWrite({ completed, hidden, reminders, reminderHistory, edits, reactions });
  }, [completed, hidden, reminders, reminderHistory, edits, reactions, stateLoaded]);

  const toggle = useCallback((id) => {
    userActed.current = true;
    setCompleted(prev => ({ ...prev, [id]: !prev[id] }));
  }, []);

  const handleEditItem = useCallback((id, { label, detail }) => {
    userActed.current = true;
    setEdits(prev => ({
      ...prev,
      [id]: { label, detail, editedAt: new Date().toISOString() }
    }));
  }, []);

  const setReaction = useCallback((id, emoji) => {
    userActed.current = true;
    setReactions(prev => {
      const next = { ...prev };
      if (emoji == null) {
        delete next[id];
      } else {
        next[id] = { emoji, ts: Date.now() };
      }
      return next;
    });
  }, []);

  const deleteDigest = useCallback((digestId) => {
    userActed.current = true;
    setHidden(prev => [...prev, digestId]);
  }, []);

  const addReminder = useCallback((text, schedule) => {
    userActed.current = true;
    const reminder = { id: "rem-" + Date.now(), text, addedAt: new Date().toISOString() };
    if (schedule && schedule.expiresAt) reminder.expiresAt = schedule.expiresAt;
    if (schedule && schedule.scheduledFor) reminder.scheduledFor = schedule.scheduledFor;
    setReminders(prev => [...prev, reminder]);
  }, []);

  const removeReminder = useCallback((remId) => {
    userActed.current = true;
    setReminders(prev => prev.filter(r => r.id !== remId));
  }, []);

  // Clock
  const [time, setTime] = useState(new Date());
  useEffect(() => { const id = setInterval(() => setTime(new Date()), 60000); return () => clearInterval(id); }, []);

  // Restore from archive
  const restoreDigest = useCallback((digestId) => {
    userActed.current = true;
    setHidden(prev => prev.filter(id => id !== digestId));
  }, []);

  // Filter & search
  const isArchiveView = typeFilter === "archived";
  const isRemindersView = typeFilter === "reminders";
  const isTogglView = typeFilter === "toggl";

  const filtered = useMemo(() => {
    if (isArchiveView) {
      let list = digests.filter(d => hidden.includes(d.id));
      if (search.trim()) {
        const q = search.toLowerCase();
        list = list.filter(d =>
          d.date.toLowerCase().includes(q) ||
          (d.greeting || "").toLowerCase().includes(q) ||
          d.sections.some(s =>
            s.title.toLowerCase().includes(q) ||
            s.items.some(i => i.label.toLowerCase().includes(q) || (i.detail || "").toLowerCase().includes(q))
          )
        );
      }
      return list;
    }
    let list = digests.filter(d => !hidden.includes(d.id));
    if (typeFilter !== "all") list = list.filter(d => d.type === typeFilter);
    if (selectedDate) list = list.filter(d => d.isoDate === selectedDate);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(d =>
        d.date.toLowerCase().includes(q) ||
        (d.greeting || "").toLowerCase().includes(q) ||
        d.sections.some(s =>
          s.title.toLowerCase().includes(q) ||
          s.items.some(i => i.label.toLowerCase().includes(q) || (i.detail || "").toLowerCase().includes(q))

    }
    return list;
  }, [digests, typeFilter, search, hidden, isArchiveView, selectedDate]);

  const currentMonthKey = `${time.getFullYear()}-${String(time.getMonth() + 1).padStart(2, "0")}`;

  const groupedFiltered = useMemo(() => {
    const groups = {};
    filtered.forEach(d => {

  // Unique types + archived tab
  const activeDigests = digests.filter(d => !hidden.includes(d.id));

  const greeting = (() => {

                       <div className="h-3 bg-zinc-200 dark:bg-zinc-700/50 rounded-md w-5/6"></div>

                  </div>
                </div>

          </div>
        </div>
      </div>
