}

/* ═══ PinnedSection — global view of items the user has reacted to ═══ */
function PinnedSection({ digests, hidden, reactions, completed, edits, onToggle, onSetReaction }) {
  const [activeFilter, setActiveFilter] = useState("all"); // "all" | emoji

  // Build a flat lookup of action items from non-hidden digests, then match against reactions.
  const pinned = useMemo(() => {
    const hiddenSet = new Set(hidden || []);
    const itemMap = new Map();
    for (const d of digests) {
      if (hiddenSet.has(d.id)) continue;
      for (const s of d.sections || []) {
        if (s.info) continue;
        for (const it of s.items || []) { itemMap.set(it.id, it); if (it.taskId) itemMap.set(it.taskId, it); }
      }
    }
    const list = [];
    for (const [id, rec] of Object.entries(reactions || {})) {
      const it = itemMap.get(id);
      if (!it) continue;
      list.push({ item: it, emoji: rec.emoji, ts: rec.ts || 0 });
    }
    list.sort((a, b) => b.ts - a.ts);
    return list;
  }, [digests, hidden, reactions]);

  // Counts per emoji (for chips). Only counts undone items so the chip number matches
  // what the user actually sees when they click the chip.
  const counts = useMemo(() => {
    const c = {};
    for (const p of pinned) {
      if (isDone(p.item, completed)) continue;
      c[p.emoji] = (c[p.emoji] || 0) + 1;
    }
    return c;
  }, [pinned, completed]);

  // Drop "done" items from the rendered list, then apply the sub-filter.
  const visible = useMemo(() => {
    const undone = pinned.filter(p => !isDone(p.item, completed));
    if (activeFilter === "all") return undone;
    return undone.filter(p => p.emoji === activeFilter);
  }, [pinned, completed, activeFilter]);

  // If the active emoji has no undone items left, reset to All.
  // Drives off `visible` (post-completion) so completing the last 🧠 item also resets,
  // not just removing the last 🧠 reaction.
  useEffect(() => {
    if (activeFilter !== "all" && visible.length === 0) setActiveFilter("all");
  }, [activeFilter, visible]);

  // Hide the entire section when nothing is pinned (counting completed items too).
  if (pinned.length === 0) return null;

  const totalUndone = pinned.filter(p => !isDone(p.item, completed)).length;

  return (
    <div className="mb-6 rounded-[2rem] border border-zinc-200 dark:border-zinc-700 bg-white/70 dark:bg-zinc-800/40 backdrop-blur-md p-4">
      <div className="flex items-center gap-2 mb-3">
        <span className="text-base">📌</span>
        <h2 className="text-sm font-bold text-zinc-700 dark:text-zinc-200">Pinned</h2>
        <span className="text-[10px] font-bold text-zinc-400 bg-zinc-100 dark:bg-zinc-700 px-1.5 py-0.5 rounded-md">{totalUndone}</span>
      </div>

      <div className="flex gap-2 flex-wrap mb-3">
        <button
          onClick={() => setActiveFilter("all")}
          className={`px-3 py-1 rounded-full text-[11px] font-bold transition-all ${activeFilter === "all" ? "bg-zinc-900 text-white dark:bg-white dark:text-zinc-900" : "bg-white dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 border border-zinc-200 dark:border-zinc-700"}`}
        >
          All
        </button>
        {REACTION_EMOJIS.filter(em => counts[em]).map(em => (
          <button
            key={em}
            onClick={() => setActiveFilter(em)}
            className={`px-3 py-1 rounded-full text-[11px] font-bold transition-all flex items-center gap-1 ${activeFilter === em ? "bg-zinc-900 text-white dark:bg-white dark:text-zinc-900" : "bg-white dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300 border border-zinc-200 dark:border-zinc-700"}`}
          >
            <span>{em}</span>
            <span>{counts[em]}</span>
          </button>
        ))}
      </div>

      {visible.length === 0 ? (
        <p className="text-xs text-zinc-400 dark:text-zinc-500 italic px-1 py-2">
          {activeFilter === "all"
            ? "All caught up — everything pinned is done."
            : `All caught up — nothing pinned with ${activeFilter}.`}
        </p>
      ) : (
        <div className="space-y-1">
          {visible.map(({ item, emoji }) => {
            const editOverride = pickState(edits, item);
            const label = editOverride?.label || item.label;
            return (
              <div key={item.id} className="group flex items-center gap-3 py-2 px-3 rounded-xl hover:bg-zinc-100/60 dark:hover:bg-zinc-800/60 transition-colors">
                <button
                  onClick={() => onToggle(item)}
                  className="w-5 h-5 rounded-full flex-shrink-0 border border-zinc-300 dark:border-zinc-600 bg-white dark:bg-zinc-900 hover:border-zinc-400 dark:hover:border-zinc-500 transition-colors"
                  title="Mark as done"
                  aria-label={`Mark "${label}" as done`}
                />
                <span className="flex-1 min-w-0 text-sm text-zinc-800 dark:text-zinc-200 font-medium truncate">{label}</span>
                <span className="text-base leading-none flex-shrink-0">{emoji}</span>
                <button
                  onClick={() => onSetReaction(keyOf(item), null)}
                  className="opacity-0 group-hover:opacity-100 transition-all flex-shrink-0 p-1 rounded-md text-zinc-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10"
                  title="Remove reaction"
                  aria-label="Remove reaction"
                >
                  <Icon.X size={12} />
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ═══ Main App ═══ */
function App() {
  const [session, setSession] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [digests, setDigests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [error, setError] = useState(null);
  const [completed, setCompleted] = useState({});
  const [search, setSearch] = useState("");
  const [typeFilter, setTypeFilter] = useState("all");
  const [selectedDate, setSelectedDate] = useState(null);
  const [hidden, setHidden] = useState([]);
  const [reminders, setReminders] = useState([]);
  const [reminderHistory, setReminderHistory] = useState([]);
  const [edits, setEdits] = useState({});
  const [reactions, setReactions] = useState({});
  const [stateLoaded, setStateLoaded] = useState(false);
  const userActed = React.useRef(false); // only write after a real user action
  const [activeModule, setActiveModule] = useState("digests");
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
  const mobileMenuRef = useRef(null);
  const searchRef = useRef(null);

  // Auth state
  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      setAuthLoading(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setSession(session);
      setAuthLoading(false);
    });
    return () => subscription.unsubscribe();
  }, []);

  // Close mobile menu on outside click / Escape
  useEffect(() => {
    if (!mobileMenuOpen) return;
    const handler = (e) => { if (mobileMenuRef.current && !mobileMenuRef.current.contains(e.target)) setMobileMenuOpen(false); };
    const esc = (e) => { if (e.key === "Escape") setMobileMenuOpen(false); };
    document.addEventListener("mousedown", handler);
    document.addEventListener("keydown", esc);
    return () => { document.removeEventListener("mousedown", handler); document.removeEventListener("keydown", esc); };
  }, [mobileMenuOpen]);

  // ⌘K / Ctrl+K focus search
  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") {
        e.preventDefault();
        searchRef.current?.focus();
        searchRef.current?.select();
      }
    };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, []);

  // Theme Management
  const [theme, setTheme] = useState(() => {
    if (typeof localStorage !== 'undefined' && localStorage.getItem('theme')) {
      return localStorage.getItem('theme');
    }
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  });

  useEffect(() => {
    const root = document.documentElement;
    if (theme === 'dark') {
      root.classList.add('dark');
    } else {
      root.classList.remove('dark');
    }
    localStorage.setItem("theme", theme);
  }, [theme]);

  // Fetch digests — extracted so Sync button can call it too
  const loadDigests = useCallback((isManual = false) => {
    if (isManual) setSyncing(true);
    fetchFreshJson("digests.json")
      .then(data => {
        const sorted = [...data].sort((a, b) => (b.isoDate || "").localeCompare(a.isoDate || ""));
        setDigests(sorted);
        setLoading(false);
        setSyncing(false);
        // On manual sync, clear any active date filter so the freshest digest is visible
        if (isManual) {
          setSelectedDate(null);
          setTypeFilter("all");
        }
      })
      .catch(e => { setError(e.message); setLoading(false); setSyncing(false); });
  }, []);

  // Load digests + state on mount
  useEffect(() => {
    // Fetch digests.json
    loadDigests();

    // Load state: localStorage first (instant), then remote (authoritative)
    let localState = {};
    try {
      localState = JSON.parse(localStorage.getItem("llf-state") || "{}");
      if (localState.completed && Object.keys(localState.completed).length) setCompleted(localState.completed);
      if (localState.hidden && localState.hidden.length) setHidden(localState.hidden);
      // NOTE: reminders are intentionally NOT loaded from localStorage.
      // They are automation-controlled. Loading stale localStorage reminders causes
      // consumed reminders to reappear after the automation clears them. We wait
      // for the authoritative remote read instead.
      if (localState.edits && Object.keys(localState.edits).length) setEdits(localState.edits);
      if (localState.reactions && Object.keys(localState.reactions).length) setReactions(localState.reactions);
    } catch {}

    // Read authoritative state from briefing_state.json (GitHub) — single source of truth for all state.
    // Supabase is no longer read on load; briefing_state.json is what the digest agent reads and writes.
    fetchFreshJson("briefing_state.json")
      .catch(() => null)
      .then(async state => {
      // Compare timestamps: if localStorage is newer than remote, keep local user data.
      // This prevents stale remote state from overwriting recent local changes when GitHub sync lags.
      const localTs  = localState.lastModified || 0;
      const remoteTs = (state && state.lastModified) || 0;
      const remoteIsNewer = remoteTs > localTs;

      // completed, hidden, edits, reactions: apply remote only if it's newer than local OR user hasn't acted.
      if (!userActed.current && remoteIsNewer) {
        if (state && state.completed) setCompleted(state.completed);
        if (state && state.hidden) setHidden(state.hidden);
        if (state && state.edits) setEdits(state.edits);
        if (state && state.reactions) setReactions(state.reactions);
      } else if (!userActed.current && !remoteIsNewer && state) {
        // Remote is older — keep localStorage values but still apply remote for fields not in local
        if (state.completed && !Object.keys(localState.completed || {}).length) setCompleted(state.completed);
        if (state.hidden && !(localState.hidden || []).length) setHidden(state.hidden);
        if (state.edits && !Object.keys(localState.edits || {}).length) setEdits(state.edits);
        if (state.reactions && !Object.keys(localState.reactions || {}).length) setReactions(state.reactions);
      } else if (userActed.current) {
        // User already acted — keep their checkbox/edit/reaction changes, don't touch completed/hidden/edits/reactions
        if (state && state.edits) setEdits(prev => Object.keys(prev).length ? prev : (state.edits || {}));
        if (state && state.reactions) setReactions(prev => Object.keys(prev).length ? prev : (state.reactions || {}));
      }

      // reminders + reminderHistory: ALWAYS apply with smart merge, regardless of userActed.
      // Reminders are automation-controlled — the automation may have consumed/cleared them.
      // Smart merge: start from remote state (authoritative), then add any locally-added reminders
      // that haven't synced to remote yet (not in remote list and not in history = just added by user).
      const remoteReminders = (state && state.reminders) || [];
      const remoteHistory  = (state && state.reminderHistory) || [];
      const remoteIds  = new Set(remoteReminders.map(r => r.id));
      const historyIds = new Set(remoteHistory.map(r => r.id));
      setReminders(prev => {
        const merged = [...remoteReminders];
        for (const r of prev) {
          // Keep locally-added reminders that haven't synced to GitHub yet
          if (!remoteIds.has(r.id) && !historyIds.has(r.id)) merged.push(r);
        }
        return merged;
      });
      setReminderHistory(remoteHistory);

      // Reconcile with Supabase (app_state id=1). The app still WRITES every user
      // action to Supabase, but only READS briefing_state.json on load. When the
      // GitHub write of briefing_state.json fails (e.g. no sync proxy/token
      // configured) the user's latest reminders live ONLY in Supabase, and
      // reading briefing_state.json alone silently drops them. So: if Supabase
      // state is strictly newer than briefing_state.json AND the user hasn't
      // acted locally this session, treat Supabase's reminders as the current
      // active set — minus any already consumed by a briefing (present in
      // reminderHistory), which Supabase never learns about because the digest
      // agent writes consumption to briefing_state.json only. The strictly-newer
      // guard means the healthy case (GitHub write succeeded) and the post-digest
      // case (agent bumped briefing_state.lastModified) both keep briefing_state,
      // so consumed reminders are never resurrected.
      try {
        if (!userActed.current) {
          const sb = await remoteRead();
          const sbTs = (sb && sb.lastModified) || 0;
          if (sb && Array.isArray(sb.reminders) && sbTs > remoteTs) {
            const reconciled = sb.reminders.filter(r => r && r.id && !historyIds.has(r.id));
            setReminders(reconciled);
            console.log("[state] reminders reconciled from Supabase (newer than briefing_state.json):", reconciled.length);
          }
        }
      } catch (e) {
        console.warn("[state] Supabase reminder reconciliation skipped:", e);
      }

      setStateLoaded(true);
    });
  }, []);

  // Persist state to remote — ONLY after a real user action (not on initial load)
  useEffect(() => {
    if (!stateLoaded || !userActed.current) return;
    debouncedWrite({ completed, hidden, reminders, reminderHistory, edits, reactions });
  }, [completed, hidden, reminders, reminderHistory, edits, reactions, stateLoaded]);

  // Sync full state to GitHub briefing_state.json (source of truth for the digest agent)
  useEffect(() => {
    if (!stateLoaded || !userActed.current) return;
    debouncedGithubWrite({ completed, hidden, reminders, reminderHistory, edits, reactions });
  }, [completed, hidden, reminders, reminderHistory, edits, reactions, stateLoaded]);

  const toggle = useCallback((item) => {
    userActed.current = true;
    // Accept either an item object (new call sites) or a bare id (defensive).
    const it = (item && typeof item === "object") ? item : { id: item };
    const k = keyOf(it);
    setCompleted(prev => {
      const currentlyDone = !!(prev[it.taskId] || prev[it.id]);
      const next = { ...prev };
      if (currentlyDone) {
        // Unchecking: clear both the canonical taskId key and any legacy id key
        // so the OR-based read (isDone) doesn't stay stuck "done".
        delete next[it.taskId];
        delete next[it.id];
      } else {
        next[k] = true;
      }
      return next;
    });
  }, []);

  const handleEditItem = useCallback((id, { label, detail }) => {
    userActed.current = true;
    setEdits(prev => ({
      ...prev,
      [id]: { label, detail, editedAt: new Date().toISOString() }

  }, []);

  const setReaction = useCallback((id, emoji) => {
    userActed.current = true;
    setReactions(prev => {
      const next = { ...prev };
      if (emoji == null) {
        delete next[id];
      } else {
        next[id] = { emoji, ts: Date.now() };
      }
      return next;
    });
  }, []);

  const deleteDigest = useCallback((digestId) => {
    userActed.current = true;
    setHidden(prev => [...prev, digestId]);
  }, []);

  const addReminder = useCallback((text, schedule) => {
    userActed.current = true;

    if (schedule && schedule.expiresAt) reminder.expiresAt = schedule.expiresAt;

  const removeReminder = useCallback((remId) => {

  // Clock

      list = list.filter(d =>
        d.date.toLowerCase().includes(q) ||
        (d.greeting || "").toLowerCase().includes(q) ||
        d.sections.some(s =>
          s.title.toLowerCase().includes(q) ||
          s.items.some(i => i.label.toLowerCase().includes(q) || (i.detail || "").toLowerCase().includes(q))
        )
      );
    }
    return list;
  }, [digests, typeFilter, search, hidden, isArchiveView, selectedDate]);

  const currentMonthKey = `${time.getFullYear()}-${String(time.getMonth() + 1).padStart(2, "0")}`;

  const groupedFiltered = useMemo(() => {
    const groups = {};
    filtered.forEach(d => {

      if (!groups[key]) groups[key] = [];

  }, [filtered]);

  // Unique types + archived tab

  const types = useMemo(() => {
    const t = new Set(digests.filter(d => !hidden.includes(d.id)).map(d => d.type));
    const tabs = ["all", ...Array.from(t)];
    if (hidden.length > 0) tabs.push("archived");
    return tabs;
  }, [digests, hidden]);

  const greeting = (() => {
    const h = time.getHours();
    if (h < 12) return "Good morning";
    if (h < 18) return "Good afternoon";
    return "Good evening";
  })();


  const dateStr = time.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  const timeStr = time.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });

  const _sbPad = (n) => String(n).padStart(2, "0");
  const _todayIso = `${time.getFullYear()}-${_sbPad(time.getMonth() + 1)}-${_sbPad(time.getDate())}`;
  const sidebarStats = useMemo(() => {
    const td = digests.find(d => d.isoDate === _todayIso);
    if (!td) return { total: 0, done: 0, pct: 0 };
    const items = td.sections.filter(s => !s.info).flatMap(s => s.items);
    const done = items.filter(i => isDone(i, completed)).length;
    const total = items.length;
    return { total, done, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
  }, [digests, completed, _todayIso]);

  if (loading) {
    return (
      <div className="min-h-screen bg-[#fafafa] dark:bg-[#0a0a0b] transition-colors duration-300 overflow-x-hidden">
        <div className="max-w-4xl mx-auto px-3 sm:px-5 md:px-8 py-6 w-full">
          <div className="mb-12">
            <div className="flex items-center justify-between mb-4">
              <div className="h-8 bg-zinc-200 dark:bg-zinc-800 rounded-lg w-1/2 animate-pulse"></div>
              <div className="w-24 h-24 rounded-full bg-zinc-200 dark:bg-zinc-800 animate-pulse border-4 border-white dark:border-zinc-800 shadow-sm"></div>
            </div>
            <div className="h-4 bg-zinc-200 dark:bg-zinc-800 rounded-md w-1/3 animate-pulse"></div>
          </div>
          
          <div className="space-y-6">
            {[1, 2, 3].map(i => (
              <div key={i} className="p-6 rounded-[2rem] bg-white/40 dark:bg-zinc-800/20 shadow-sm border border-zinc-200/50 dark:border-zinc-700/30 animate-pulse">
                <div className="flex gap-4">
                  <div className="w-8 h-8 rounded-full bg-zinc-200 dark:bg-zinc-700 hidden sm:block"></div>
                  <div className="flex-1">
                    <div className="h-5 bg-zinc-200 dark:bg-zinc-700 rounded-md w-1/3 mb-3"></div>
                    <div className="h-3 bg-zinc-200 dark:bg-zinc-700 rounded-md w-1/4 mb-8"></div>
                    <div className="space-y-3">
                       <div className="h-3 bg-zinc-200 dark:bg-zinc-700/50 rounded-md w-3/4"></div>
                       <div className="h-3 bg-zinc-200 dark:bg-zinc-700/50 rounded-md w-5/6"></div>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if (error) {
    return (
      <div className="min-h-screen bg-[#fafafa] dark:bg-[#0a0a0b] flex items-center justify-center p-6">
        <div className="text-center max-w-sm bg-white dark:bg-zinc-800 p-8 rounded-[2rem] shadow-xl border border-zinc-200 dark:border-zinc-700">
          <div className="w-12 h-12 rounded-full bg-red-100 dark:bg-red-500/20 text-red-500 flex items-center justify-center mx-auto mb-4">
             <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <p className="text-lg text-zinc-900 dark:text-zinc-100 font-bold mb-2">Couldn&apos;t load briefings</p>
          <p className="text-sm text-zinc-500 dark:text-zinc-400">Make sure <code className="bg-zinc-100 dark:bg-zinc-900 px-1.5 py-0.5 rounded-md font-mono text-xs">digests.json</code> is in the same folder as this page.</p>
        </div>
      </div>
    );
  }

  if (authLoading) return (
    <div className="min-h-screen flex items-center justify-center bg-zinc-50 dark:bg-zinc-950">
      <div className="w-6 h-6 border-2 border-zinc-300 border-t-blue-600 rounded-full animate-spin" />
    </div>
  );

  if (!session) return <LoginScreen />;

  // Sidebar nav items
  const NAV = [
    { id: "digests", label: "Digests", icon: (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    ), desc: "Daily, EOD & Weekly" },
    { id: "coe", label: "CoE", icon: (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    ), desc: "Portfolio overview" },
    { id: "epmo", label: "EPMO", icon: (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><rect x="7" y="12" width="3" height="6" rx="0.5"/><rect x="12" y="8" width="3" height="10" rx="0.5"/><rect x="17" y="5" width="3" height="13" rx="0.5"/></svg>
    ), desc: "Team daily brief" },
  ];

  return (
    <div className="min-h-screen">

      {/* ═══ Desktop Sidebar — fixed left rail with labels ═══ */}
      <aside className="hidden md:flex flex-col w-[140px] fixed top-0 left-0 h-screen z-40 border-r border-zinc-200/40 dark:border-zinc-800/40 bg-white/60 dark:bg-zinc-950/60 backdrop-blur-xl py-5">
        {/* Logo mark */}
        <div className="flex items-center justify-center mb-8">
          <div className="w-8 h-8 rounded-xl bg-blue-600 shadow-md shadow-blue-500/20 flex items-center justify-center">
            <span className="text-white text-sm font-bold">M</span>
          </div>
        </div>

        {/* Nav items with labels */}
        <nav className="flex-1 px-3 space-y-0.5">
          {NAV.map(item => {
            const active = activeModule === item.id;
            return (
              <button
                key={item.id}
                onClick={() => setActiveModule(item.id)}
                className={`w-full flex items-center gap-2.5 px-3 py-2 rounded-xl text-left transition-all ${
                  active
                    ? "bg-zinc-100 dark:bg-zinc-800/80 text-zinc-900 dark:text-zinc-100"
                    : "text-zinc-400 dark:text-zinc-500 hover:text-zinc-600 dark:hover:text-zinc-300 hover:bg-zinc-50 dark:hover:bg-zinc-800/40"
                }`}
              >
                <span className={`flex-shrink-0 ${active ? "text-blue-600 dark:text-blue-400" : ""}`}>{item.icon}</span>
                <span className={`text-xs font-semibold truncate ${active ? "text-zinc-900 dark:text-zinc-100" : ""}`}>{item.label}</span>
              </button>
            );
          })}
        </nav>

        {/* Sidebar stats — today's progress + reminders */}
        {sidebarStats.total > 0 && (
          <div className="px-3 mb-2 space-y-3">
            <div className="h-px bg-zinc-200/60 dark:bg-zinc-800/60" />
            <div className="px-1">
              <p className="text-[9px] font-bold uppercase tracking-widest text-zinc-400 dark:text-zinc-500 mb-2">Today</p>
              <div className="flex items-center justify-between mb-1.5">
                <span className="text-xs font-bold tabular-nums text-zinc-600 dark:text-zinc-300">
                  {sidebarStats.done}<span className="text-zinc-400 dark:text-zinc-500">/{sidebarStats.total}</span>
                </span>
                <span className={`text-[10px] font-bold tabular-nums ${sidebarStats.pct === 100 ? "text-emerald-500" : "text-zinc-400 dark:text-zinc-500"}`}>{sidebarStats.pct}%</span>
              </div>
              <div className="h-0.5 bg-zinc-200 dark:bg-zinc-800 rounded-full overflow-hidden">
                <div className="h-full rounded-full transition-all duration-700 relative overflow-hidden"
                  style={{ width: `${sidebarStats.pct}%`, background: sidebarStats.pct === 100 ? "#10b981" : "#3b82f6" }}>
                  {sidebarStats.pct > 0 && sidebarStats.pct < 100 && (
                    <div className="absolute inset-y-0 progress-shimmer" style={{ background: "linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%)", width: "70%" }} />
                  )}
                </div>
              </div>
            </div>
            {reminders.length > 0 && (
              <div className="flex items-center justify-between px-1">
                <span className="text-[9px] font-bold uppercase tracking-widest text-zinc-400 dark:text-zinc-500">Queued</span>
                <span className="text-[10px] font-bold bg-blue-500 text-white px-1.5 py-0.5 rounded-full tabular-nums">{reminders.length}</span>
              </div>
            )}
          </div>
        )}

        {/* Theme toggle + sign out at bottom */}
        <div className="px-3 space-y-0.5">
          <button
            onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
            className="w-full flex items-center gap-2.5 px-3 py-2 rounded-xl text-zinc-400 dark:text-zinc-500 hover:text-zinc-600 dark:hover:text-zinc-300 hover:bg-zinc-50 dark:hover:bg-zinc-800/40 transition-all"
          >
            {theme === "dark" ? <Icon.Sun size={16} className="text-amber-400" /> : <Icon.Moon size={16} />}
            <span className="text-xs font-semibold">{theme === "dark" ? "Light" : "Dark"}</span>
          </button>
          <button
            onClick={() => supabase.auth.signOut()}
            className="w-full flex items-center gap-2.5 px-3 py-2 rounded-xl text-zinc-400 dark:text-zinc-500 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-500/10 transition-all"
            title="Sign out"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span className="text-xs font-semibold">Sign out</span>
          </button>
        </div>
      </aside>

      {/* ═══ Mobile top bar ═══ */}
      <div className="fixed top-0 left-0 right-0 z-50 md:hidden bg-white/80 dark:bg-zinc-950/80 backdrop-blur-xl border-b border-zinc-200/40 dark:border-zinc-800/60">
        <div className="flex items-center justify-between px-4 h-14">
          <div className="flex items-center">
          <div ref={mobileMenuRef} className="relative">
            <button
              onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
              className="p-2 -ml-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors"
              aria-label="Menu"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-zinc-600 dark:text-zinc-300"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>

            {/* Mobile dropdown */}
            {mobileMenuOpen && (
              <div className="absolute top-full left-0 mt-1.5 w-48 bg-white dark:bg-zinc-900 rounded-2xl shadow-xl border border-zinc-200/60 dark:border-zinc-800 p-1.5 fade-in z-50">
                {NAV.map(item => {
                  const active = activeModule === item.id;
                  return (
                    <button
                      key={item.id}
                      onClick={() => { setActiveModule(item.id); setMobileMenuOpen(false); }}
                      className={`w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-left transition-all ${
                        active
                          ? "bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-100"
                          : "text-zinc-600 dark:text-zinc-300 hover:bg-zinc-50 dark:hover:bg-zinc-800"
                      }`}
                    >
                      <span className={`flex-shrink-0 ${active ? "text-blue-600 dark:text-blue-400" : ""}`}>{item.icon}</span>
                      <span className="text-sm font-semibold">{item.label}</span>
                    </button>
                  );
                })}
                <div className="mt-1 pt-1 border-t border-zinc-100 dark:border-zinc-800">
                  <button
                    onClick={() => { setTheme(theme === 'dark' ? 'light' : 'dark'); setMobileMenuOpen(false); }}
                    className="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-zinc-400 dark:text-zinc-500 hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-all"
                  >
                    {theme === "dark" ? <Icon.Sun size={16} className="text-amber-400" /> : <Icon.Moon size={16} />}
                    <span className="text-sm font-semibold">{theme === "dark" ? "Light" : "Dark"}</span>
                  </button>
                  <button
                    onClick={() => { supabase.auth.signOut(); setMobileMenuOpen(false); }}
                    className="w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-zinc-400 dark:text-zinc-500 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-500/10 transition-all"
                  >
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span className="text-sm font-semibold">Sign out</span>
                  </button>
                </div>
              </div>
            )}
          </div>
          <span className="text-sm font-extrabold text-zinc-900 dark:text-zinc-50 ml-2">{NAV.find(n => n.id === activeModule)?.label}</span>
          </div>
          {/* Mobile sync button */}
          <button
            onClick={() => loadDigests(true)}
            disabled={syncing}
            title="Sync latest briefing"
            className="p-2 rounded-xl text-zinc-400 dark:text-zinc-500 hover:text-zinc-600 dark:hover:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors disabled:opacity-40"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={syncing ? "animate-spin" : ""}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </button>
        </div>
      </div>

      {/* ═══ Main content area ═══ */}
      <main className="min-w-0 pt-16 md:pt-0 md:ml-[140px]">
        <div className="max-w-4xl mx-auto px-3 sm:px-5 md:px-8 py-4 md:py-12 fade-in w-full">

          {/* Header — greeting + avatar */}
          <div className="mb-10 md:relative">
            {/* Desktop meta bar */}
            <div className="hidden md:flex items-center gap-2 flex-wrap mb-4 md:pr-32">
              <p className="text-sm font-medium text-zinc-500 dark:text-zinc-400 capitalize bg-zinc-200/50 dark:bg-zinc-800/50 px-3 py-1 rounded-full">{dateStr}</p>
              <span className="text-zinc-300 dark:text-zinc-600">&middot;</span>
              <p className="text-sm font-medium text-zinc-500 dark:text-zinc-400">Lisinski Law Firm</p>
              <span className="text-zinc-300 dark:text-zinc-600">&middot;</span>
              <p className="text-sm font-semibold text-zinc-400 dark:text-zinc-500 tabular-nums">{timeStr}</p>
              <button
                onClick={() => loadDigests(true)}
                disabled={syncing}
                title="Sync latest briefing"
                className="ml-1 flex items-center gap-1.5 px-2 py-1 rounded-full text-zinc-400 dark:text-zinc-600 hover:text-zinc-600 dark:hover:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800/60 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
              >
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={syncing ? "animate-spin" : ""}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                {syncing && <span className="text-[10px] font-semibold tracking-wide">Syncing…</span>}
              </button>
            </div>
            {/* Greeting + avatar row — visible on all breakpoints */}
            <div className="flex items-center justify-between gap-4 md:pr-32">
              <h1 className="text-2xl sm:text-3xl md:text-4xl font-extrabold tracking-tight text-zinc-900 dark:text-white drop-shadow-sm leading-tight">{greeting},{" "}<br className="sm:hidden" />Jean 👋</h1>
              <div className="flex-shrink-0 md:absolute md:right-0 md:top-1/2 md:-translate-y-1/2 md:z-10">
                <AvatarHub
                  digests={digests}
                  completed={completed}
                  reminders={reminders}
                  theme={theme}
                  onThemeToggle={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                />
              </div>
            </div>
          </div>

          {/* ═══ DIGESTS MODULE ═══ */}
          {activeModule === "digests" && (
            <>
              {/* Quick-add reminder pill */}
              <ReminderQuickAdd
                reminders={reminders}
                onAdd={addReminder}
                onSeeAll={() => setTypeFilter("reminders")}
                onBack={() => setTypeFilter("all")}
                isOnRemindersTab={isRemindersView}
              />

              {/* Filters area */}
              {!isRemindersView && (
              <div className="mb-10 w-full">
                {/* Search + Calendar */}
                <div className="flex gap-2 mb-5">
                  <div className="relative flex-1 group">
                    <div className="absolute left-4 top-1/2 -translate-y-1/2 p-1 rounded-full group-focus-within:bg-blue-50 dark:group-focus-within:bg-blue-900/30 transition-colors">
                      <Icon.Search size={16} className="text-zinc-400 group-focus-within:text-blue-500 transition-colors" />
                    </div>
                    <input
                      ref={searchRef}
                      type="text"
                      value={search}
                      onChange={e => setSearch(e.target.value)}
                      placeholder="Search briefings..."
                      className="w-full pl-12 pr-16 py-3 text-sm font-medium bg-white/80 dark:bg-zinc-800/80 backdrop-blur-md border border-zinc-200 dark:border-zinc-700 shadow-sm rounded-2xl text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all"
                    />
                    <div className="absolute right-3 top-1/2 -translate-y-1/2 flex items-center">
                      {search ? (
                        <button
                          onClick={() => { setSearch(""); searchRef.current?.focus(); }}
                          className="p-1.5 rounded-lg bg-zinc-100 dark:bg-zinc-700 text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-200 transition-colors"
                          aria-label="Clear search"
                        >
                          <Icon.X size={12} />
                        </button>
                      ) : (
                        <kbd className="hidden sm:flex items-center px-1.5 py-0.5 text-[10px] font-bold text-zinc-400 dark:text-zinc-500 bg-zinc-100 dark:bg-zinc-800 rounded-md border border-zinc-200 dark:border-zinc-700 group-focus-within:opacity-0 transition-opacity pointer-events-none select-none">
                          ⌘K
                        </kbd>
                      )}
                    </div>
                  </div>
                  <CalendarButton digests={digests} selectedDate={selectedDate} onSelect={setSelectedDate} />
                </div>

                {/* Active date filter chip */}
                {selectedDate && (
                  <div className="flex items-center gap-2 mb-5 fade-in">
                    <button
                      onClick={() => setSelectedDate(null)}
                      className="flex items-center gap-2 pl-3 pr-2 py-1.5 rounded-full text-xs font-bold bg-blue-500 text-white shadow-sm shadow-blue-500/20 hover:bg-blue-600 transition-all active:scale-95 group"
                      title="Clear date filter"
                    >
                      <Icon.Calendar size={12} />
                      <span>{new Date(selectedDate + "T00:00:00").toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" })}</span>
                      <span className="p-0.5 rounded-full bg-white/20 group-hover:bg-white/30 transition-colors">
                        <Icon.X size={10} />
                      </span>
                    </button>
                  </div>
                )}

                {/* Type filter — digest types only */}
                <div className="flex gap-2 flex-wrap">
                  {types.map(t => {
                    const count = t === "all" ? activeDigests.length
                      : t === "archived" ? hidden.length
                      : activeDigests.filter(d => d.type === t).length;
                    const isMuted = t === "archived";
                    return (
                      <button
                        key={t}
                        onClick={() => setTypeFilter(t)}
                        className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all whitespace-nowrap shadow-sm active:scale-95 ${
                          typeFilter === t
                            ? (isMuted ? "bg-zinc-700 text-white dark:bg-zinc-200 dark:text-zinc-900" : "bg-zinc-900 text-white dark:bg-white dark:text-zinc-900")
                            : (isMuted ? "bg-white dark:bg-zinc-800 text-zinc-500 hover:text-zinc-700 border border-zinc-200 dark:border-zinc-700 dark:hover:text-zinc-300" : "bg-white dark:bg-zinc-800 text-zinc-600 hover:text-zinc-900 border border-zinc-200 dark:border-zinc-700 dark:hover:text-zinc-200")
                        }`}
                      >
                        {`${{ all: "All", daily: "Daily", eod: "EOD", weekly: "Weekly", archived: "Archived" }[t] ?? (t.charAt(0).toUpperCase() + t.slice(1))} (${count})`}
                      </button>
                    );
                  })}
                </div>
              </div>
              )}

              {!isRemindersView && (
                <PinnedSection
                  digests={digests}
                  hidden={hidden}
                  reactions={reactions}
                  completed={completed}
                  edits={edits}
                  onToggle={toggle}
                  onSetReaction={setReaction}
                />
              )}

              {/* Digest content */}
              {isRemindersView ? (
                <RemindersView reminders={reminders} onRemove={removeReminder} reminderHistory={reminderHistory} />
              ) : filtered.length === 0 ? (
                <div className="text-center py-20 px-6 rounded-[2rem] border border-dashed border-zinc-300 dark:border-zinc-700 bg-white/50 dark:bg-zinc-800/30 backdrop-blur-md">
                  <div className="w-14 h-14 bg-zinc-100 dark:bg-zinc-800 rounded-full flex items-center justify-center mx-auto mb-4">
                    <Icon.Search size={24} className="text-zinc-400 dark:text-zinc-500" />
                  </div>
                  <p className="text-base font-bold text-zinc-700 dark:text-zinc-300 mb-1">
                    {isArchiveView ? "No archived briefings" : "No briefings found"}
                  </p>
                  <p className="text-sm font-medium text-zinc-500 dark:text-zinc-500">Try adjusting your filters or search terms.</p>
                </div>
              ) : (
                (search.trim() || selectedDate) ? (
                  <div className="space-y-4 relative">
                    {filtered.map((d, i) => (
                      <DigestCard
                        key={d.id}
                        digest={d}
                        completed={completed}
                        onToggle={toggle}
                        onDelete={isArchiveView ? null : deleteDigest}
                        onRestore={isArchiveView ? restoreDigest : null}
                        defaultOpen={isArchiveView ? false : i === 0}
                        searchQuery={search}
                        edits={edits}
                        onEditItem={handleEditItem}
                        reactions={reactions}
                        onSetReaction={setReaction}
                      />
                    ))}
                  </div>
                ) : (
                  <div className="space-y-2 relative">
                    {groupedFiltered.map(([monthKey, items]) => (
                      <MonthGroup
                        key={monthKey}
                        monthKey={monthKey}
                        items={items}
                        defaultExpanded={monthKey >= currentMonthKey}
                        completed={completed}
                        onToggle={toggle}
                        onDelete={deleteDigest}
                        onRestore={restoreDigest}
                        isArchiveView={isArchiveView}
                        searchQuery={search}
                        edits={edits}
                        onEditItem={handleEditItem}
                        reactions={reactions}
                        onSetReaction={setReaction}
                      />
                    ))}
                  </div>
                )
              )}
            </>
          )}

          {/* ═══ COE MODULE ═══ */}
          {activeModule === "coe" && (
            <CoEDashboardTab onBack={() => { setActiveModule("digests"); setTypeFilter("all"); }} />
          )}

          {/* ═══ EPMO MODULE ═══ */}
          {activeModule === "epmo" && (
            <EpmoDashboardTab />
          )}

          {/* Footer */}
          <div className="mt-16 pt-8 border-t border-zinc-200/60 dark:border-zinc-800 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div className="flex items-center gap-3">
              <div className="w-6 h-6 rounded-full bg-blue-600 shadow-md shadow-blue-500/20 flex items-center justify-center">
                <span className="text-white text-xs font-bold" style={{ fontSize: "10px" }}>M</span>
              </div>
              <span className="text-xs font-bold text-zinc-400 dark:text-zinc-500 uppercase tracking-widest">Madison &middot; LLF Automation</span>
            </div>
            <div className="flex items-center gap-2 bg-zinc-100 dark:bg-zinc-800 px-3 py-1.5 rounded-full">
              <span className="text-xs font-bold text-zinc-500 dark:text-zinc-400">{activeModule === "digests" ? `${digests.length - hidden.length} active briefings` : activeModule === "coe" ? "CoE Portfolio" : activeModule === "epmo" ? "EPMO Team Brief" : "Time review"}</span>
            </div>
          </div>

        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
