const { useState, useEffect, useCallback, useMemo, useRef } = React;

/* ═══ Stable task identity ═══
 * State (completed / edits / reactions) is keyed by a stable `taskId` that the
 * digest agent mints once and reuses across days, so completing a carry-over
 * sticks even though its per-day display `id` (e.g. tue-0609-co-10) changes.
 * Reads fall back to the display `id` so legacy entries (keyed by old daily
 * ids, pre-taskId) and any item still missing a taskId keep working.
 */
const keyOf = (item) => (item && item.taskId) ? item.taskId : (item ? item.id : undefined);
const isDone = (item, completed) => !!(completed && item && (completed[item.taskId] || completed[item.id]));
const pickState = (map, item) => {
  if (!map || !item) return undefined;
  if (item.taskId != null && map[item.taskId] !== undefined) return map[item.taskId];
  return map[item.id];
};

/* ═══ CoE Portfolio Dashboard — Minimalist Card Design ═══ */

/* Mini ring chart component — pure SVG, no Chart.js */
function MiniRing({ value, total, color, size = 48, stroke = 5 }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const pct = total > 0 ? value / total : 0;
  const dk = document.documentElement.classList.contains("dark");
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={dk ? "rgba(255,255,255,0.10)" : "#e5e7eb"} strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.25s ease-out"}}/>
    </svg>
  );
}

/* Mini horizontal bar — pure div */
function MiniBar({ value, max, color = "#818cf8" }) {
  const pct = max > 0 ? Math.min((value / max) * 100, 100) : 0;
  const dk = document.documentElement.classList.contains("dark");
  return (
    <div className="h-1.5 rounded-full w-full" style={{background: dk ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.05)"}}>
      <div className="h-1.5 rounded-full" style={{width:`${pct}%`, background:color, transition:"width 0.5s ease"}}/>
    </div>
  );
}

/* ═══ CoE Calendar Button — date picker for snapshot history ═══ */
function CoECalendarButton({ dates, selectedDate, onSelect }) {
  const [open, setOpen] = useState(false);
  const [monthCursor, setMonthCursor] = useState(() => {
    const seed = selectedDate ? new Date(selectedDate + "T12:00:00") : new Date();
    return new Date(seed.getFullYear(), seed.getMonth(), 1);
  });
  const wrapperRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setOpen(false); };
    const esc = (e) => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", handler);
    document.addEventListener("keydown", esc);
    return () => { document.removeEventListener("mousedown", handler); document.removeEventListener("keydown", esc); };
  }, [open]);

  const dateSet = useMemo(() => new Set(dates || []), [dates]);

  const year = monthCursor.getFullYear();
  const month = monthCursor.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  const todayIso = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const monthLabel = monthCursor.toLocaleDateString("en-US", { month: "long", year: "numeric" });
  const hasAny = dateSet.size > 0;

  return (
    <div ref={wrapperRef} className="relative flex-shrink-0">
      <button
        onClick={() => setOpen(!open)}
        className={`flex items-center justify-center w-[38px] h-[38px] rounded-xl border shadow-sm transition-all ${
          open || selectedDate
            ? "bg-amber-500 text-white border-amber-500"
            : "bg-white/80 dark:bg-zinc-800/80 backdrop-blur-md text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white border-zinc-200 dark:border-zinc-700 hover:border-zinc-300 dark:hover:border-zinc-600"
        }`}
        title="Browse snapshots"
        aria-label="Open snapshot calendar"
      >
        <Icon.Calendar size={16} />
      </button>

      {open && (
        <div className="absolute top-full right-0 mt-2 w-[300px] bg-white dark:bg-zinc-900 rounded-2xl shadow-xl border border-zinc-200 dark:border-zinc-800 p-4 z-50 fade-in">
          {/* Month nav */}
          <div className="flex items-center justify-between mb-4">
            <button onClick={() => setMonthCursor(new Date(year, month - 1, 1))} className="p-2 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 dark:text-zinc-400 transition-colors" aria-label="Previous month">
              <Icon.ChevronRight size={14} className="rotate-180" />
            </button>
            <h3 className="text-sm font-bold text-zinc-900 dark:text-zinc-100 tabular-nums">{monthLabel}</h3>
            <button onClick={() => setMonthCursor(new Date(year, month + 1, 1))} className="p-2 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 dark:text-zinc-400 transition-colors" aria-label="Next month">
              <Icon.ChevronRight size={14} />
            </button>
          </div>

          {/* Weekday headers */}
          <div className="grid grid-cols-7 gap-1 mb-1">
            {["S","M","T","W","T","F","S"].map((d, i) => (
              <div key={i} className="text-center text-[10px] font-bold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider py-1">{d}</div>
            ))}
          </div>

          {/* Day grid */}
          <div className="grid grid-cols-7 gap-1">
            {cells.map((day, i) => {
              if (day === null) return <div key={i} className="h-9" />;
              const iso = `${year}-${pad(month + 1)}-${pad(day)}`;
              const hasSnap = dateSet.has(iso);
              const isToday = iso === todayIso;
              const isSelected = iso === selectedDate;
              return (
                <button
                  key={i}
                  onClick={() => { if (hasSnap) { onSelect(iso); setOpen(false); } }}
                  disabled={!hasSnap}
                  className={`relative h-9 rounded-lg text-xs font-semibold transition-all flex items-center justify-center tabular-nums ${
                    isSelected
                      ? "bg-amber-500 text-white shadow-md shadow-amber-500/30"
                      : hasSnap
                        ? "text-zinc-900 dark:text-zinc-100 hover:bg-zinc-100 dark:hover:bg-zinc-800 cursor-pointer"
                        : "text-zinc-300 dark:text-zinc-700 cursor-not-allowed"
                  } ${isToday && !isSelected ? "ring-1 ring-blue-400 ring-inset" : ""}`}
                  title={hasSnap ? "View snapshot" : undefined}
                >
                  {day}
                  {hasSnap && !isSelected && (
                    <span className="absolute bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-blue-500" />
                  )}
                </button>
              );
            })}
          </div>

          {/* Footer */}
          <div className="mt-3 pt-3 border-t border-zinc-100 dark:border-zinc-800 flex gap-2">
            <button
              onClick={() => { onSelect("live"); setOpen(false); }}
              className="flex-1 py-2 text-xs font-bold text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-white bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-lg transition-colors"
            >
              Today
            </button>
            {selectedDate && (
              <button
                onClick={() => { onSelect("live"); setOpen(false); }}
                className="flex-1 py-2 text-xs font-bold text-zinc-600 dark:text-zinc-300 hover:text-blue-500 dark:hover:text-blue-400 bg-zinc-100 dark:bg-zinc-800 hover:bg-blue-50 dark:hover:bg-blue-500/10 rounded-lg transition-colors"
              >
                Back to Live
              </button>
            )}
          </div>

          {!hasAny && (
            <p className="text-[10px] text-zinc-400 dark:text-zinc-500 text-center mt-3 italic">No snapshots yet — history builds daily.</p>
          )}
        </div>
      )}
    </div>
  );
}

// Asana status updates embed @mentions as bare profile/permalink URLs
// (e.g. https://app.asana.com/1/.../profile/123). Those render as names inside
// Asana but come through the API as raw links, so strip them from any status
// text we show as a fallback instead of dumping the URLs on screen.
function cleanAsanaText(text) {
  if (!text) return "";
  return text
    .replace(/https?:\/\/app\.asana\.com\/\S+/gi, "")
    .split("\n")
    .map(line => line.replace(/[^\S\n]+$/, "").replace(/[ \t]{2,}/g, " "))
    .join("\n")
    .replace(/\n{3,}/g, "\n\n")
    .trim();
}

// "2026-07-07" → "July 7, 2026" (parsed as local date parts to avoid UTC off-by-one)
function epmoFullDate(s) {
  if (!s) return "";
  const [y, m, d] = String(s).slice(0, 10).split("-").map(Number);
  if (!y || !m || !d) return s;
  return new Date(y, m - 1, d).toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
}

function epmoWhen(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return "";
  const t = d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  const now = new Date();
  const y = new Date(now); y.setDate(now.getDate() - 1);
  if (d.toDateString() === now.toDateString()) return `today ${t}`;
  if (d.toDateString() === y.toDateString()) return `yesterday ${t}`;
  return `${d.toLocaleDateString([], { month: "short", day: "numeric" })}, ${t}`;
}

function EpmoDashboardTab() {
  const [live, setLive] = useState(null);
  const [history, setHistory] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [memberFilter, setMemberFilter] = useState("all");
  const [focusedGid, setFocusedGid] = useState(null);
  const [completedModal, setCompletedModal] = useState(null);
  const healthRef = useRef(null); const healthChart = useRef(null);
  const histRef = useRef(null); const histChart = useRef(null);

  const toggleFocus = useCallback((gid) => setFocusedGid(g => (g === gid ? null : gid)), []);

  // Focus mode keyboard: Esc exits, ↑/↓ (or j/k) jump to the previous/next visible project
  useEffect(() => {
    if (!focusedGid) return;
    const onKey = (e) => {
      if (e.key === "Escape") { setFocusedGid(null); return; }
      const down = e.key === "ArrowDown" || e.key === "j";
      const up = e.key === "ArrowUp" || e.key === "k";
      if ((!down && !up) || !live) return;
      const team = live.team || [];
      const shown = memberFilter === "all" ? team : team.filter(t => t.gid === memberFilter);
      const order = shown.flatMap(t => (live.projects || []).filter(p => p.memberGid === t.gid).map(p => p.gid));
      const idx = order.indexOf(focusedGid);
      if (idx === -1) return;
      e.preventDefault();
      const next = down ? Math.min(idx + 1, order.length - 1) : Math.max(idx - 1, 0);
      setFocusedGid(order[next]);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [focusedGid, live, memberFilter]);

  // Clicking anywhere outside the focused card exits focus mode
  // (other project cards keep pointer events, so their own click re-focuses them)
  useEffect(() => {
    if (!focusedGid) return;
    const onDown = (e) => {
      if (e.target instanceof Element && e.target.closest('[data-epmo-focused="true"]')) return;
      setFocusedGid(null);
    };
    document.addEventListener("mousedown", onDown);
    return () => document.removeEventListener("mousedown", onDown);
  }, [focusedGid]);

  useEffect(() => {
    Promise.all([
      supabase.from("app_state").select("data").eq("id", 6).single(),
      supabase.from("app_state").select("data").eq("id", 7).single()
    ]).then(([liveRes, histRes]) => {
      if (liveRes.error || !liveRes.data?.data) { setError("No EPMO data yet — the daily routine has not published a digest."); setLoading(false); return; }
      setLive(liveRes.data.data);
      if (histRes.data?.data?.snapshots) setHistory(histRes.data.data.snapshots);
      setLoading(false);
    });
  }, []);

  useEffect(() => {
    if (!healthRef.current || !live) return;
    if (healthChart.current) healthChart.current.destroy();
    const bh = live.summary?.byHealth || {};
    const order = ["on_track", "at_risk", "off_track", "on_hold", "none"];
    const keys = order.filter(k => bh[k]);
    const isDk = document.documentElement.classList.contains("dark");
    healthChart.current = new Chart(healthRef.current, {
      type: "doughnut",
      data: { labels: keys.map(k => EPMO_HEALTH[k].label), datasets: [{ data: keys.map(k => bh[k]), backgroundColor: keys.map(k => EPMO_HEALTH[k].color), borderWidth: 2, borderColor: isDk ? "#27272a" : "#fff" }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: "62%", plugins: { legend: { position: "bottom", labels: { color: isDk ? "#a1a1aa" : "#52525b", font: { size: 11 }, boxWidth: 10, padding: 10 } } } }
    });
    return () => { if (healthChart.current) healthChart.current.destroy(); };
  }, [live]);

  useEffect(() => {
    if (!histRef.current || history.length === 0) return;
    if (histChart.current) histChart.current.destroy();
    const snaps = [...history].sort((a, b) => (a.date < b.date ? -1 : 1));
    const isDk = document.documentElement.classList.contains("dark");
    const grid = isDk ? "#27272a" : "#f4f4f5"; const tick = isDk ? "#a1a1aa" : "#71717a";
    histChart.current = new Chart(histRef.current, {
      type: "line",
      data: { labels: snaps.map(s => s.date.slice(5)), datasets: [
        { label: "Open", data: snaps.map(s => s.totalOpen), borderColor: "#3b82f6", backgroundColor: "#3b82f622", fill: true, tension: 0.3, pointRadius: 2 },
        { label: "Needs attention", data: snaps.map(s => s.needsAttention), borderColor: "#f59e0b", backgroundColor: "transparent", tension: 0.3, pointRadius: 2 },
        { label: "Completed (wk)", data: snaps.map(s => s.completedThisWeek || 0), borderColor: "#22c55e", backgroundColor: "transparent", tension: 0.3, pointRadius: 2 } ] },
      options: { responsive: true, maintainAspectRatio: false, interaction: { mode: "index", intersect: false }, plugins: { legend: { position: "bottom", labels: { color: tick, font: { size: 11 }, boxWidth: 10, padding: 10 } } }, scales: { x: { grid: { color: grid }, ticks: { color: tick, font: { size: 10 } } }, y: { beginAtZero: true, grid: { color: grid }, ticks: { color: tick, font: { size: 10 }, precision: 0 } } } }
    });
    return () => { if (histChart.current) histChart.current.destroy(); };
  }, [history]);

  if (loading) return <div className="flex items-center justify-center py-24"><div className="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>;
  if (error) return (

    </div>

  const s = live.summary || {};
  const bm = s.byMember || {};
  const team = live.team || [];
  const atRisk = (s.byHealth?.at_risk || 0) + (s.byHealth?.off_track || 0);
  const overview = live.aiOverview || (live.writtenSummary || "").split("\n").map(l => l.replace(/^-\s*/, "").trim()).filter(Boolean).join(" ");

        <div className="text-right">
          <div className="text-xs font-bold text-zinc-500 dark:text-zinc-400">Brief for {live.generatedFor}</div>
          {live.updatedAt && <div className="text-[11px] text-zinc-400 dark:text-zinc-500">Updated {live.updatedAt.slice(0, 16).replace("T", " ")}</div>}
        </div>
      </div>

        <div className={`epmo-dimmable ${dim} mt-5 bg-gradient-to-br from-blue-50 to-white dark:from-blue-500/10 dark:to-zinc-800 rounded-2xl border border-blue-100 dark:border-blue-500/20 px-5 py-4`}>
          <div className="flex items-center gap-2 mb-2">
            <span className="text-[11px] font-bold uppercase tracking-wider text-blue-500 dark:text-blue-400">Team status overview</span>
            <span className="text-[10px] font-bold uppercase tracking-wider text-blue-400/70 dark:text-blue-300/60 bg-blue-100 dark:bg-blue-500/15 px-1.5 py-0.5 rounded-full">AI</span>

      <div className="mt-6">

      </div>
    </div>
  );
}

  const handleDateSelect = (dateStr) => {
    if (!dateStr || dateStr === "live") {

    }
    setSelectedDate(dateStr);

  };

  // Donut chart — must live before early returns so hook order is stable
  useEffect(() => {
    if (!stageChartRef.current || !data) return;
    if (stageChartInstance.current) stageChartInstance.current.destroy();

    const CLASS_COLORS = {"CoE Project":"#3b82f6","Admin Request":"#f59e0b","Rejected":"#ef4444","Unclassified":"#a1a1aa"};
    const byClass = data.summary?.byClassification || {};
    const sorted = Object.entries(byClass).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
    const total = sorted.reduce((s,[,v]) => s + v, 0);

    const labels = sorted.map(([l]) => l);
    const values = sorted.map(([, v]) => v);
    const colors = sorted.map(([l]) => CLASS_COLORS[l] || "#6b7280");
    const isDk = document.documentElement.classList.contains("dark");

    stageChartInstance.current = new Chart(stageChartRef.current, {
      type: "doughnut",
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: colors,
          borderColor: isDk ? "#18181b" : "#ffffff",

/* ═══ Avatar Hub — status ring + stats popover + settings + email badge ═══ */
function AvatarHub({ digests, completed, reminders, theme, onThemeToggle }) {
  const [open, setOpen] = useState(false);
  const [emailPanel, setEmailPanel] = useState(false);
  const [unrepliedEmails, setUnrepliedEmails] = useState([]);
  const [emailsUpdatedAt, setEmailsUpdatedAt] = useState(null);
  const wrapperRef = useRef(null);

  // Fetch unreplied emails once on mount (data comes from scheduled task)
  useEffect(() => {
    let mounted = true;
    readUnrepliedEmails().then(data => {
      if (mounted) {
        setUnrepliedEmails(data.emails || []);
        setEmailsUpdatedAt(data.updatedAt || null);
      }
    });
    return () => { mounted = false; };
  }, []);

  const emailCount = unrepliedEmails.length;
  const _now = new Date();
  const _isWeekend = _now.getDay() === 0 || _now.getDay() === 6;
  const avatarSrc = _isWeekend ? "weekend-avatar.png" : (_now.getHours() >= 18 ? "avatar-evening.png" : "avatar.png");

  // Dismiss a single email — remove locally + update Supabase
  const dismissEmail = useCallback(async (emailId) => {
    setUnrepliedEmails(prev => {
      const next = prev.filter(e => e.id !== emailId);
      // Fire-and-forget Supabase update
      supabase.from('app_state').upsert({ id: 3, data: { emails: next, updatedAt: new Date().toISOString() } }).then(() => {
        console.log("[emails] dismissed", emailId);
      });
      return next;
    });
  }, []);

  useEffect(() => {
    if (!open && !emailPanel) return;
    const handler = (e) => {
      if (wrapperRef.current && !wrapperRef.current.contains(e.target)) { setOpen(false); setEmailPanel(false); }
    };
    const esc = (e) => { if (e.key === "Escape") { setOpen(false); setEmailPanel(false); } };
    document.addEventListener("mousedown", handler);
    document.addEventListener("keydown", esc);
    return () => {
      document.removeEventListener("mousedown", handler);
      document.removeEventListener("keydown", esc);
    };
  }, [open, emailPanel]);

  // Today detection
  const now = new Date();
  const dayOfWeek = now.getDay(); // 0 = Sun, 6 = Sat
  const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
  const pad = (n) => String(n).padStart(2, "0");
  const todayIso = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
  const dayName = now.toLocaleDateString("en-US", { weekday: "long" });

  // Today's digest (most relevant one — exact match, then latest)
  const todayDigest = useMemo(() => {
    return digests.find(d => d.isoDate === todayIso) || digests[0] || null;
  }, [digests, todayIso]);

  const stats = useMemo(() => {
    if (!todayDigest) return { total: 0, done: 0, pct: 0, urgent: 0 };
    const actionItems = todayDigest.sections.filter(s => !s.info).flatMap(s => s.items);
    const total = actionItems.length;
    const done = actionItems.filter(i => isDone(i, completed)).length;
    const urgent = actionItems.filter(i => i.flag === "urgent" && !isDone(i, completed)).length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    return { total, done, pct, urgent };
  }, [todayDigest, completed]);

  const perfectDays = useMemo(() => {
    let count = 0;
    for (const d of digests) {
      const items = d.sections.filter(s => !s.info).flatMap(s => s.items);
      if (items.length === 0) continue;
      if (items.every(i => isDone(i, completed))) count++;
    }
    return count;
  }, [digests, completed]);

  // Ring state (weekday only)
  // - no items or no urgent pending → calm green wave
  // - urgent pending → solid red
  const isCalm = !isWeekend && stats.urgent === 0;
  const ringColor = stats.urgent > 0 ? "#ef4444" : "#10b981";

  return (
    <div ref={wrapperRef} className="relative">
      <button
        onClick={() => { if (emailCount > 0 && !emailPanel) { setEmailPanel(true); setOpen(false); } else { setOpen(!open); setEmailPanel(false); } }}
        className={`relative rounded-full transition-transform hover:scale-105 active:scale-95 ${isWeekend ? "weekend-breathe" : ""}`}
        title={emailCount > 0 ? `${emailCount} correo${emailCount === 1 ? "" : "s"} sin contestar` : "Your day at a glance"}
        aria-label={emailCount > 0 ? "View unreplied emails" : "Open profile menu"}
      >
        {/* Status ring */}
        <div
          className={`absolute inset-0 rounded-full ${isWeekend ? "weekend-ring" : isCalm && emailCount === 0 ? "calm-ring" : ""}`}
          style={!isWeekend && (!isCalm || emailCount > 0) ? { background: emailCount > 0 ? "#ef4444" : ringColor } : undefined}
        />
        {/* Avatar image (with inset padding so ring shows) */}
        <div className="relative m-[3px] w-14 h-14 sm:w-16 sm:h-16 md:w-24 md:h-24 rounded-full overflow-hidden border-2 border-white dark:border-zinc-900 shadow-lg shadow-zinc-300/40 dark:shadow-zinc-950/60">
          <img src={avatarSrc} alt="Jean" className="w-full h-full object-cover" onError={(e) => { e.target.style.display = 'none'; }} />
        </div>
        {/* Email badge — red circle with count */}
        {emailCount > 0 && (
          <div className="absolute -top-0.5 -right-0.5 md:top-0 md:right-0 z-10 flex items-center justify-center min-w-[20px] h-[20px] md:min-w-[26px] md:h-[26px] px-1 rounded-full bg-red-500 border-2 border-white dark:border-zinc-900 email-badge-pulse">
            <span className="text-[10px] md:text-xs font-extrabold text-white tabular-nums leading-none">{emailCount}</span>
          </div>
        )}
      </button>

      {open && (
        <div className="absolute top-full right-0 mt-3 w-[300px] bg-white dark:bg-zinc-900 rounded-2xl shadow-xl border border-zinc-200 dark:border-zinc-800 p-5 z-50 fade-in">
          {/* Header */}
          <div className="flex items-center gap-3 mb-5">
            <img src={avatarSrc} alt="" className="w-11 h-11 rounded-full object-cover border-2 border-white dark:border-zinc-800 shadow-sm" onError={(e) => { e.target.style.display = 'none'; }} />
            <div>
              <p className="text-sm font-extrabold text-zinc-900 dark:text-zinc-50">Jean</p>
              <p className="text-xs font-medium text-zinc-400 dark:text-zinc-500">{dayName}{isWeekend ? " · Weekend mode" : ""}</p>
            </div>
          </div>

          {/* Today progress */}
          {stats.total > 0 ? (
            <div className="mb-5">
              <div className="flex items-center justify-between mb-2">
                <span className="text-[10px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500">Today</span>
                <span className={`text-xs font-bold tabular-nums ${stats.pct === 100 ? "text-emerald-500" : "text-zinc-700 dark:text-zinc-300"}`}>{stats.done}/{stats.total} &middot; {stats.pct}%</span>
              </div>
              <div className="h-1.5 bg-zinc-100 dark:bg-zinc-800 rounded-full overflow-hidden">
                <div
                  className="h-full rounded-full transition-all duration-500 relative overflow-hidden"
                  style={{
                    width: `${stats.pct}%`,
                    background: stats.pct === 100 ? "#10b981" : stats.urgent > 0 ? "#ef4444" : "#3b82f6"
                  }}
                >
                  {stats.pct > 0 && stats.pct < 100 && (
                    <div className="absolute inset-y-0 progress-shimmer" style={{ background: "linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%)", width: "70%" }} />
                  )}
                </div>
              </div>
            </div>
          ) : (
            <div className="mb-5 py-3 text-center text-xs text-zinc-400 dark:text-zinc-500 italic">No briefing for today yet.</div>
          )}

          {/* Stat chips */}
          <div className="grid grid-cols-2 gap-2 mb-5">
            <div className={`rounded-xl px-3 py-2.5 ${stats.urgent > 0 ? "bg-red-50 dark:bg-red-500/10" : "bg-zinc-50 dark:bg-zinc-800/50"}`}>
              <div className={`text-lg font-extrabold tabular-nums ${stats.urgent > 0 ? "text-red-500" : "text-zinc-300 dark:text-zinc-600"}`}>{stats.urgent}</div>

/* ═══ Calendar Button — date picker for jumping to briefings ═══ */
function CalendarButton({ digests, selectedDate, onSelect }) {
  const [open, setOpen] = useState(false);
  const [monthCursor, setMonthCursor] = useState(() => {
    const seed = selectedDate ? new Date(selectedDate + "T00:00:00") : new Date();
    return new Date(seed.getFullYear(), seed.getMonth(), 1);
  });
  const wrapperRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setOpen(false);
    };
    const esc = (e) => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", handler);
    document.addEventListener("keydown", esc);
    return () => {
      document.removeEventListener("mousedown", handler);
      document.removeEventListener("keydown", esc);
    };
  }, [open]);

  const datesWithDigests = useMemo(() => {
    const map = new Map();
    for (const d of digests) {
      if (!d.isoDate) continue;
      map.set(d.isoDate, (map.get(d.isoDate) || 0) + 1);
    }
    return map;
  }, [digests]);

  const year = monthCursor.getFullYear();
  const month = monthCursor.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  const todayIso = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${today.getDate().toString().padStart(2, "0")}`;

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const monthLabel = monthCursor.toLocaleDateString("en-US", { month: "long", year: "numeric" });
  const hasAny = datesWithDigests.size > 0;

  return (
    <div ref={wrapperRef} className="relative flex-shrink-0">
      <button
        onClick={() => setOpen(!open)}
        className={`flex items-center justify-center w-[46px] h-[46px] rounded-2xl border shadow-sm transition-all ${
          open || selectedDate
            ? "bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 border-zinc-900 dark:border-white"
            : "bg-white/80 dark:bg-zinc-800/80 backdrop-blur-md text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-white border-zinc-200 dark:border-zinc-700 hover:border-zinc-300 dark:hover:border-zinc-600"
        }`}
        title="Browse by date"
        aria-label="Open calendar"
      >
        <Icon.Calendar size={18} />
      </button>

      {open && (
        <div className="absolute top-full right-0 mt-2 w-[300px] bg-white dark:bg-zinc-900 rounded-2xl shadow-xl border border-zinc-200 dark:border-zinc-800 p-4 z-50 fade-in">
          {/* Month nav */}
          <div className="flex items-center justify-between mb-4">
            <button
              onClick={() => setMonthCursor(new Date(year, month - 1, 1))}
              className="p-2 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 dark:text-zinc-400 transition-colors"
              aria-label="Previous month"
            >
              <Icon.ChevronRight size={14} className="rotate-180" />
            </button>
            <h3 className="text-sm font-bold text-zinc-900 dark:text-zinc-100 tabular-nums">{monthLabel}</h3>
            <button
              onClick={() => setMonthCursor(new Date(year, month + 1, 1))}
              className="p-2 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 dark:text-zinc-400 transition-colors"
              aria-label="Next month"
            >
              <Icon.ChevronRight size={14} />
            </button>
          </div>

          {/* Weekday headers */}
          <div className="grid grid-cols-7 gap-1 mb-1">
            {["S","M","T","W","T","F","S"].map((d, i) => (
              <div key={i} className="text-center text-[10px] font-bold text-zinc-400 dark:text-zinc-500 uppercase tracking-wider py-1">{d}</div>
            ))}
          </div>

          {/* Day grid */}
          <div className="grid grid-cols-7 gap-1">
            {cells.map((day, i) => {
              if (day === null) return <div key={i} className="h-9" />;
              const iso = `${year}-${pad(month + 1)}-${pad(day)}`;
              const hasD = datesWithDigests.has(iso);
              const isToday = iso === todayIso;
              const isSelected = iso === selectedDate;
              return (
                <button
                  key={i}
                  onClick={() => { if (hasD) { onSelect(iso); setOpen(false); } }}
                  disabled={!hasD}
                  className={`relative h-9 rounded-lg text-xs font-semibold transition-all flex items-center justify-center tabular-nums ${
                    isSelected
                      ? "bg-blue-500 text-white shadow-md shadow-blue-500/30"
                      : hasD
                        ? "text-zinc-900 dark:text-zinc-100 hover:bg-zinc-100 dark:hover:bg-zinc-800 cursor-pointer"
                        : "text-zinc-300 dark:text-zinc-700 cursor-not-allowed"
                  } ${isToday && !isSelected ? "ring-1 ring-blue-400 ring-inset" : ""}`}
                  title={hasD ? `${datesWithDigests.get(iso)} briefing${datesWithDigests.get(iso) > 1 ? "s" : ""}` : undefined}
                >
                  {day}
                  {hasD && !isSelected && (
                    <span className="absolute bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-blue-500" />
                  )}
                </button>
              );
            })}
          </div>

          {/* Footer actions */}
          <div className="mt-3 pt-3 border-t border-zinc-100 dark:border-zinc-800 flex gap-2">
            <button
              onClick={() => {
                setMonthCursor(new Date(today.getFullYear(), today.getMonth(), 1));
                if (datesWithDigests.has(todayIso)) { onSelect(todayIso); setOpen(false); }
              }}
              className="flex-1 py-2 text-xs font-bold text-zinc-600 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-white bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-lg transition-colors"
            >
              Today
            </button>
            {selectedDate && (
              <button
                onClick={() => { onSelect(null); setOpen(false); }}
                className="flex-1 py-2 text-xs font-bold text-zinc-600 dark:text-zinc-300 hover:text-red-500 dark:hover:text-red-400 bg-zinc-100 dark:bg-zinc-800 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-lg transition-colors"
              >
                Clear filter
              </button>
            )}
          </div>

          {!hasAny && (
            <p className="text-[10px] text-zinc-400 dark:text-zinc-500 text-center mt-3 italic">No briefings available yet.</p>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══ Reactions ═══ */
const REACTION_EMOJIS = ["🧠", "❗", "⭐", "📌"];

function ReactionPicker({ currentEmoji, anchor, onPick, onRemove, onClose }) {
  const ref = useRef(null);

  useEffect(() => {
    const onDown = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("mousedown", onDown);
    document.addEventListener("keydown", onKey);
    return () => {
      document.removeEventListener("mousedown", onDown);
      document.removeEventListener("keydown", onKey);
    };
  }, [onClose]);

  // Clamp position to viewport so picker never overflows. Width estimate covers the
  // 4 emoji buttons plus the optional Remove pill so reactions-with-Remove still fit.
  const PAD = 8;
  const W = currentEmoji ? 280 : 200;
  const H = 44;
  const x = Math.max(PAD, Math.min((anchor?.x ?? PAD), window.innerWidth - W - PAD));
  const y = Math.max(PAD, Math.min((anchor?.y ?? PAD), window.innerHeight - H - PAD));

  // Portal to <body> so backdrop-blur / overflow-hidden ancestors don't trap or clip us.
  return ReactDOM.createPortal(
    <div
      ref={ref}
      style={{ position: "fixed", left: x, top: y }}
      onClick={e => e.stopPropagation()}
      onContextMenu={e => e.preventDefault()}
      className="z-50 flex items-center gap-1 px-2 py-1.5 rounded-xl bg-white dark:bg-zinc-800 shadow-lg border border-zinc-200 dark:border-zinc-700"
    >
      {REACTION_EMOJIS.map(em => (
        <button
          key={em}
          onClick={() => { if (em !== currentEmoji) onPick(em); onClose(); }}
          className={`text-lg leading-none w-9 h-9 rounded-lg transition-all hover:scale-110 active:scale-95 ${currentEmoji === em ? "bg-zinc-100 dark:bg-zinc-700 ring-1 ring-blue-400" : "hover:bg-zinc-100 dark:hover:bg-zinc-700"}`}
          title={`React with ${em}`}
          aria-label={`React with ${em}`}
        >
          {em}
        </button>
      ))}
      {currentEmoji && (
        <button
          onClick={() => { onRemove(); onClose(); }}
          className="ml-1 text-[10px] font-bold uppercase tracking-wider text-zinc-500 hover:text-red-500 px-2 h-9 rounded-lg hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors"
          title="Remove reaction"
        >
          Remove
        </button>
      )}
    </div>,
    document.body
  );
}

/* ═══ Text highlight helper ═══ */
function highlight(text, query) {
  if (!query || !text) return text;
  const q = query.trim().toLowerCase();
  if (!q) return text;
  const lower = text.toLowerCase();
  const out = [];
  let i = 0, key = 0;
  while (i < text.length) {
    const idx = lower.indexOf(q, i);
    if (idx === -1) { out.push(text.slice(i)); break; }
    if (idx > i) out.push(text.slice(i, idx));
    out.push(
      <mark key={key++} className="bg-amber-200/80 dark:bg-amber-400/30 text-zinc-900 dark:text-amber-100 px-0.5 rounded-sm font-semibold">
        {text.slice(idx, idx + q.length)}
      </mark>
    );
    i = idx + q.length;
  }
  return out;
}

function itemMatches(item, q) {
  if (!q) return false;
  return item.label.toLowerCase().includes(q) || (item.detail || "").toLowerCase().includes(q);
}

function sectionMatches(section, q) {
  if (!q) return false;
  return section.title.toLowerCase().includes(q) || section.items.some(i => itemMatches(i, q));
}

/* ═══ CheckItem (interactive + inline edit) ═══ */
function CheckItem({ item, done, onToggle, searchQuery, editOverride, onEdit, reaction, onSetReaction }) {
  const [editing, setEditing] = useState(false);
  const [editLabel, setEditLabel] = useState("");
  const [editDetail, setEditDetail] = useState("");
  const labelRef = useRef(null);
  const [picker, setPicker] = useState(null); // null | {x, y}
  const longPressTimer = useRef(null);
  const longPressFired = useRef(false);
  const touchStart = useRef(null);

  const displayLabel = editOverride?.label || item.label;
  const displayDetail = editOverride?.detail !== undefined ? editOverride.detail : (item.detail || "");

  const startEdit = (e) => {
    e.stopPropagation();
    setEditLabel(displayLabel);
    setEditDetail(displayDetail);
    setEditing(true);
  };

  const saveEdit = (e) => {
    e.stopPropagation();
    if (editLabel.trim() && onEdit) {
      onEdit(keyOf(item), { label: editLabel.trim(), detail: editDetail.trim() });
    }
    setEditing(false);
  };

  const cancelEdit = (e) => {
    e.stopPropagation();
    setEditing(false);
  };

  const openPicker = (e, x, y) => {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    setPicker({ x, y });
  };
  const closePicker = useCallback(() => setPicker(null), []);

  const onContextMenu = (e) => {
    if (done) return;
    openPicker(e, e.clientX, e.clientY);
  };

  const onTouchStart = (e) => {
    if (done) return;
    longPressFired.current = false;
    const t = e.touches[0];
    touchStart.current = { x: t.clientX, y: t.clientY };
    // Capture currentTarget synchronously — React pools the event, so it may be null after the timeout.
    const el = e.currentTarget;
    longPressTimer.current = setTimeout(() => {
      longPressFired.current = true;
      const rect = el.getBoundingClientRect();
      openPicker(null, rect.left + 16, rect.top + rect.height + 4);
    }, 500);
  };
  const onTouchMove = (e) => {
    if (!touchStart.current) return;
    const t = e.touches[0];
    if (Math.abs(t.clientX - touchStart.current.x) > 10 || Math.abs(t.clientY - touchStart.current.y) > 10) {
      clearTimeout(longPressTimer.current);
      touchStart.current = null;
    }
  };
  const onTouchEnd = () => {
    clearTimeout(longPressTimer.current);
    touchStart.current = null;
  };

  const onRowClick = (e) => {
    if (longPressFired.current) { longPressFired.current = false; return; }
    onToggle();
  };

  const openPickerFromButton = (e) => {
    e.stopPropagation();
    const rect = e.currentTarget.getBoundingClientRect();
    openPicker(e, rect.left, rect.bottom + 4);
  };

  useEffect(() => {
    if (editing && labelRef.current) {
      labelRef.current.focus();
      labelRef.current.select();
    }
  }, [editing]);

  useEffect(() => () => clearTimeout(longPressTimer.current), []);

  if (editing) {
    return (
      <div
        onClick={e => e.stopPropagation()}
        className="py-3 px-3 rounded-xl bg-blue-50/60 dark:bg-blue-500/5 border border-blue-200 dark:border-blue-500/20 transition-all duration-200"
      >
        <div className="flex items-start gap-3 mb-3">
          <div className="mt-1.5 w-5 h-5 rounded-full flex-shrink-0 border border-zinc-300 dark:border-zinc-600 bg-white dark:bg-zinc-900" />
          <div className="flex-1 space-y-2">
            <textarea
              ref={labelRef}
              value={editLabel}
              onChange={e => setEditLabel(e.target.value)}
              rows={2}
              onKeyDown={e => { if (e.key === "Escape") cancelEdit(e); if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) saveEdit(e); }}
              className="w-full text-sm font-medium text-zinc-800 dark:text-zinc-200 bg-white dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-600 focus:border-blue-400 dark:focus:border-blue-500 rounded-lg px-2.5 py-1.5 resize-none outline-none transition-colors"
              placeholder="Label..."
            />
            <textarea
              value={editDetail}
              onChange={e => setEditDetail(e.target.value)}
              rows={3}
              onKeyDown={e => { if (e.key === "Escape") cancelEdit(e); if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) saveEdit(e); }}
              className="w-full text-xs text-zinc-500 dark:text-zinc-400 bg-white dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-600 focus:border-blue-400 dark:focus:border-blue-500 rounded-lg px-2.5 py-1.5 resize-none outline-none transition-colors"
              placeholder="Detail (optional)..."
            />
            <p className="text-[10px] text-zinc-400 dark:text-zinc-500">⌘↵ to save · Esc to cancel</p>
          </div>
        </div>
        <div className="flex justify-end gap-2 pl-8">
          <button onClick={cancelEdit} className="text-xs font-medium text-zinc-500 hover:text-zinc-700 dark:text-zinc-400 dark:hover:text-zinc-200 px-3 py-1.5 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-700 transition-colors">Cancel</button>
          <button onClick={saveEdit} className="text-xs font-bold text-blue-600 dark:text-blue-400 px-3 py-1.5 rounded-lg bg-blue-100 dark:bg-blue-500/15 hover:bg-blue-200 dark:hover:bg-blue-500/25 transition-colors">Save edit</button>
        </div>
      </div>
    );
  }

  return (
    <div
      onClick={onRowClick}
      onContextMenu={onContextMenu}
      onTouchStart={onTouchStart}
      onTouchMove={onTouchMove}
      onTouchEnd={onTouchEnd}
      onTouchCancel={onTouchEnd}
      className={`group relative flex items-start gap-3 py-3 px-3 rounded-xl cursor-pointer select-none transition-all duration-200 hover:bg-zinc-100/50 dark:hover:bg-zinc-800/50 ${done ? "opacity-40" : ""}`}
    >
      <div className={`mt-0.5 w-5 h-5 rounded-full flex-shrink-0 flex items-center justify-center transition-all duration-300 ${done ? "bg-emerald-500 shadow-sm shadow-emerald-500/20 scale-105" : "border border-zinc-300 dark:border-zinc-600 bg-white dark:bg-zinc-900 group-hover:border-zinc-400 dark:group-hover:border-zinc-500"}`}>
        {done && <Icon.Check size={11} color="white" />}
      </div>
      <div className="flex-1 min-w-0 transition-transform duration-200 group-hover:translate-x-1">

/* ═══ GitHub state sync — source of truth for reminders ═══ */
// Preferred path: a server-side proxy (Vercel function) holds the GitHub token,
// so NO token ever lives in the browser. Set SYNC_PROXY_URL to the deployed
// endpoint (e.g. https://<project>.vercel.app/api/sync-state). Until then, a
// personal token in localStorage["llf-github-token"] still works as a fallback.
const GITHUB_REPO  = "tudobempm/pmdashboard";
const GITHUB_BRANCH = "main";
const GITHUB_STATE_PATH = "briefing_state.json";
const GITHUB_API_BASE = "https://api.github.com";

// Read-side data fetch: try raw.githubusercontent.com first, fall back to the
// Pages-relative path. The Pages copy of the data files (digests.json,
// briefing_state.json) only refreshes when the site
// redeploys — on a 2h schedule that GitHub cron often delays by another 1-2h —
// so a digest published at 8:05 AM wasn't visible until mid-morning. Raw
// serves the latest commit within seconds of the push.
async function fetchFreshJson(file) {
  try {
    const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${file}?t=${Date.now()}`, { cache: "no-store" });
    if (res.ok) return await res.json();
  } catch {}
  const res = await fetch(`${file}?${Date.now()}`, { cache: "no-store" });
  if (!res.ok) throw new Error("Failed to load");
  return res.json();
}

// Deployed write-proxy endpoint. When set, the dashboard POSTs state here and
// never needs a token in the browser. Leave "" to use the localStorage-token
// fallback below. Can also be overridden per-browser via localStorage "llf-sync-url".
const SYNC_PROXY_URL = "https://pmdashboard-orcin.vercel.app/api/sync-state";
function getSyncProxyUrl() {
  try { return localStorage.getItem("llf-sync-url") || SYNC_PROXY_URL; } catch { return SYNC_PROXY_URL; }
}

function getGithubToken() {
  try { return localStorage.getItem("llf-github-token") || ""; } catch { return ""; }
}

let githubWriteQueue = null;

async function githubWriteState(patch) {
  // Preferred: write through the server-side proxy (no browser token).
  const proxyUrl = getSyncProxyUrl();
  if (proxyUrl) {
    try {
      const res = await fetch(proxyUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(patch),
      });
      if (!res.ok) {
        const detail = await res.text().catch(() => "");
        throw new Error(`proxy ${res.status} — ${detail.slice(0, 160)}`);
      }
      console.log("[github] state synced via proxy:", Object.keys(patch));
    } catch (e) {
      console.warn("[github] state sync via proxy FAILED:", e);
    }
    return;
  }
  // Fallback: direct write using a personal token in localStorage.
  const GITHUB_TOKEN = getGithubToken();
  if (!GITHUB_TOKEN) {
    console.warn("[github] no SYNC_PROXY_URL and llf-github-token not set — skipping state sync");
    return;
  }
  try {
    const headers = {
      Authorization: `Bearer ${GITHUB_TOKEN}`,
      Accept: "application/vnd.github+json",
      "X-GitHub-Api-Version": "2022-11-28",
    };
    const fileUrl = `${GITHUB_API_BASE}/repos/${GITHUB_REPO}/contents/${GITHUB_STATE_PATH}?ref=${GITHUB_BRANCH}`;
    const res = await fetch(fileUrl, { headers });
    if (!res.ok) throw new Error(`GitHub GET failed: ${res.status}`);
    const file = await res.json();
    const current = JSON.parse(atob(file.content.replace(/\n/g, "")));
    const updated = JSON.stringify({ ...current, ...patch }, null, 2) + "\n";
    const putRes = await fetch(`${GITHUB_API_BASE}/repos/${GITHUB_REPO}/contents/${GITHUB_STATE_PATH}`, {
      method: "PUT",
      headers: { ...headers, "Content-Type": "application/json" },
      body: JSON.stringify({
        message: "chore: sync dashboard state",
        content: btoa(unescape(encodeURIComponent(updated))),
        sha: file.sha,
        branch: GITHUB_BRANCH,
      }),
    });
    if (!putRes.ok) {
      const err = await putRes.json().catch(() => ({}));
      throw new Error(`GitHub PUT failed: ${putRes.status} — ${err.message || ""}`);
    }
    console.log("[github] state synced to briefing_state.json:", Object.keys(patch));
  } catch (e) {
    console.warn("[github] state sync FAILED:", e);
  }
}

function debouncedGithubWrite(patch) {
  clearTimeout(githubWriteQueue);
  const stamped = { ...patch, lastModified: Date.now() };
  githubWriteQueue = setTimeout(() => githubWriteState(stamped), 1500);
}

let writeQueue = null;
let remoteOk = true;

async function remoteRead() {
  try {
    const { data: item, error } = await supabase.from('app_state').select('data').eq('id', 1).single();

    const data = item && item.data ? item.data : null;

    return data;
  } catch (e) {
    remoteOk = false;
    console.warn("[state] remote read FAILED:", e);
    return null;
  }
}

async function remoteWrite(state) {
  try {
    const { error } = await supabase.from('app_state').upsert({ id: 1, data: state });
    if (error) throw error;
    remoteOk = true;
    console.log("[state] remote write OK (historical):", JSON.stringify(state));
  } catch (e) {
    remoteOk = false;
    console.warn("[state] remote write FAILED:", e);
  }
}

function debouncedWrite(state) {
  const stamped = { ...state, lastModified: Date.now() };
  try { localStorage.setItem("llf-state", JSON.stringify(stamped)); } catch {}
  clearTimeout(writeQueue);
  writeQueue = setTimeout(() => remoteWrite(stamped), 800);
}

function ReminderQuickAdd({ reminders, onAdd, onSeeAll, onBack, isOnRemindersTab }) {
  const [open, setOpen] = useState(false);
  const [text, setText] = useState("");
  const [showSchedule, setShowSchedule] = useState(false);
  const [scheduleMode, setScheduleMode] = useState("default"); // "default" | "duration" | "date"
  const [durationDays, setDurationDays] = useState(3);
  const [customDate, setCustomDate] = useState("");

  const resetForm = () => {
    setText("");
    setShowSchedule(false);
    setScheduleMode("default");
    setDurationDays(3);
    setCustomDate("");
    setOpen(false);
  };

  const computeSchedule = () => {
    if (scheduleMode === "default") return {}; // one-shot, no extra fields
    if (scheduleMode === "duration") {
      const d = new Date();
      d.setDate(d.getDate() + durationDays);
      return { expiresAt: d.toISOString().split("T")[0] };
    }
    if (scheduleMode === "date" && customDate) return { scheduledFor: customDate };
    return {};
  };

  const handleAdd = () => {
    const trimmed = text.trim();
    if (!trimmed) return;
    const schedule = computeSchedule();
    onAdd(trimmed, schedule);
    resetForm();
  };

  const handleKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleAdd(); }
    if (e.key === "Escape") { resetForm(); }
  };

  // Min date for datepicker = tomorrow
  const tomorrow = useMemo(() => {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    return d.toISOString().split("T")[0];
  }, []);

  const durationPresets = [
    { label: "3 days", days: 3 },
    { label: "1 week", days: 7 },
    { label: "2 weeks", days: 14 },
    { label: "1 month", days: 30 },
  ];

  if (open) {
    return (
      <div className="mb-8 space-y-2">
        <div className="flex flex-col sm:flex-row gap-2">
          <input
            autoFocus
            type="text"
            value={text}
            onChange={e => setText(e.target.value)}
            onKeyDown={handleKey}
            placeholder="e.g. Follow up with Hassan on escalation..."
            className="flex-1 min-w-0 px-4 py-3 text-sm bg-white dark:bg-zinc-800 border border-blue-400 dark:border-blue-500 ring-2 ring-blue-500/20 shadow-sm rounded-xl text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 focus:outline-none transition-all font-medium min-h-[44px]"
          />

            <button

            className={`transition-transform duration-200 ${showSchedule ? "rotate-180" : ""}`}

        {showSchedule && (
          <div className="rounded-xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-800/50 p-3 space-y-3 fade-in">
            <div className="flex flex-wrap gap-1.5">
              <button
                onClick={() => { setScheduleMode("default"); }}
                className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-all ${scheduleMode === "default" ? "bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 shadow-sm" : "bg-zinc-100 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-600"}`}
              >
                Next briefing only

              {durationPresets.map(p => (
                <button
                  key={p.days}
                  onClick={() => { setScheduleMode("duration"); setDurationDays(p.days); }}
                  className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-all ${scheduleMode === "duration" && durationDays === p.days ? "bg-blue-500 text-white shadow-sm shadow-blue-500/20" : "bg-zinc-100 dark:bg-zinc-700 text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-600"}`}

              >
                On a specific date
              </button>
            </div>

            {scheduleMode === "date" && (
              <input
                type="date"
                min={tomorrow}
                value={customDate}
                onChange={e => setCustomDate(e.target.value)}
                className="w-full sm:w-auto px-3 py-2 text-sm bg-white dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-600 rounded-lg text-zinc-900 dark:text-zinc-100 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 font-medium"

            {scheduleMode === "duration" && (
              <p className="text-[11px] font-medium text-zinc-400 dark:text-zinc-500">
                This reminder will appear in every daily briefing until {(() => { const d = new Date(); d.setDate(d.getDate() + durationDays); return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" }); })()}.

              <p className="text-[11px] font-medium text-zinc-400 dark:text-zinc-500">

}

/* ═══ Full Reminders View — list + empty state + history ═══ */
function RemindersView({ reminders, onRemove, reminderHistory }) {
  const [historyOpen, setHistoryOpen] = useState(false);

  /* Group history by digestDate */
  const grouped = useMemo(() => {
    if (!reminderHistory || !reminderHistory.length) return [];
    const map = {};
    reminderHistory.forEach(r => {
      const key = r.digestDate || r.consumedAt?.split("T")[0] || "Unknown";
      if (!map[key]) map[key] = { digestDate: key, digestId: r.digestId, items: [] };
      map[key].items.push(r);
    });
    return Object.values(map).sort((a, b) => b.digestDate.localeCompare(a.digestDate));
  }, [reminderHistory]);

  return (
    <div className="fade-in">
      {/* Active reminders */}
      <div className="flex items-center gap-2.5 mb-5">
        <div className="p-1.5 rounded-full bg-blue-100 dark:bg-blue-900/30">
          <BellIcon className="text-blue-500" />
        </div>
        <h2 className="text-sm font-semibold text-zinc-700 dark:text-zinc-200">Reminders for next briefing</h2>
        {reminders.length > 0 && (
          <span className="bg-blue-500 text-white shadow-sm shadow-blue-500/20 text-[10px] font-bold px-2 py-0.5 rounded-full tabular-nums">{reminders.length}</span>
        )}
      </div>

      {reminders.length > 0 ? (
        <div className="space-y-2">
          {reminders.map(r => {
            const isPersistent = !!r.expiresAt;
            const isScheduled = !!r.scheduledFor;
            const hasSchedule = isPersistent || isScheduled;
            let badgeLabel = null;
            let badgeDetail = null;
            if (isPersistent) {
              const exp = new Date(r.expiresAt + "T23:59:59");
              const now = new Date();
              const daysLeft = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
              badgeLabel = daysLeft <= 0 ? "Expires today" : daysLeft === 1 ? "1 day left" : `${daysLeft} days left`;
              badgeDetail = "until " + new Date(r.expiresAt + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
            } else if (isScheduled) {
              const sched = new Date(r.scheduledFor + "T12:00:00");
              badgeLabel = "Scheduled";
              badgeDetail = sched.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
            }
            return (
            <div key={r.id} className={`flex items-start gap-3 py-3 px-4 rounded-xl transition-all hover:bg-blue-50 dark:hover:bg-blue-900/20 ${hasSchedule ? "bg-blue-50/70 dark:bg-blue-900/15 border border-blue-200/60 dark:border-blue-700/40" : "bg-blue-50/50 dark:bg-blue-900/10 border border-blue-100/50 dark:border-blue-800/30"}`}>
              <BellIcon className="text-blue-500 flex-shrink-0 mt-0.5" />
              <div className="flex-1 min-w-0">
                <span className="text-sm font-medium text-zinc-700 dark:text-zinc-300 break-words leading-relaxed">{r.text}</span>
                {hasSchedule && (
                  <div className="flex items-center gap-2 mt-1.5">
                    <span className={`inline-flex items-center gap-1 text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full ${isScheduled ? "text-amber-600 dark:text-amber-400 bg-amber-100 dark:bg-amber-900/30" : "text-blue-500 dark:text-blue-400 bg-blue-100 dark:bg-blue-900/30"}`}>
                      {isScheduled ? (
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                      ) : (
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/></svg>
                      )}
                      {badgeLabel}
                    </span>
                    <span className="text-[10px] font-medium text-zinc-400 dark:text-zinc-500">
                      {badgeDetail}
                    </span>
                  </div>
                )}
              </div>
              <button onClick={() => onRemove(r.id)} className="text-zinc-400 dark:text-zinc-500 hover:text-red-500 dark:hover:text-red-400 transition-colors p-2 -m-1 rounded-md hover:bg-red-50 dark:hover:bg-red-500/10 flex-shrink-0" title="Remove reminder" aria-label="Remove reminder">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            );
          })}
        </div>
      ) : (
        <div className="text-center py-16 px-6 rounded-[2rem] border border-dashed border-zinc-300 dark:border-zinc-700 bg-white/50 dark:bg-zinc-800/30 backdrop-blur-md">
          <div className="w-14 h-14 bg-blue-100 dark:bg-blue-900/20 rounded-full flex items-center justify-center mx-auto mb-4">
            <BellIcon size={22} className="text-blue-500" />
          </div>
          <p className="text-base font-bold text-zinc-700 dark:text-zinc-300 mb-1">No reminders queued</p>
          <p className="text-sm font-medium text-zinc-500 dark:text-zinc-500">Use the <span className="font-bold text-zinc-700 dark:text-zinc-300">+ Add reminder</span> button above — it&apos;ll show up in tomorrow&apos;s briefing. You can also schedule it for multiple days.</p>
        </div>
      )}

      {/* Reminder History */}
      {grouped.length > 0 && (
        <div className="mt-8">
          <button
            onClick={() => setHistoryOpen(prev => !prev)}
            className="flex items-center gap-2 text-sm font-semibold text-zinc-500 dark:text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-200 transition-colors mb-4 group"
          >
            <div className="p-1 rounded-full bg-zinc-100 dark:bg-zinc-800 group-hover:bg-zinc-200 dark:group-hover:bg-zinc-700 transition-colors">
              <ClockIcon size={13} className="text-zinc-400 dark:text-zinc-500" />
            </div>
            <span>Reminder History</span>
            <span className="text-[10px] font-bold text-zinc-400 dark:text-zinc-600 tabular-nums">{reminderHistory.length}</span>
            <svg
              width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
              className={`text-zinc-400 transition-transform duration-200 ${historyOpen ? "rotate-180" : ""}`}
            >
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>

          {historyOpen && (
            <div className="space-y-5 fade-in">
              {grouped.map(group => (
                <div key={group.digestDate}>
                  <div className="flex items-center gap-2 mb-2.5">
                    <span className="text-[11px] font-bold uppercase tracking-wider text-zinc-400 dark:text-zinc-500">
                      {new Date(group.digestDate + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })}
                    </span>
                    <div className="flex-1 h-px bg-zinc-200 dark:bg-zinc-700/50"/>
                  </div>
                  <div className="space-y-1.5">
                    {group.items.map(r => (
                      <div key={r.id} className="flex items-start gap-3 py-2.5 px-3.5 rounded-lg bg-zinc-50/50 dark:bg-zinc-800/30 border border-zinc-100/50 dark:border-zinc-800/30">
                        <Icon.Check size={13} className="text-emerald-400 dark:text-emerald-500/70 flex-shrink-0 mt-0.5" />
                        <span className="text-[13px] text-zinc-500 dark:text-zinc-400 flex-1 min-w-0 break-words leading-relaxed">{r.text}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══ Month Group ═══ */
function MonthGroup({ monthKey, items, defaultExpanded, completed, onToggle, onDelete, onRestore, isArchiveView, searchQuery, edits, onEditItem, reactions, onSetReaction }) {
  const [open, setOpen] = useState(defaultExpanded);

  const label = monthKey === "unknown" ? "Undated" : (() => {
    const [year, month] = monthKey.split("-");
    return new Date(parseInt(year), parseInt(month) - 1, 1).toLocaleString("en-US", { month: "long", year: "numeric" });
  })();

  return (
    <div className="fade-in">
      <button
        onClick={() => setOpen(o => !o)}
        className="w-full flex items-center gap-2.5 px-1 py-2 mb-1 group cursor-pointer"
      >
        <span className={`month-chevron text-zinc-400 dark:text-zinc-500${open ? " open" : ""}`}>
          <Icon.ChevronRight size={13} />
        </span>
        <span className="text-xs font-bold tracking-widest uppercase text-zinc-500 dark:text-zinc-400 group-hover:text-zinc-700 dark:group-hover:text-zinc-300 transition-colors duration-150">
          {label}
        </span>
        <span className="text-[11px] font-bold text-zinc-400 dark:text-zinc-500 bg-zinc-100 dark:bg-zinc-800 px-2 py-0.5 rounded-full tabular-nums">
          {items.length}
        </span>
        <span className="flex-1 h-px bg-zinc-200/70 dark:bg-zinc-800" />
      </button>
      <div className={`month-collapsible${open ? " open" : ""}`}>
        <div>
          <div className="space-y-4 pb-3">
            {items.map((d, i) => (
              <DigestCard
                key={d.id}
                digest={d}
                completed={completed}
                onToggle={onToggle}
                onDelete={isArchiveView ? null : onDelete}
                onRestore={isArchiveView ? onRestore : null}
                defaultOpen={i === 0 && defaultExpanded}
                searchQuery={searchQuery}
                edits={edits}
                onEditItem={onEditItem}
                reactions={reactions}
                onSetReaction={onSetReaction}
              />
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ Login Screen ═══ */
function LoginScreen() {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [focused, setFocused] = useState(null);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError(null);
    setSubmitting(true);
    const { error: authError } = await supabase.auth.signInWithPassword({ email, password });
    setSubmitting(false);
    if (authError) setError(authError.message);
  };

  const inputStyle = (field) => ({
    background: focused === field ? 'rgba(255,255,255,0.07)' : 'rgba(255,255,255,0.04)',

      ? '0 0 0 3px rgba(59,130,246,0.09), inset 0 1px 0 rgba(255,255,255,0.05)'

    transition: 'all 0.22s cubic-bezier(0.16, 1, 0.3, 1)',
    color: '#f4f4f5',
    outline: 'none',
    width: '100%',
    padding: '12px 16px',
    borderRadius: '12px',
    fontSize: '14px',
    fontFamily: 'Satoshi, system-ui, sans-serif',

  return (
    <div className="relative min-h-[100dvh] flex items-center justify-center overflow-hidden px-4"

      {/* Dot grid overlay */}

        backdropFilter: 'blur(32px)',
        WebkitBackdropFilter: 'blur(32px)',
        border: '1px solid rgba(255,255,255,0.13)',
        borderRadius: '24px',
        boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.10), 0 32px 64px rgba(0,0,0,0.55)',
        padding: '40px 36px',
      }}>

        {/* Logo — floating + glow */}

        <div className="login-item-in text-center mb-8" style={{ animationDelay: '0.18s' }}>
