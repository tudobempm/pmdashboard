<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>PMdashboard Tasks</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700,800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Satoshi','system-ui','-apple-system','sans-serif']}}}}</script>
</head>
<body class="bg-[#fafafa] text-zinc-900 selection:bg-blue-500/30">
<div id="root"></div>
<script type="text/babel">
const {useEffect,useMemo,useState}=React;
const SUPABASE_URL="https://niqzkombzncxxihhulqq.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJuaXF6a29tYnpuY3h4aWhodWxxcSIsInJlZiI6Im5pcXprb21iem5jeHhpaGh1bHFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTI5NTgsImV4cCI6MjA4OTI2ODk1OH0.9DMbwxPi4yBkXG034sakwh6tnxt-AUcKkt_MER71qcg";
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const statusOf=t=>{const p=typeof t.percent_complete==='number'?t.percent_complete:0;return p>=100?'completed':p>0?'in_progress':'not_started'};
const assigneeLabel=a=>{if(!a)return 'Unassigned';if(a.display_name)return a.display_name;const id=a.user_id||a.id||'';return id?`Assignee ${id.slice(0,8)}`:'Assigned'};
const fmtDate=iso=>{if(!iso)return 'No due date';const d=new Date(iso);return Number.isNaN(d.getTime())?'No due date':d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',timeZone:'America/Santo_Domingo'})};
function Icon({name,size=16,className=''}){const c={width:size,height:size,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2.4,strokeLinecap:'round',strokeLinejoin:'round',className};if(name==='plus')return <svg {...c}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;if(name==='trash')return <svg {...c}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;if(name==='external')return <svg {...c}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;if(name==='search')return <svg {...c}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;return <svg {...c}><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>}
function TaskRow({task,onDelete}){const pct=Math.max(0,Math.min(100,task.percent_complete||0));const s=statusOf(task);const cls=s==='completed'?'bg-emerald-100 text-emerald-700':s==='in_progress'?'bg-blue-100 text-blue-700':'bg-zinc-100 text-zinc-600';const label=s==='completed'?'Completed':s==='in_progress'?'In progress':'Not started';return <div className="rounded-2xl border border-zinc-200 bg-white/85 p-4 shadow-sm"><div className="flex items-start justify-between gap-3"><div className="min-w-0 flex-1"><p className="break-words text-sm font-bold text-zinc-900">{task.title||'Untitled task'}</p><div className="mt-2 flex flex-wrap gap-1.5"><span className="rounded-full bg-zinc-100 px-2 py-0.5 text-[11px] font-semibold text-zinc-600">{task.project_label||task.bucket_name||'Unbucketed'}</span><span className="rounded-full bg-zinc-100/70 px-2 py-0.5 text-[11px] font-semibold text-zinc-500">{task.plan_title||'Planner'}</span><span className="rounded-full bg-amber-100 px-2 py-0.5 text-[11px] font-semibold text-amber-700">{fmtDate(task.due_date_time)}</span></div></div><span className={`shrink-0 rounded-full px-2.5 py-1 text-[11px] font-bold ${cls}`}>{label}</span></div><div className="mt-3 flex items-center gap-2"><div className="h-1.5 flex-1 overflow-hidden rounded-full bg-zinc-200"><div className="h-full rounded-full transition-all" style={{width:`${pct}%`,background:pct>=100?'#10b981':pct>0?'#3b82f6':'#a1a1aa'}} /></div><span className="w-9 text-right text-[11px] font-bold tabular-nums text-zinc-500">{pct}%</span></div><div className="mt-3 flex flex-wrap items-center justify-between gap-2"><div className="text-[11px] font-medium text-zinc-400">Task ID: <span className="font-mono">{task.id}</span></div><div className="flex gap-2">{task.open_in_planner_url&&<a href={task.open_in_planner_url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1.5 rounded-xl bg-blue-600 px-3 py-1.5 text-xs font-bold text-white shadow-sm shadow-blue-500/20 hover:bg-blue-700">Open in Planner <Icon name="external" size={12}/></a>}<button onClick={()=>onDelete(task)} className="inline-flex items-center gap-1.5 rounded-xl bg-red-50 px-3 py-1.5 text-xs font-bold text-red-600 hover:bg-red-100"><Icon name="trash" size={12}/>Delete</button></div></div></div>}
function AddTaskForm({plans,buckets,defaultAssignee,onCreate,submitting}){const[open,setOpen]=useState(false);const[title,setTitle]=useState('');const[planId,setPlanId]=useState(plans[0]?.id||'');const[bucketId,setBucketId]=useState('');const[dueDate,setDueDate]=useState('');const[assignee,setAssignee]=useState(defaultAssignee||'');useEffect(()=>{if(!planId&&plans[0])setPlanId(plans[0].id)},[plans,planId]);const available=buckets.filter(b=>!planId||b.plan_id===planId);async function submit(e){e.preventDefault();if(!title.trim()||!planId)return;await onCreate({title:title.trim(),plan_id:planId,bucket_id:bucketId||null,due_date_time:dueDate?`${dueDate}T10:00:00Z`:null,assignee_user_ids:assignee.trim()?[assignee.trim()]:[],percent_complete:0});setTitle('');setDueDate('');setOpen(false)}if(!open)return <button onClick={()=>setOpen(true)} className="inline-flex min-h-[44px] items-center gap-2 rounded-xl border border-zinc-200 bg-white px-4 py-2.5 text-sm font-bold text-zinc-700 shadow-sm hover:border-blue-300 hover:bg-blue-50/40"><Icon name="plus" size={14}/>Add Planner task</button>;return <form onSubmit={submit} className="mb-5 rounded-2xl border border-zinc-200 bg-white p-4 shadow-sm"><div className="grid gap-3 sm:grid-cols-2"><label className="sm:col-span-2"><span className="mb-1 block text-[10px] font-bold uppercase tracking-widest text-zinc-400">Title</span><input value={title} onChange={e=>setTitle(e.target.value)} autoFocus className="w-full rounded-xl border border-zinc-200 bg-zinc-50 px-3 py-2.5 text-sm font-medium outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10"/></label><label><span className="mb-1 block text-[10px] font-bold uppercase tracking-widest text-zinc-400">Plan / project</span><select value={planId} onChange={e=>{setPlanId(e.target.value);setBucketId('')}} className="w-full rounded-xl border border-zinc-200 bg-zinc-50 px-3 py-2.5 text-sm font-medium outline-none focus:border-blue-500">{plans.map(p=><option key={p.id} value={p.id}>{p.title}</option>)}</select></label><label><span className="mb-1 block text-[10px] font-bold uppercase tracking-widest text-zinc-400">Bucket</span><select value={bucketId} onChange={e=>setBucketId(e.target.value)} className="w-full rounded-xl border border-zinc-200 bg-zinc-50 px-3 py-2.5 text-sm font-medium outline-none focus:border-blue-500"><option value="">No bucket</option>{available.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}</select></label><label><span className="mb-1 block text-[10px] font-bold uppercase tracking-widest text-zinc-400">Due date</span><input type="date" value={dueDate} onChange={e=>setDueDate(e.target.value)} className="w-full rounded-xl border border-zinc-200 bg-zinc-50 px-3 py-2.5 text-sm font-medium outline-none focus:border-blue-500"/></label><label><span className="mb-1 block text-[10px] font-bold uppercase tracking-widest text-zinc-400">Assignee ID</span><input value={assignee} onChange={e=>setAssignee(e.target.value)} className="w-full rounded-xl border border-zinc-200 bg-zinc-50 px-3 py-2.5 text-sm font-medium outline-none focus:border-blue-500"/></label></div><div className="mt-4 flex justify-end gap-2"><button type="button" onClick={()=>setOpen(false)} className="rounded-xl bg-zinc-100 px-4 py-2.5 text-sm font-bold text-zinc-600 hover:bg-zinc-200">Cancel</button><button type="submit" disabled={submitting||!title.trim()||!planId} className="rounded-xl bg-zinc-900 px-4 py-2.5 text-sm font-bold text-white hover:bg-zinc-800 disabled:bg-zinc-100 disabled:text-zinc-400">Queue create</button></div></form>}
function App(){const[tasks,setTasks]=useState([]);const[plans,setPlans]=useState([]);const[buckets,setBuckets]=useState([]);const[loading,setLoading]=useState(true);const[error,setError]=useState(null);const[tab,setTab]=useState('active');const[query,setQuery]=useState('');const[submitting,setSubmitting]=useState(false);const[notice,setNotice]=useState('');useEffect(()=>{fetch(`planner_tasks.json?${Date.now()}`,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('Failed to load planner_tasks.json');return r.json()}).then(d=>{setTasks(d.tasks||[]);setPlans(d.plans||[]);setBuckets(d.buckets||[]);setError(null)}).catch(e=>setError(e.message)).finally(()=>setLoading(false))},[]);async function requestPlannerChange(action,payload){setSubmitting(true);setNotice('');try{const{data:{session}}=await supabase.auth.getSession();if(!session?.access_token)throw new Error('Sign in to PMdashboard before changing Planner tasks.');const res=await fetch('/api/planner-task-requests',{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${session.access_token}`},body:JSON.stringify({action,payload})});if(!res.ok)throw new Error(await res.text());setNotice(action==='create'?'Task create request queued for Planner sync.':'Task delete request queued for Planner sync.')}catch(e){setNotice(e.message||'Planner request failed.')}finally{setSubmitting(false)}}async function onDelete(task){if(!confirm(`Delete "${task.title}" from Planner?`))return;await requestPlannerChange('delete',{task_id:task.id,title:task.title});setTasks(prev=>prev.filter(t=>t.id!==task.id))}async function onCreate(payload){await requestPlannerChange('create',payload);const plan=plans.find(p=>p.id===payload.plan_id);const bucket=buckets.find(b=>b.id===payload.bucket_id);setTasks(prev=>[{id:`pending-${Date.now()}`,title:payload.title,plan_id:payload.plan_id,plan_title:plan?.title||'Planner',bucket_id:payload.bucket_id,bucket_name:bucket?.name||null,project_label:bucket?.name||'Unbucketed',due_date_time:payload.due_date_time,percent_complete:0,status:'not_started',assignees:(payload.assignee_user_ids||[]).map(user_id=>({user_id,display_name:null})),open_in_planner_url:null,pending_sync:true},...prev])}const visible=useMemo(()=>{const q=query.trim().toLowerCase();return tasks.filter(t=>tab==='completed'?statusOf(t)==='completed':statusOf(t)!=='completed').filter(t=>{if(!q)return true;const text=[t.title,t.plan_title,t.bucket_name,t.project_label,...(t.assignees||[]).map(assigneeLabel)].filter(Boolean).join(' ').toLowerCase();return text.includes(q)}).sort((a,b)=>{if(!a.due_date_time&&!b.due_date_time)return(a.title||'').localeCompare(b.title||'');if(!a.due_date_time)return 1;if(!b.due_date_time)return-1;return a.due_date_time.localeCompare(b.due_date_time)})},[tasks,tab,query]);const grouped=useMemo(()=>{const map=new Map();for(const task of visible){const as=task.assignees?.length?task.assignees:[null];for(const a of as){const label=assigneeLabel(a);if(!map.has(label))map.set(label,[]);map.get(label).push(task)}}return[...map.entries()].sort(([a],[b])=>a.localeCompare(b))},[visible]);const counts=useMemo(()=>({active:tasks.filter(t=>statusOf(t)!=='completed').length,completed:tasks.filter(t=>statusOf(t)==='completed').length}),[tasks]);return <main className="mx-auto min-h-screen w-full max-w-5xl px-4 py-6 sm:px-6 md:py-10"><div className="mb-7 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between"><div><p className="mb-1 text-xs font-bold uppercase tracking-widest text-zinc-400">Microsoft Planner</p><h1 className="text-3xl font-extrabold tracking-tight text-zinc-950">Tasks</h1><p className="mt-1 text-sm font-medium text-zinc-500">Assigned-by-you dashboard, grouped by assignee.</p></div><AddTaskForm plans={plans} buckets={buckets} defaultAssignee={tasks.find(t=>t.assignees?.[0])?.assignees?.[0]?.user_id||''} onCreate={onCreate} submitting={submitting}/></div><div className="mb-5 flex flex-col gap-3 sm:flex-row"><div className="inline-flex rounded-2xl border border-zinc-200 bg-white p-1 shadow-sm"><button onClick={()=>setTab('active')} className={`rounded-xl px-4 py-2 text-sm font-bold ${tab==='active'?'bg-zinc-900 text-white':'text-zinc-500 hover:text-zinc-900'}`}>Active ({counts.active})</button><button onClick={()=>setTab('completed')} className={`rounded-xl px-4 py-2 text-sm font-bold ${tab==='completed'?'bg-zinc-900 text-white':'text-zinc-500 hover:text-zinc-900'}`}>Completed ({counts.completed})</button></div><div className="relative flex-1"><Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400"/><input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search tasks..." className="w-full rounded-2xl border border-zinc-200 bg-white py-3 pl-11 pr-4 text-sm font-medium shadow-sm outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10"/></div></div>{notice&&<div className="mb-5 rounded-2xl border border-blue-200 bg-blue-50 px-4 py-3 text-sm font-semibold text-blue-700">{notice}</div>}{loading&&<div className="rounded-2xl border border-zinc-200 bg-white p-8 text-sm font-semibold text-zinc-500">Loading Planner tasks...</div>}{error&&<div className="rounded-2xl border border-red-200 bg-red-50 p-8 text-sm font-semibold text-red-600">{error}</div>}{!loading&&!error&&grouped.length===0&&<div className="rounded-2xl border border-dashed border-zinc-300 bg-white/60 p-12 text-center text-sm font-semibold text-zinc-500">No {tab} tasks found.</div>}<div className="space-y-8">{grouped.map(([assignee,assigneeTasks])=><section key={assignee}><div className="mb-3 flex items-center gap-2"><h2 className="text-lg font-extrabold tracking-tight text-zinc-900">{assignee}</h2><span className="rounded-full bg-zinc-100 px-2 py-0.5 text-[11px] font-bold text-zinc-500">{assigneeTasks.length}</span><span className="h-px flex-1 bg-zinc-200"/></div><div className="space-y-3">{assigneeTasks.map(task=><TaskRow key={`${assignee}-${task.id}`} task={task} onDelete={onDelete}/>)}</div></section>)}</div></main>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
